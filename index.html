<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartID Sälj-CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --g:#1E5C4E;--gd:#1A3D30;--gm:#2D7A65;--gt:#4AAF96;
  --gold:#C8A84B;--w:#fff;--bg:#F4F8F6;--bg2:#EBF2EF;
  --br:#C8DDD4;--tx:#1A3D30;--mu:#557A6A;
  --err:#C0392B;--errl:#FDEDEC;
  --warn:#E67E22;--warnl:#FDF2E9;
  --sb:240px;
  --blue:#3B7DD8;--bluel:#E8F1FB;
  --purple:#7C5BC9;--purplel:#EFEAFC;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gd),var(--g));padding:1rem;}
.login-card{background:var(--w);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 12px 48px rgba(0,0,0,.25);}
.login-logo{font-size:28px;font-weight:700;color:var(--g);margin-bottom:.2rem;}
.login-logo span{color:var(--gt);}
.login-sub{font-size:13px;color:var(--mu);margin-bottom:2rem;}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
.login-card input{width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;color:var(--tx);background:var(--bg);margin-bottom:14px;outline:none;transition:border-color .2s;}
.login-card input:focus{border-color:var(--gt);}
.login-btn{width:100%;padding:11px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s;}
.login-btn:hover{opacity:.88;}
.login-btn:disabled{opacity:.55;cursor:default;}
.login-err{color:var(--err);font-size:12px;margin-top:10px;display:none;text-align:center;}
.login-link{display:block;width:100%;background:none;border:none;color:var(--g);font-size:12.5px;font-weight:600;cursor:pointer;margin-top:12px;padding:4px;font-family:inherit;}
.login-link:hover{text-decoration:underline;}
.login-card p.login-info{font-size:13px;color:var(--mu);line-height:1.55;margin-bottom:1.2rem;}

/* APP */
.shell{display:none;height:100vh;overflow:hidden;}
.shell.show{display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sb);flex-shrink:0;background:var(--gd);display:flex;flex-direction:column;height:100%;overflow-y:auto;}
.sb-hdr{padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo{font-size:18px;font-weight:700;color:#fff;}
.sb-logo span{color:var(--gt);}
.sb-tag{font-size:11px;color:var(--gt);margin-top:2px;font-weight:600;letter-spacing:.05em;}
.sb-user{font-size:12px;color:rgba(255,255,255,.55);margin-top:.7rem;display:flex;align-items:center;gap:8px;padding:6px 4px;}
.sb-user-avatar{width:26px;height:26px;border-radius:50%;background:var(--gt);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.sb-role{font-size:10px;color:var(--gt);font-weight:700;letter-spacing:.05em;}
.sb-nav{flex:1;padding:.7rem .5rem;}
.sb-sec{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:.5rem .8rem .25rem;margin-top:.4rem;}
.sbi{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;margin-bottom:2px;background:transparent;border:none;width:100%;text-align:left;transition:all .15s;}
.sbi:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sbi.active{background:rgba(255,255,255,.12);color:#fff;}
.sbi svg{flex-shrink:0;opacity:.7;}
.sbi.active svg{opacity:1;color:var(--gt);}
.sbi .soon{margin-left:auto;font-size:9px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:.03em;}
.sb-ftr{padding:.7rem .5rem;border-top:1px solid rgba(255,255,255,.06);}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:transparent;border:none;color:rgba(255,255,255,.45);font-size:12px;cursor:pointer;border-radius:6px;transition:all .2s;}
.logout-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);}

/* MAIN */
.main{flex:1;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.ph{padding:1.1rem 1.6rem;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:1rem;flex-wrap:wrap;}
.ph-t{font-size:18px;font-weight:600;}
.ph-s{font-size:12px;color:var(--mu);margin-top:2px;}
.ca{flex:1;padding:1.4rem 1.6rem;}
.role-pill{font-size:12px;color:var(--gold);background:#FAEEDA;padding:3px 9px;border-radius:5px;font-weight:600;margin-left:6px;vertical-align:middle;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:1.5rem;}
.kpi{background:var(--w);border:1px solid var(--br);border-radius:14px;padding:1.2rem 1.3rem;}
.kpi-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:.7rem;}
.kpi-ic.green{background:#EAF4EE;color:var(--g);}
.kpi-ic.gold{background:#FAEEDA;color:var(--gold);}
.kpi-ic.blue{background:var(--bluel);color:var(--blue);}
.kpi-ic.purple{background:var(--purplel);color:var(--purple);}
.kpi-ic.orange{background:var(--warnl);color:var(--warn);}
.kpi-l{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:.3rem;}
.kpi-v{font-size:28px;font-weight:700;color:var(--tx);line-height:1;}
.kpi-sub{font-size:11px;color:var(--mu);margin-top:.4rem;}

/* SECTION CARDS */
.sec{background:var(--w);border:1px solid var(--br);border-radius:14px;overflow:hidden;margin-bottom:1.2rem;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.4rem;border-bottom:1px solid var(--bg2);gap:1rem;}
.sec-hdr h3{font-size:14px;font-weight:600;}
.sec-body{padding:1.2rem 1.4rem;}

.empty{text-align:center;padding:2.4rem 1rem;color:var(--mu);}
.empty p{font-size:14px;font-weight:600;}
.empty small{font-size:12px;}

/* NOTICE */
.notice{border-radius:10px;padding:12px 16px;margin-bottom:1.2rem;font-size:13px;line-height:1.5;}
.notice.warn{background:var(--warnl);border:1px solid #F0C090;border-left:3px solid var(--warn);color:var(--tx);}

/* PLACEHOLDER (kommande etapper) */
.ph-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 1rem;}
.ph-soon-ic{font-size:48px;margin-bottom:1rem;}
.ph-soon h2{font-size:18px;font-weight:600;margin-bottom:.4rem;}
.ph-soon p{font-size:13px;color:var(--mu);max-width:360px;line-height:1.6;}

/* LOADER */
.loader{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:var(--bg);}
.spin{width:34px;height:34px;border:3px solid var(--bg2);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader p{font-size:13px;color:var(--mu);}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .5s ease-out forwards;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px;}

/* ===== ETAPP 2: knappar, formulär, tabeller ===== */
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .18s;}
.btn:disabled{opacity:.55;cursor:default;}
.btn-p{background:var(--g);color:#fff;}
.btn-p:hover{background:var(--gm);}
.btn-d{background:transparent;color:var(--err);border:1px solid #F09595;}
.btn-d:hover{background:var(--errl);}
.fl{display:flex;flex-direction:column;gap:5px;}
.fl label{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;}
.fl input{padding:8px 10px;border:1px solid var(--br);border-radius:8px;background:var(--bg);color:var(--tx);font-size:14px;outline:none;font-weight:500;}
.fl input:focus{border-color:var(--gt);}
.daily-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.salj-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px;padding:.7rem 0;border-bottom:1px solid var(--bg2);align-items:center;}
.salj-row:last-child{border:none;}
.salj-name{font-size:13px;font-weight:600;color:var(--tx);}
.prov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
.prov-item{padding:11px 13px;background:var(--bg);border:1px solid var(--br);border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.prov-item .pl{font-size:11px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.prov-item .pv{font-size:14px;font-weight:700;color:var(--g);}
.htable-wrap{overflow-x:auto;}
.htable{width:100%;border-collapse:collapse;font-size:13px;min-width:720px;}
.htable thead th{background:var(--bg2);color:var(--mu);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--br);}
.htable thead th:not(:first-child){text-align:center;}
.htable tbody td{padding:10px 12px;border-bottom:1px solid var(--bg2);white-space:nowrap;}
.htable tbody td:not(:first-child){text-align:center;}
.htable tbody tr:hover td{background:var(--bg);}
.h-day{font-weight:600;font-size:13px;}
.h-num{font-weight:600;font-size:14px;color:var(--tx);}
.h-num.salj{color:var(--g);}
.h-num.no{color:var(--mu);}
.h-num.cb{color:var(--blue);}
.tot-row td{background:var(--bg2);font-weight:700;border-top:2px solid var(--br);}
.bar-chart{display:flex;flex-direction:column;gap:12px;}
.bar-row{display:grid;grid-template-columns:130px 1fr 140px;gap:12px;align-items:center;}
.bar-row .bl{font-size:13px;font-weight:600;color:var(--tx);}
.bar-row .bw{height:22px;background:var(--bg2);border-radius:6px;overflow:hidden;}
.bar-row .bf{height:100%;border-radius:6px;transition:width .6s ease;}
.bar-row .bv{font-size:13px;font-weight:700;text-align:right;}
.btn-s{background:var(--bg2);color:var(--tx);border:1px solid var(--br);}
.btn-s:hover{background:var(--br);}
.btn-xs{padding:6px 10px;font-size:12px;}
.circles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;}
.circ-card{background:var(--w);border:1px solid var(--br);border-radius:14px;padding:1.1rem;text-align:center;}
.circ-wrapper{position:relative;width:120px;height:120px;margin:0 auto .55rem;}
.circ-svg{width:120px;height:120px;transform:rotate(-90deg);}
.circ-bg{fill:none;stroke:var(--bg2);stroke-width:12;}
.circ-fg{fill:none;stroke-width:12;stroke-linecap:round;}
.circ-wrapper>div{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.circ-pct{font-size:21px;font-weight:700;}
.circ-label{font-size:10px;color:var(--mu);margin-top:2px;}
.circ-title{font-size:13px;font-weight:600;color:var(--tx);}
.overlay{position:fixed;inset:0;background:rgba(15,42,30,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal{background:var(--w);border-radius:16px;padding:1.6rem;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.25);}
.modal h2{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:.5rem;}
.modal p{font-size:13px;color:var(--mu);line-height:1.55;margin-bottom:1rem;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:.5rem;}
.fdrop{border:2px dashed var(--br);border-radius:10px;padding:1.6rem;text-align:center;cursor:pointer;margin-bottom:1rem;transition:border-color .18s;}
.fdrop:hover{border-color:var(--gt);}
@keyframes confettiFall{0%{transform:translateY(-15vh) rotate(0);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:.25;}}
.confetti-piece{position:fixed;top:0;z-index:9999;pointer-events:none;border-radius:2px;}
.podium-bar{display:flex;align-items:flex-start;justify-content:center;padding-top:4px;border-radius:6px 6px 0 0;transform-origin:bottom;animation:podiumRise .6s cubic-bezier(.2,.8,.2,1) both;}
@keyframes podiumRise{from{transform:scaleY(0);}to{transform:scaleY(1);}}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff5252;margin-right:5px;animation:livePulse 1.4s infinite;}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.comp-card-seller{border-radius:14px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.12);}

/* === UTBILDNING === */
.train-hero{background:linear-gradient(135deg,var(--gd) 0%,var(--g) 60%,var(--gm) 100%);color:#fff;border-radius:16px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.train-hero::before{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(74,175,150,.3),transparent 70%);}
.train-hero h1{font-size:26px;font-weight:700;margin-bottom:.4rem;position:relative;}
.train-hero p{font-size:14px;opacity:.85;max-width:600px;position:relative;line-height:1.6;}
.train-status-bar{display:flex;gap:14px;margin-top:1.4rem;flex-wrap:wrap;position:relative;}
.train-stat{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:.7rem 1rem;flex:1;min-width:140px;}
.train-stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;opacity:.7;font-weight:600;}
.train-stat-v{font-size:22px;font-weight:700;margin-top:2px;}

.cert-card{background:linear-gradient(135deg,#FFF6D6 0%,#FAEEDA 100%);border:2px solid var(--gold);border-radius:14px;padding:1.5rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;}
.cert-icon{font-size:48px;}
.cert-card h3{font-size:18px;color:var(--gd);margin-bottom:.25rem;}
.cert-card p{font-size:13px;color:var(--mu);}
.cert-card .cert-date{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:.4rem;}

.slide-stage{background:var(--w);border:1px solid var(--br);border-radius:14px;padding:0;overflow:hidden;margin-bottom:1.2rem;}
.slide-frame{min-height:520px;padding:2.4rem 2rem;background:linear-gradient(180deg,var(--bg) 0%,#fff 100%);position:relative;}
.slide-num{position:absolute;top:14px;right:18px;background:var(--g);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.slide-cat{position:absolute;top:14px;left:18px;background:var(--gold);color:#fff;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.slide-h1{font-size:32px;font-weight:800;color:var(--gd);margin:1.5rem 0 .8rem;line-height:1.2;}
.slide-h2{font-size:22px;font-weight:700;color:var(--g);margin:1.2rem 0 .6rem;}
.slide-h3{font-size:16px;font-weight:700;color:var(--gd);margin:1rem 0 .4rem;}
.slide-lead{font-size:16px;line-height:1.7;color:var(--tx);margin-bottom:1rem;}
.slide-frame ul{margin:.8rem 0 1.2rem 1.2rem;}
.slide-frame li{font-size:15px;line-height:1.65;color:var(--tx);margin-bottom:.5rem;}
.slide-frame strong{color:var(--gd);}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:1.2rem 0;}
.stat-box{background:var(--w);border:2px solid var(--gold);border-radius:12px;padding:1rem;text-align:center;}
.stat-big{font-size:30px;font-weight:800;color:var(--err);}
.stat-lbl{font-size:11px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem;}

.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:1rem 0;}
.feat-item{background:var(--bg);border-left:3px solid var(--gt);border-radius:8px;padding:.9rem 1.1rem;}
.feat-item h4{font-size:14px;font-weight:700;color:var(--gd);margin-bottom:.3rem;}
.feat-item p{font-size:12px;color:var(--mu);line-height:1.5;}

.pkg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:1rem 0;}
.pkg-card{background:var(--w);border:1.5px solid var(--br);border-radius:12px;padding:1.2rem;text-align:center;position:relative;transition:transform .2s;}
.pkg-name{font-size:12px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.pkg-tier{font-size:18px;font-weight:700;margin-top:.2rem;}
.pkg-price{font-size:24px;font-weight:800;color:var(--g);margin:.4rem 0;}
.pkg-price small{font-size:12px;font-weight:500;color:var(--mu);}
.pkg-desc{font-size:11px;color:var(--mu);font-weight:600;margin-bottom:.6rem;}
.pkg-list{font-size:12px;color:var(--tx);text-align:left;line-height:1.7;margin-top:.5rem;border-top:1px solid var(--bg2);padding-top:.7rem;}

.compare-tbl{width:100%;border-collapse:collapse;margin:1rem 0;font-size:13px;}
.compare-tbl th{background:var(--gd);color:#fff;padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.compare-tbl th:not(:first-child){text-align:center;}
.compare-tbl td{padding:8px 12px;border-bottom:1px solid var(--bg2);}
.compare-tbl td:not(:first-child){text-align:center;font-weight:600;}
.compare-tbl tr:hover td{background:var(--bg);}
.check-yes{color:var(--g);font-size:16px;font-weight:700;}
.check-no{color:#ddd;font-size:16px;}

.process-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:1rem 0;}
.proc-step{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem;position:relative;padding-left:50px;}
.proc-step .num{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.proc-step h4{font-size:13px;font-weight:700;color:var(--gd);margin-bottom:.2rem;}
.proc-step p{font-size:11px;color:var(--mu);line-height:1.4;}

.objection-card{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem;margin-bottom:.8rem;}
.objection-card .obj{background:var(--errl);border-left:3px solid var(--err);border-radius:6px;padding:.6rem .9rem;margin-bottom:.6rem;}
.objection-card .obj-l{font-size:10px;font-weight:700;color:var(--err);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem;}
.objection-card .ans{background:#EAF4EE;border-left:3px solid var(--g);border-radius:6px;padding:.6rem .9rem;}
.objection-card .ans-l{font-size:10px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem;}
.objection-card .obj p,.objection-card .ans p{font-size:13px;line-height:1.55;}

.spin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:1rem 0;}
.spin-item{background:var(--w);border:1.5px solid var(--gt);border-radius:10px;padding:.9rem;}
.spin-letter{display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--gt);color:#fff;text-align:center;line-height:28px;font-weight:800;font-size:14px;}
.spin-name{font-size:13px;font-weight:700;margin-top:.4rem;color:var(--gd);}
.spin-q{font-size:12px;color:var(--mu);font-style:italic;line-height:1.5;margin-top:.3rem;}

.fab-flow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:1rem 0;align-items:stretch;}
.fab-step{background:var(--w);border:1.5px solid var(--br);border-radius:10px;padding:.9rem;position:relative;}
.fab-step .letter{font-size:32px;font-weight:800;color:var(--gt);line-height:1;}

/* QUIZ */

/* === LJUDBIBLIOTEK === */
.audio-upload-card{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1.2rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}

/* === MODERN AUDIO LIBRARY (3 kategorier) === */
@keyframes slideInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(74,175,150,.5);}50%{box-shadow:0 0 0 10px rgba(74,175,150,0);}}

@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0;}50%{transform:scale(1.05);}70%{transform:scale(.95);}100%{transform:scale(1);opacity:1;}}

.audio-cat-tabs{display:flex;gap:8px;margin-bottom:1.4rem;flex-wrap:wrap;}

.audio-cat-tab:hover{transform:translateY(-2px);border-color:var(--cat-color);box-shadow:0 6px 14px rgba(0,0,0,.08);}
.audio-cat-tab.active{background:var(--cat-bg);border-color:var(--cat-color);color:var(--cat-color);box-shadow:0 4px 12px rgba(0,0,0,.06);}
.audio-cat-tab.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cat-color);}
.audio-cat-icon{font-size:22px;}
.audio-cat-label{flex:1;text-align:left;}
.audio-cat-count{background:var(--cat-color);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center;}

.audio-cat-header{display:flex;align-items:center;gap:14px;background:var(--cat-bg);border-left:4px solid var(--cat-color);border-radius:12px;padding:16px 20px;margin-bottom:1.4rem;animation:slideInUp .4s ease;}
.audio-cat-header-icon{font-size:32px;}
.audio-cat-header-title{font-size:18px;font-weight:700;color:var(--cat-color);margin-bottom:2px;}
.audio-cat-header-desc{font-size:13px;color:var(--mu);}
.audio-cat-header-stats{margin-left:auto;background:#fff;color:var(--cat-color);font-weight:700;padding:6px 14px;border-radius:20px;font-size:13px;border:1px solid var(--cat-color);}

.audio-upload-card-modern{display:flex;align-items:flex-start;gap:14px;background:linear-gradient(135deg,var(--w),var(--bg));border:2px dashed var(--br);border-radius:14px;padding:18px;margin-bottom:1.4rem;transition:border-color .2s;}
.audio-upload-card-modern:hover{border-color:var(--cat-color,var(--g));}
.audio-upload-icon{font-size:32px;animation:bounceIn .5s ease;}
.audio-upload-grid-modern{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:8px;}
.audio-upload-grid-modern .audio-input{padding:9px 12px;border:1px solid var(--br);border-radius:8px;font-size:13px;font-family:inherit;}
.audio-upload-grid-modern .audio-file-input{grid-column:1/-1;padding:9px;border:1px dashed var(--br);border-radius:8px;font-size:12px;cursor:pointer;background:var(--bg2);}
.audio-upload-btn-modern{padding:9px 18px;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.audio-upload-btn-modern:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.audio-upload-btn-modern:active{transform:translateY(0);}

.audio-grid-modern{display:grid;grid-template-columns:1fr;gap:14px;}
.audio-card-modern,.audio-card-empty{background:var(--w);border:2px solid var(--br);border-radius:14px;padding:16px;position:relative;animation:slideInUp .5s ease both;transition:all .25s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.audio-card-modern:hover{transform:translateY(-3px);border-color:var(--cat-color);box-shadow:0 8px 20px rgba(0,0,0,.08);}
.audio-card-modern.playing{border-color:var(--cat-color);background:linear-gradient(135deg,var(--w) 60%,var(--cat-bg));box-shadow:0 6px 18px rgba(0,0,0,.1);}
.audio-card-modern.playing::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cat-color),transparent);background-size:200% 100%;animation:shimmer 2s linear infinite;}
.audio-card-num{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;color:var(--mu);opacity:.6;letter-spacing:.05em;}
.audio-card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;padding-right:30px;}
.audio-card-icon{font-size:24px;flex-shrink:0;}
.audio-card-info{flex:1;min-width:0;}
.audio-card-title{font-size:14.5px;font-weight:700;color:var(--gd);margin:0 0 4px;line-height:1.3;}
.audio-card-meta{display:flex;gap:10px;font-size:11px;color:var(--mu);font-weight:500;}
.audio-delete-btn-modern{background:transparent;border:none;cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px;opacity:.4;transition:all .15s;}
.audio-delete-btn-modern:hover{opacity:1;background:var(--errl);}

.audio-player-modern{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:8px;}
.audio-play-btn-modern{background:var(--cat-color);color:#fff;border:none;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;}
.audio-play-btn-modern:hover{transform:scale(1.08);}
.audio-card-modern.playing .audio-play-btn-modern{animation:pulseGlow 1.5s ease-in-out infinite;}
.audio-skip-btn{background:var(--w);border:1px solid var(--br);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gd);flex-shrink:0;transition:all .15s;position:relative;font-family:inherit;gap:1px;}
.audio-skip-btn:hover{background:var(--cat-color);color:#fff;border-color:var(--cat-color);}
.audio-skip-btn .skip-num{font-size:8px;font-weight:700;letter-spacing:-.02em;}
.audio-time-wrap-modern{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.audio-time-current,.audio-time-total{font-size:11px;color:var(--mu);font-variant-numeric:tabular-nums;flex-shrink:0;font-weight:600;}
.audio-progress-modern{flex:1;height:6px;background:rgba(0,0,0,.08);border-radius:4px;cursor:pointer;overflow:hidden;position:relative;}
.audio-progress-bar-modern{height:100%;background:linear-gradient(90deg,var(--cat-color),var(--cat-color));width:0%;transition:width .12s linear;border-radius:4px;position:relative;}
.audio-card-modern.playing .audio-progress-bar-modern::after{content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--cat-color);border-radius:50%;box-shadow:0 0 8px var(--cat-color);animation:wave 1s ease-in-out infinite;}

.audio-card-empty{border-style:dashed;background:var(--bg);text-align:center;padding:24px 16px;opacity:.7;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;}
.audio-card-empty:hover{opacity:1;border-color:var(--cat-color);}
.audio-empty-icon{font-size:32px;opacity:.5;margin-bottom:6px;}
.audio-empty-text{font-size:13px;font-weight:600;color:var(--mu);}
.audio-empty-sub{font-size:11px;color:var(--mu);margin-top:2px;opacity:.7;}

@media(min-width:768px){.audio-grid-modern{grid-template-columns:repeat(auto-fill,minmax(380px,1fr));}}
.audio-upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.audio-upload-grid textarea,.audio-upload-grid .audio-file-input,.audio-upload-grid .audio-upload-btn{grid-column:1 / -1;}
.audio-input{padding:.55rem .8rem;border:1px solid var(--br);border-radius:6px;font-size:13px;font-family:inherit;background:var(--w);color:var(--gd);}
.audio-input:focus{outline:none;border-color:var(--g);}
.audio-file-input{padding:.5rem;border:1px dashed var(--br);border-radius:6px;font-size:12px;cursor:pointer;background:var(--bg2);}
.audio-upload-btn{background:var(--g);color:#fff;border:none;border-radius:6px;padding:.65rem 1.4rem;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.audio-upload-btn:hover{background:var(--gd);}
.audio-list{display:flex;flex-direction:column;gap:.8rem;}
.audio-empty{text-align:center;padding:3rem 1rem;background:var(--w);border:1px dashed var(--br);border-radius:10px;}
.audio-item{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem 1.2rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.audio-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:.7rem;}
.audio-item-info{flex:1;min-width:0;}
.audio-item-title{font-size:14px;font-weight:700;color:var(--gd);margin:0 0 .3rem;}
.audio-item-meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem;}
.audio-meta-tag{font-size:11px;color:var(--mu);background:var(--bg2);padding:2px 7px;border-radius:10px;}
.audio-item-desc{font-size:12px;color:var(--mu);line-height:1.5;margin:.3rem 0 0;}
.audio-delete-btn{background:transparent;border:1px solid var(--br);color:var(--err);border-radius:6px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.audio-delete-btn:hover{background:var(--errl);border-color:var(--err);}
.audio-player{display:flex;align-items:center;gap:.6rem;background:var(--bg2);border-radius:8px;padding:.6rem .8rem;}
.audio-play-btn,.audio-rewind-btn,.audio-forward-btn{background:var(--w);border:1px solid var(--br);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g);transition:all .15s;flex-shrink:0;}
.audio-play-btn:hover,.audio-rewind-btn:hover,.audio-forward-btn:hover{background:var(--g);color:#fff;border-color:var(--g);}
.audio-play-btn{background:var(--g);color:#fff;border-color:var(--g);width:38px;height:38px;}
.audio-play-btn:hover{background:var(--gd);}
.audio-time-wrap{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;}
.audio-time-current,.audio-time-total{font-size:11px;color:var(--mu);font-variant-numeric:tabular-nums;flex-shrink:0;}
.audio-progress{flex:1;height:6px;background:rgba(0,0,0,.08);border-radius:3px;cursor:pointer;position:relative;overflow:hidden;}
.audio-progress-bar{height:100%;background:var(--g);width:0%;transition:width .1s linear;}

/* === MÅL & STREAK — bonusmätare === */
.bmeter-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}

.bmeter-msg{margin-top:11px;background:#fff;border:1px dashed var(--g);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--gd);font-weight:600;}
.surprise-box{background:linear-gradient(135deg,var(--gd),var(--g));border-radius:14px;padding:22px;text-align:center;}

.sgift:nth-child(2){animation-delay:.32s;}

.sgift-open{filter:none;animation:sgiftpop 1.4s ease-in-out infinite;}

@keyframes sgiftbob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

--g);"><h4 style="color:var(--g);">✔ Kom ihåg</h4><ul style="margin:.4rem 0 0 1rem;font-size:12px;line-height:1.6;"><li>135 000 kr ekonomisk ersättning</li><li>1,3 miljoner kr rättsligt stöd/år</li><li>Första månaden gratis</li><li>Prisgaranti – ingen höjning</li></ul></div><div class="feat-item" style="border-left-color:var(--err);"><h4 style="color:var(--err);">✘ Undvik</h4><ul style="margin:.4rem 0 0 1rem;font-size:12px;line-height:1.6;"><li>Rabbla alla funktioner</li><li>Branschjargong</li><li>Skrämselteknik utan grund</li><li>Falska SMS som "bevis"</li></ul></div></div>`},

/* ---- Hjälpfunktioner ---- */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtMin(min){min=Math.max(0,Math.round(min||0));const h=Math.floor(min/60),m=min%60;return h+'h '+m+'m';}
function fmtSec(s){s=Math.max(0,Math.round(n(s)));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function show(id,disp){document.getElementById(id).style.display=disp||'';}
function hide(id){document.getElementById(id).style.display='none';}
function sum(arr,k){return arr.reduce((a,d)=>a+(Number(d[k])||0),0);}
function n(v){return Number(v)||0;}
function emptyDay(date){return{date:date,samtal:0,nej:0,callbacks:0,aktiv_min:0,
  sold_s189:0,sold_s229:0,sold_s279:0,sold_a49:0,sold_a79:0,sold_a99:0,
  ang_s189:0,ang_s229:0,ang_s279:0,ang_a49:0,ang_a79:0,ang_a99:0};}
function dayTotalSalj(d){return n(d.sold_s189)+n(d.sold_s229)+n(d.sold_s279);}
function dayTotalAddon(d){return n(d.sold_a49)+n(d.sold_a79)+n(d.sold_a99);}
function dayTotalAng(d){return n(d.ang_s189)+n(d.ang_s229)+n(d.ang_s279)+n(d.ang_a49)+n(d.ang_a79)+n(d.ang_a99);}
function dayProvision(d){const r=ROLES[S.role==='coach'?'coach':'saljare'];
  return (n(d.sold_s189)-n(d.ang_s189))*r.s189+(n(d.sold_s229)-n(d.ang_s229))*r.s229+(n(d.sold_s279)-n(d.ang_s279))*r.s279
        +(n(d.sold_a49)-n(d.ang_a49))*r.a49+(n(d.sold_a79)-n(d.ang_a79))*r.a79+(n(d.sold_a99)-n(d.ang_a99))*r.a99;}
function dayOrderbelopp(d){return n(d.sold_s189)*PRICES.s189+n(d.sold_s229)*PRICES.s229+n(d.sold_s279)*PRICES.s279
        +n(d.sold_a49)*PRICES.a49+n(d.sold_a79)*PRICES.a79+n(d.sold_a99)*PRICES.a99;}
function fmtDate(s){
  if(!s)return '';
  const d=new Date(s+'T00:00:00');
  if(isNaN(d.getTime()))return s;
  const man=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const dag=['sön','mån','tis','ons','tor','fre','lör'];
  return dag[d.getDay()]+' '+d.getDate()+' '+man[d.getMonth()];
}
/* "2026-05" eller "2026-05-01" → "Maj 2026" */
function fmtMonth(s){
  if(!s)return '';
  const m=String(s).slice(0,7).split('-');
  const MAN=['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
  const idx=parseInt(m[1],10)-1;
  return (MAN[idx]||m[1])+' '+m[0];
}
/* "HH:MM:SS" / "MM:SS" → minuter resp. sekunder */
function hmsToMin(v){
  if(v==null||v==='')return 0;
  const p=String(v).split(':').map(x=>parseFloat(String(x).replace(',','.'))||0);
  if(p.length===3)return Math.round(p[0]*60+p[1]+p[2]/60);
  if(p.length===2)return Math.round(p[0]+p[1]/60);
  return Math.round(p[0]);
}
function hmsToSec(v){
  if(v==null||v==='')return 0;
  const p=String(v).split(':').map(x=>parseFloat(String(x).replace(',','.'))||0);
  if(p.length===3)return Math.round(p[0]*3600+p[1]*60+p[2]);
  if(p.length===2)return Math.round(p[0]*60+p[1]);
  return Math.round(p[0]);
}

async function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  const errEl=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  errEl.style.display='none';
  if(!email||!pass){errEl.textContent='Fyll i e-post och lösenord.';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Loggar in…';
  try{
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      errEl.textContent='Inloggning misslyckades: '+error.message;
      errEl.style.display='block';
      btn.disabled=false;btn.textContent='Logga in';
      return;
    }
    await bootstrap();
  }catch(e){
    errEl.textContent='Något gick fel: '+(e.message||e);
    errEl.style.display='block';
    btn.disabled=false;btn.textContent='Logga in';
  }
}

async function doLogout(){
  try{await sb.auth.signOut();}catch(e){}
  location.reload();
}

async function doForgotPassword(){
  const email=document.getElementById('fp-email').value.trim();
  const msg=document.getElementById('fp-msg');
  const btn=document.getElementById('fp-btn');
  msg.style.display='none';
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
    msg.style.color='var(--err)';msg.textContent='Ange en giltig e-postadress.';msg.style.display='block';return;
  }
  btn.disabled=true;btn.textContent='Skickar…';
  try{
    const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});
    if(error){
      msg.style.color='var(--err)';msg.textContent='Kunde inte skicka: '+error.message;msg.style.display='block';
      btn.disabled=false;btn.textContent='Skicka återställningslänk';return;
    }
    msg.style.color='var(--g)';
    msg.textContent='✓ Om adressen finns har ett mejl skickats. Klicka länken i mejlet för att sätta ett nytt lösenord.';
    msg.style.display='block';btn.textContent='Mejl skickat';
  }catch(e){
    msg.style.color='var(--err)';msg.textContent='Något gick fel: '+(e.message||e);msg.style.display='block';
    btn.disabled=false;btn.textContent='Skicka återställningslänk';
  }
}

    if(error){
      msg.style.color='var(--err)';msg.textContent='Kunde inte spara: '+error.message;msg.style.display='block';
      btn.disabled=false;btn.textContent='Spara nytt lösenord';return;
    }
    S.recovery=false;
    msg.style.color='var(--g)';msg.textContent='✓ Lösenordet är ändrat! Loggar in…';msg.style.display='block';
    setTimeout(()=>bootstrap(),900);
  }catch(e){
    msg.style.color='var(--err)';msg.textContent='Något gick fel: '+(e.message||e);msg.style.display='block';
    btn.disabled=false;btn.textContent='Spara nytt lösenord';
  }
}

  ov.querySelector('#cp-save').addEventListener('click',async()=>{
    const msg=ov.querySelector('#cp-msg');
    const p1=ov.querySelector('#cp-p1').value;
    const p2=ov.querySelector('#cp-p2').value;
    function show(t,bad){msg.style.display='block';msg.style.color=bad?'var(--err)':'var(--g)';msg.textContent=t;}
    if(p1.length<6){show('Lösenordet måste vara minst 6 tecken.',true);return;}
    if(p1!==p2){show('Lösenorden matchar inte.',true);return;}
    const btn=ov.querySelector('#cp-save');btn.disabled=true;btn.textContent='Sparar…';

/* ============================================================
   BOOTSTRAP — hämtar användare, profil, säljare och dashboard-data
   ============================================================ */
async function bootstrap(){
  if(S.recovery){showOnly('reset-screen');return;}
  showOnly('loader');
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){showOnly('login-screen');return;}
    S.user=session.user;

    /* Profil → roll */
    const {data:prof}=await sb.from('profiles').select('*').eq('id',S.user.id).maybeSingle();
    S.profile=prof||null;
    S.role=(prof&&prof.role==='coach')?'coach':'saljare';

    /* Säljarrad – via profiles.seller_id, annars via sellers.user_id */
    let seller=null;
    if(prof&&prof.seller_id){
      const {data}=await sb.from('sellers').select('*').eq('id',prof.seller_id).maybeSingle();
      seller=data||null;
    }
    if(!seller){
      const {data}=await sb.from('sellers').select('*').eq('user_id',S.user.id).maybeSingle();
      seller=data||null;
    }
    S.seller=seller;

    await loadDashboardData();
    showOnly('app');
    paintSidebar();
    render();
  }catch(e){
    S.loadError=e.message||String(e);
    showOnly('app');
    paintSidebar();
    render();
  }
}

async function loadDashboardData(){
  S.loadError=null;
  /* Egen dagsstatistik */
  if(S.seller){
    const {data,error}=await sb.from('seller_daily_stats')
      .select('*').eq('seller_id',S.seller.id).order('date',{ascending:true});
    if(error)S.loadError=error.message;
    S.dailyStats=data||[];
  }else{
    S.dailyStats=[];
  }
  /* Månads-dialerstatistik (aktiv tid + snittsamtalstid) */
  if(S.seller){
    try{const r=await sb.from('salj_monthly_dialer').select('*').eq('seller_id',S.seller.id);S.monthlyDialer=r.data||[];}
    catch(e){S.monthlyDialer=[];}
  }else{S.monthlyDialer=[];}
  /* Scoreboard (RPC – returnerar sälj/tillägg per säljare) */
  try{
    const {data,error}=await sb.rpc('salj_scoreboard');
    if(error)throw error;
    S.scoreboard=(data||[]).map(x=>({
      seller_id:x.seller_id,name:x.name,
      salj:Number(x.salj)||0,tillagg:Number(x.tillagg)||0
    }));
  }catch(e){
    S.scoreboard=[];
  }
  /* Raderade säljare ska inte synas i scoreboarden för någon */
  try{
    const r=await sb.from('sellers').select('id,deleted');
    const del=new Set((r.data||[]).filter(s=>s.deleted).map(s=>s.id));
    if(del.size)S.scoreboard=S.scoreboard.filter(x=>!del.has(x.seller_id));
  }catch(e){}
  /* Coach: hela lagets data för All statistik */
  if(S.role==='coach'){
    try{
      const sres=await sb.from('sellers').select('*').eq('active',true).order('name',{ascending:true});
      S.allSellers=(sres.data||[]).filter(s=>!s.deleted);
      const ares=await sb.from('seller_daily_stats').select('*').order('date',{ascending:true});
      S.allStats=ares.data||[];
      const mres=await sb.from('salj_monthly_dialer').select('*');
      S.allMonthlyDialer=mres.data||[];
    }catch(e){S.allSellers=[];S.allStats=[];S.allMonthlyDialer=[];}
  }
}

/* ============================================================

   ============================================================ */
function showOnly(id){
  ['loader','login-screen','forgot-screen','reset-screen','app'].forEach(x=>{
    const el=document.getElementById(x);
    if(!el)return;
    if(x===id){el.style.display=(x==='app'||x==='loader')?'flex':'block';el.classList&&el.classList.add('show');}
    else{el.style.display='none';el.classList&&el.classList.remove('show');}
  });
}

function paintSidebar(){
  const name=(S.seller&&S.seller.name)||(S.profile&&S.profile.full_name)||(S.user&&S.user.email)||'Användare';
  document.getElementById('sb-username').textContent=name;
  document.getElementById('sb-avatar').textContent=(name[0]||'?').toUpperCase();
  document.getElementById('sb-role').textContent=S.role==='coach'?'COACH':'SÄLJARE';
  /* Coach-only synlighet */
  const isCoach=S.role==='coach';
  document.querySelectorAll('.coach-only').forEach(el=>{el.style.display=isCoach?'':'none';});
}

function render(){
  const main=document.getElementById('main');
  if(S.tab==='dashboard')renderDashboard(main);
  else if(S.tab==='dagligt')renderDagligt(main);
  else if(S.tab==='historik')renderHistorik(main);
  else if(S.tab==='provision')renderProvision(main);
  else if(S.tab==='allstats')renderAllStats(main);
  else if(S.tab==='tavlingar')renderTavlingar(main);
  else if(S.tab==='team')renderSellers(main);
  else if(S.tab==='produktutbildning')renderTraining(main,'prod');
  else if(S.tab==='saljutbildning')renderTraining(main,'salj');
  else if(S.tab==='ljudfiler')renderLjudfiler(main);
  else if(S.tab==='coachning')renderCoachning(main);
  else if(S.tab==='teamstats')renderTeamStats(main);
  else if(S.tab==='mal')renderMal(main);
  else if(S.tab==='kalender')renderKalender(main);
  else renderPlaceholder(main,S.tab);
}

function renderDashboard(main){
  const isCoach=S.role==='coach';
  const thisMonth=new Date().toISOString().slice(0,7);
  const days=S.dailyStats.filter(d=>String(d.date).slice(0,7)===thisMonth);
  const totSamtal=sum(days,'samtal');
  const totSalj=sum(days,'sold_s189')+sum(days,'sold_s229')+sum(days,'sold_s279');
  const totAktiv=sum(days,'aktiv_min');
  const totProv=days.reduce((a,d)=>a+dayProvision(d),0);
  const nDays=days.length;
  const avgSamtal=nDays?Math.round(totSamtal/nDays):0;
  const avgSalj=nDays?(totSalj/nDays).toFixed(1):'0';
  const avgProv=nDays?Math.round(totProv/nDays):0;
  const conv=totSamtal?((totSalj/totSamtal)*100).toFixed(1):'0';
  const md=(S.monthlyDialer||[]).find(m=>m.month===thisMonth);
  const monthNej=sum(days,'nej');
  const monthCbPriv=days.reduce((a,d)=>a+n(d.dialer&&d.dialer.cb_private),0);
  const aktItem=(l,v)=>`<div class="prov-item"><span class="pl">${l}</span><span class="pv">${v}</span></div>`;

        <div class="sec-body"><div class="prov-grid">
          ${aktItem('Snittsamtalstid',md&&md.avg_conv_sec?fmtSec(md.avg_conv_sec):'–')}
          ${aktItem('Not interested',monthNej)}
          ${aktItem('Privata callbacks',monthCbPriv)}
        </div></div>
      </div>`;

  let notice='';
  if(S.loadError){
    notice=`<div class="notice warn">⚠️ Kunde inte hämta all data: ${esc(S.loadError)}</div>`;
  }else if(!S.seller){
    notice=`<div class="notice warn">⚠️ Ditt konto är inte kopplat till en säljarprofil ännu. Be coachen länka kontot (auth → sellers) så fylls dina siffror i.</div>`;
  }

  main.innerHTML=`
    <div class="ph">
      <div>
        <div class="ph-t">Dashboard <span class="role-pill">${isCoach?'Coach':'Säljare'}</span></div>
        <div class="ph-s">Översikt över ${isCoach?'din och teamets':'din'} försäljning denna månad</div>
      </div>
    </div>
    <div class="ca">
      ${notice}
      <div style="font-size:12px;color:var(--mu);margin-bottom:1rem;line-height:1.5;">📅 Siffrorna gäller innevarande månad och nollställs vid varje månadsskifte. Hela historiken finns kvar under <strong>Historik</strong>.</div>
      ${isCoach?'<h2 style="font-size:13px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;">👤 Min statistik</h2>':''}
      <div class="kpi-grid">
        <div class="kpi fade-in"><div class="kpi-ic blue">📞</div><div class="kpi-l">Samtal</div><div class="kpi-v">${totSamtal}</div><div class="kpi-sub">Snitt ${avgSamtal}/dag</div></div>
        <div class="kpi fade-in"><div class="kpi-ic green">✓</div><div class="kpi-l">Sälj</div><div class="kpi-v">${totSalj}</div><div class="kpi-sub">Snitt ${avgSalj}/dag</div></div>
        <div class="kpi fade-in"><div class="kpi-ic gold">€</div><div class="kpi-l">Provision</div><div class="kpi-v">€${totProv}</div><div class="kpi-sub">Snitt €${avgProv}/dag</div></div>
        <div class="kpi fade-in"><div class="kpi-ic purple">📊</div><div class="kpi-l">Konvertering</div><div class="kpi-v">${conv}%</div><div class="kpi-sub">Sälj per samtal</div></div>
      </div>
      ${renderSellerPackages(days)}

function renderSellerPackages(days){

  const addon=sum(days,'sold_a49')+sum(days,'sold_a79')+sum(days,'sold_a99');

    <div class="sec fade-in">
      <div class="sec-hdr"><h3>📦 Mina sålda paket</h3><span style="font-size:11px;color:var(--mu);">Denna månad</span></div>

        <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:0;">
          ${box('Singel',singel,'#EAF4EE','var(--g)')}

          ${box('Familj',familj,'#EAF4EE','var(--g)')}
          ${box('Tilläggstjänster',addon,'var(--purplel)','var(--purple)')}

}

function scoreboardRows(){
  const board=S.scoreboard.map(x=>({...x,total:x.salj+x.tillagg})).sort((a,b)=>b.total-a.total);
  const meId=S.seller&&S.seller.id;
  const maxT=Math.max(...board.map(b=>b.total),1);
  if(!board.length)return '<div class="empty"><p>Inga säljare att jämföra ännu</p><small>Scoreboarden fylls när säljare registrerat statistik</small></div>';
  return board.map((b,i)=>{
    const isMe=b.seller_id===meId;
    const pct=(b.total/maxT)*100;
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return `
      <div style="display:grid;grid-template-columns:30px 1fr 90px 80px 80px;gap:10px;align-items:center;padding:9px 12px;background:${isMe?'#FAEEDA':'var(--bg)'};border:1px solid ${isMe?'var(--gold)':'var(--bg2)'};border-radius:8px;margin-bottom:6px;">
        <div style="font-size:14px;font-weight:700;color:${isMe?'var(--gold)':'var(--mu)'};text-align:center;">${medal||(i+1)}</div>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--tx);">${esc(b.name)}${isMe?' <span style="font-size:10px;color:var(--gold);background:var(--w);padding:1px 6px;border-radius:4px;font-weight:700;">DU</span>':''}</div>
          <div style="height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:4px;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${isMe?'var(--gold),#E8C76A':'var(--g),var(--gt)'});border-radius:3px;"></div></div>
        </div>
        <div style="text-align:center;"><div style="font-size:10px;color:var(--mu);text-transform:uppercase;font-weight:600;">Sälj</div><div style="font-size:14px;font-weight:700;color:var(--g);">${b.salj}</div></div>
        <div style="text-align:center;"><div style="font-size:10px;color:var(--mu);text-transform:uppercase;font-weight:600;">Tillägg</div><div style="font-size:14px;font-weight:700;color:var(--purple);">${b.tillagg}</div></div>
        <div style="text-align:center;"><div style="font-size:10px;color:var(--mu);text-transform:uppercase;font-weight:600;">Totalt</div><div style="font-size:14px;font-weight:700;">${b.total}</div></div>
      </div>`;
  }).join('');
}

            <div class="prov-item"><span class="pl">Provision idag</span><span class="pv" id="ps-prov" style="color:var(--gold);">€0</span></div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1.2rem;">
            <button class="btn btn-d" id="reset-btn">↺ Nollställ</button>
            <button class="btn btn-p" id="save-btn">💾 Spara dagens rapport</button>
          </div>
          <div id="save-msg" style="text-align:right;margin-top:.6rem;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;"></div>
        </div>
      </div>
    </div>`;

  function val(id){return parseInt(document.getElementById(id).value)||0;}
  function collect(){
    ['s189','s229','s279','a49','a79','a99'].forEach(k=>{
      d['sold_'+k]=val('f-'+k);d['ang_'+k]=val('f-a'+k);
    });
  }
  function refresh(){
    collect();
    document.getElementById('ps-pkg').textContent=dayTotalSalj(d);
    document.getElementById('ps-add').textContent=dayTotalAddon(d);
    document.getElementById('ps-ang').textContent=dayTotalAng(d);
    document.getElementById('ps-prov').textContent='€'+dayProvision(d);
  }
  main.querySelectorAll('input[type=number]').forEach(inp=>inp.addEventListener('input',refresh));
  refresh();

  document.getElementById('report-seller').addEventListener('change',e=>{
    S.reportSeller=e.target.value;renderDagligt(main);
  });
  document.getElementById('report-date').addEventListener('change',e=>{
    if(e.target.value){S.reportDate=e.target.value;renderDagligt(main);}
  });
  document.getElementById('reset-btn').addEventListener('click',()=>{
    if(!confirm('Nollställ alla siffror för '+esc(sellerObj.name)+' '+S.reportDate+'?'))return;
    main.querySelectorAll('input[type=number]').forEach(inp=>inp.value=0);
    refresh();
  });
  document.getElementById('save-btn').addEventListener('click',async()=>{
    collect();
    const btn=document.getElementById('save-btn');
    btn.disabled=true;btn.textContent='Sparar…';
    let error=null;
    try{error=await saveDailyReport(d,S.reportSeller);}catch(e){error=e;}
    if(error){
      btn.disabled=false;btn.textContent='💾 Spara dagens rapport';
      const msg=document.getElementById('save-msg');
      msg.style.color='var(--err)';msg.textContent='✗ Kunde inte spara: '+(error.message||error);msg.style.opacity='1';
      return;
    }
    await loadDashboardData();
    renderDagligt(main);
    const msg=document.getElementById('save-msg');
    if(msg){msg.style.color='var(--g)';msg.textContent='✓ Sparat!';msg.style.opacity='1';
      setTimeout(()=>{const m=document.getElementById('save-msg');if(m)m.style.opacity='0';},2200);}
  });
}

  const isCoach=S.role==='coach';
  const r=ROLES[isCoach?'coach':'saljare'];
  function cat(key,name){
    const sold=sum(days,'sold_'+key),ang=sum(days,'ang_'+key);
    return {name,rate:r[key],sold,ang,net:sold-ang,prov:(sold-ang)*r[key]};

  const singel=cat('s189','Singel'),par=cat('s229','Par'),familj=cat('s279','Familj');

      <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">
        <div class="kpi fade-in" style="background:linear-gradient(135deg,#FAEEDA,#fff);"><div class="kpi-ic gold">€</div><div class="kpi-l">Provision denna månad</div><div class="kpi-v" style="color:var(--gold);">€${totProv}</div><div class="kpi-sub">${nDays} dagars arbete</div></div>
        <div class="kpi fade-in"><div class="kpi-ic blue">📊</div><div class="kpi-l">Snitt per dag</div><div class="kpi-v">€${avg}</div><div class="kpi-sub">Provision/arbetsdag</div></div>
      </div>
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>💼 Översikt</h3><span style="font-size:11px;color:var(--mu);">Provision räknas på netto (sålda − ångrade)</span></div>

/* ============================================================
   COACHPROVISION — coachens provision på hela teamets sälj
   Singel €2, Par €4, Familj €6, varje tilläggstjänst €2.
   ============================================================ */
function renderCoachProvision(main){
  const thisMonth=new Date().toISOString().slice(0,7);
  const cap=fmtMonth(thisMonth);
  const myId=(S.seller&&S.seller.id)||null;
  const sumK=(arr,k)=>arr.reduce((a,d)=>a+n(d[k]),0);
  /* Team-coachprovision (alla säljare utom coachen själv): Singel 2, Par 4, Familj 6, tillägg 2 */
  const teamRows=(S.allStats||[]).filter(d=>String(d.date).slice(0,7)===thisMonth&&d.seller_id!==myId);
  const sellers=(S.allSellers||[]).filter(s=>s.id!==myId);
  const tSg=sumK(teamRows,'sold_s189'),tPa=sumK(teamRows,'sold_s229'),tFa=sumK(teamRows,'sold_s279');
  const tAd=sumK(teamRows,'sold_a49')+sumK(teamRows,'sold_a79')+sumK(teamRows,'sold_a99');
  const teamProv=tSg*2+tPa*4+tFa*6+tAd*2;
  /* Coachens egna sälj: Singel 5, Par 10, Familj 15, tillägg 5 */
  const ownRows=(S.dailyStats||[]).filter(d=>String(d.date).slice(0,7)===thisMonth);
  const oSg=sumK(ownRows,'sold_s189'),oPa=sumK(ownRows,'sold_s229'),oFa=sumK(ownRows,'sold_s279');
  const oAd=sumK(ownRows,'sold_a49')+sumK(ownRows,'sold_a79')+sumK(ownRows,'sold_a99');
  const oPSg=oSg*5,oPPa=oPa*10,oPFa=oFa*15,oPAd=oAd*5,ownProv=oPSg+oPPa+oPFa+oPAd;
  const grand=teamProv+ownProv;
  const perSeller=sellers.map(s=>{
    const sr=teamRows.filter(d=>d.seller_id===s.id);
    const a=k=>sr.reduce((x,d)=>x+n(d[k]),0);
    const ssg=a('sold_s189'),spa=a('sold_s229'),sfa=a('sold_s279');
    const sad=a('sold_a49')+a('sold_a79')+a('sold_a99');
    return {name:s.name,sg:ssg,pa:spa,fa:sfa,ad:sad,prov:ssg*2+spa*4+sfa*6+sad*2};
  }).filter(x=>x.prov>0).sort((a,b)=>b.prov-a.prov);
  /* Säljarnas EGEN provision (säljartariff 5/10/15/5) */
  const SR=ROLES.saljare;
  const sellerProv=sellers.map(s=>{
    const sr=teamRows.filter(d=>d.seller_id===s.id);
    const a=k=>sr.reduce((x,d)=>x+n(d[k]),0);
    const sg=a('sold_s189'),pa=a('sold_s229'),fa=a('sold_s279');
    const ad=a('sold_a49')+a('sold_a79')+a('sold_a99');
    return {name:s.name,sg,pa,fa,ad,prov:sg*SR.s189+pa*SR.s229+fa*SR.s279+ad*SR.a49};
  }).sort((a,b)=>b.prov-a.prov);
  const sellerProvTot=sellerProv.reduce((a,x)=>a+x.prov,0);
  const catRow=(name,rate,cnt,prov)=>`<tr>
    <td class="h-day">${name}</td>
    <td class="h-num" style="color:var(--gold);">€${rate}</td>
    <td class="h-num salj">${cnt}</td>
    <td class="h-num" style="color:var(--gold);">€${prov}</td>
  </tr>`;
  main.innerHTML=`
    <div class="ph"><div><div class="ph-t">Provision <span class="role-pill">Coach</span></div><div class="ph-s">Coachprovision på teamet och dina egna sälj</div></div></div>
    <div class="ca">
      <div style="font-size:12px;color:var(--mu);margin-bottom:1rem;line-height:1.5;">📅 Avser ${cap} och uppdateras automatiskt när statistik importeras.</div>
      <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">
        <div class="kpi fade-in"><div class="kpi-ic gold">€</div><div class="kpi-l">Coachprovision (teamet)</div><div class="kpi-v" style="color:var(--gold);">€${teamProv}</div><div class="kpi-sub">Säljarnas försäljning</div></div>
        <div class="kpi fade-in"><div class="kpi-ic gold">€</div><div class="kpi-l">Provision egna sälj</div><div class="kpi-v" style="color:var(--gold);">€${ownProv}</div><div class="kpi-sub">Din egen försäljning</div></div>
        <div class="kpi fade-in"><div class="kpi-ic green">€</div><div class="kpi-l">Säljarnas provision</div><div class="kpi-v" style="color:var(--g);">€${sellerProvTot}</div><div class="kpi-sub">Alla säljares egen provision</div></div>
        <div class="kpi fade-in" style="background:linear-gradient(135deg,#FAEEDA,#fff);"><div class="kpi-ic gold">€</div><div class="kpi-l">Totalt ${cap}</div><div class="kpi-v" style="color:var(--gold);">€${grand}</div><div class="kpi-sub">Team + egna sälj</div></div>
      </div>
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>👤 Egna sälj</h3><span style="font-size:11px;color:var(--mu);">Din egen försäljning</span></div>
        <div class="sec-body" style="padding:0;">
          <div class="htable-wrap"><table class="htable">
            <thead><tr><th>Kategori</th><th>Provision/st</th><th>Antal sålda</th><th>Total</th></tr></thead>
            <tbody>
              ${catRow('Singel',5,oSg,oPSg)}
              ${catRow('Par',10,oPa,oPPa)}
              ${catRow('Familj',15,oFa,oPFa)}
              ${catRow('Tilläggstjänst',5,oAd,oPAd)}
              <tr class="tot-row"><td>TOTALT</td><td></td><td>${oSg+oPa+oFa+oAd}</td><td style="color:var(--gold);">€${ownProv}</td></tr>
            </tbody>
          </table></div>
        </div>
      </div>
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>👥 Coachprovision per säljare</h3><span style="font-size:11px;color:var(--mu);">Sorterat på provision</span></div>
        <div class="sec-body" style="padding:0;">
          ${perSeller.length===0?'<div class="empty"><p>Ingen försäljning '+cap+' ännu</p><small>Importera statistik så fylls det i</small></div>':`
          <div class="htable-wrap"><table class="htable">
            <thead><tr><th>Säljare</th><th>Singel</th><th>Par</th><th>Familj</th><th>Tillägg</th><th>Coachprovision</th></tr></thead>
            <tbody>
              ${perSeller.map(x=>`<tr>
                <td class="h-day">${esc(x.name)}</td>
                <td class="h-num">${x.sg}</td>
                <td class="h-num">${x.pa}</td>
                <td class="h-num">${x.fa}</td>
                <td class="h-num" style="color:var(--purple);">${x.ad}</td>
                <td class="h-num" style="color:var(--gold);">€${x.prov}</td>
              </tr>`).join('')}
            </tbody>
          </table></div>`}
        </div>
      </div>
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>💰 Säljarnas provision</h3><span style="font-size:11px;color:var(--mu);">Vad varje säljare själv tjänar in</span></div>
        <div class="sec-body" style="padding:0;">
          ${sellerProv.length===0?'<div class="empty"><p>Inga säljare</p></div>':`
          <div class="htable-wrap"><table class="htable">
            <thead><tr><th>Säljare</th><th>Singel</th><th>Par</th><th>Familj</th><th>Tillägg</th><th>Provision</th></tr></thead>
            <tbody>
              ${sellerProv.map(x=>`<tr>
                <td class="h-day">${esc(x.name)}</td>
                <td class="h-num">${x.sg}</td>
                <td class="h-num">${x.pa}</td>
                <td class="h-num">${x.fa}</td>
                <td class="h-num" style="color:var(--purple);">${x.ad}</td>
                <td class="h-num" style="color:var(--gold);">€${x.prov}</td>
              </tr>`).join('')}
              <tr class="tot-row"><td>TOTALT ALLA SÄLJARE</td><td></td><td></td><td></td><td></td><td style="color:var(--gold);">€${sellerProvTot}</td></tr>
            </tbody>
          </table></div>`}
        </div>
      </div>
    </div>`;
}

function circleCard(label,sub,pct,color){
  const r=66,circ=2*Math.PI*r;
  const off=circ-(Math.min(Math.max(pct,0),100)/100)*circ;
  return `<div class="circ-card">
    <div class="circ-wrapper">
      <svg class="circ-svg" viewBox="0 0 160 160">
        <circle class="circ-bg" cx="80" cy="80" r="${r}"/>
        <circle class="circ-fg" cx="80" cy="80" r="${r}" stroke="${color}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
      </svg>
      <div><div class="circ-pct" style="color:${color};">${pct.toFixed(1)}%</div><div class="circ-label">${sub}</div></div>
    </div>
    <div class="circ-title">${label}</div>
  </div>`;
}

function renderAllStatsTeam(rows){
  const t=k=>rows.reduce((a,d)=>a+n(d[k]),0);
  const samtal=t('samtal'),nej=t('nej'),callbacks=t('callbacks');
  const thisMonth=new Date().toISOString().slice(0,7);
  const aktiv=(S.allMonthlyDialer||[]).filter(m=>m.month===thisMonth).reduce((a,m)=>a+n(m.active_min),0);
  const salj=t('sold_s189')+t('sold_s229')+t('sold_s279');
  const addon=t('sold_a49')+t('sold_a79')+t('sold_a99');
  const invalid=rows.reduce((a,d)=>a+n(d.dialer&&d.dialer.invalid_leads),0);
  const unqual=rows.reduce((a,d)=>a+n(d.dialer&&d.dialer.unqualified),0);
  const bortfallN=invalid+unqual;
  const conv=samtal>0?(salj/samtal*100):0;
  const avslag=samtal>0?(nej/samtal*100):0;
  const ater=samtal>0?(callbacks/samtal*100):0;
  const bortfall=samtal>0?(bortfallN/samtal*100):0;
  const perSeller=S.allSellers.map(s=>{
    const sr=rows.filter(d=>d.seller_id===s.id);
    const ss=k=>sr.reduce((a,d)=>a+n(d[k]),0);
    const ssamtal=ss('samtal');
    const ssalj=ss('sold_s189')+ss('sold_s229')+ss('sold_s279');
    const saddon=ss('sold_a49')+ss('sold_a79')+ss('sold_a99');
    return {name:s.name,samtal:ssamtal,salj:ssalj,addon:saddon,

/* ============================================================
   STATISTIK-IMPORT — säljfil + aktivitetsfil (dialer)
   ============================================================ */
function importMatchSeller(name){
  const q=String(name||'').toLowerCase().trim();
  if(!q)return null;
  let m=(S.allSellers||[]).find(s=>(s.name||'').toLowerCase().trim()===q||(s.email||'').toLowerCase().trim()===q);
  if(m)return m;
  const fn=(S.allSellers||[]).filter(s=>(s.name||'').toLowerCase().trim().split(/\s+/)[0]===q);
  return fn.length===1?fn[0]:null;
}

function readSheet(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('Kunde inte läsa "'+file.name+'".'));
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        resolve(XLSX.utils.sheet_to_json(ws,{defval:'',raw:false}));
      }catch(e){reject(new Error('Kunde inte tolka "'+file.name+'": '+(e.message||e)));}
    };
    reader.readAsArrayBuffer(file);
  });
}

function colFinder(rows){
  const headers=Object.keys(rows[0]||{});
  const lower=headers.map(h=>String(h).toLowerCase().trim());
  return (...kw)=>{for(const k of kw){const i=lower.findIndex(h=>h.includes(k));if(i>=0)return headers[i];}return null;};
}

/* Leadfil: en rad per kontaktad lead, med datum. Bucketas per säljare + dag. */
function parseLeadLog(rows){
  if(!rows.length)return {error:'Leadfilen innehåller inga rader.'};
  const find=colFinder(rows);
  const headers=Object.keys(rows[0]||{});
  const cSeller=find('last contacted by','contacted by','säljare','saljare','user');
  /* "Last contacted" och "Last contacted by" delar prefix — uteslut säljarkolumnen
     så datumkolumnen inte förväxlas med den, oavsett kolumnordning i filen. */
  const cDate=headers.find(h=>{
    const lh=String(h).toLowerCase().trim();
    return h!==cSeller&&(lh.indexOf('last contacted')>=0||lh.indexOf('datum')>=0||lh==='date');
  })||null;
  const cStatus=find('status');
  const cPkg=find('välj paket','valj paket','paket','package');
  const cAddon=find('tilläggstjänst','tillaggstjanst','tillägg','tillagg','addon');
  const cCamp=find('campaign','kampanj');
  if(!cSeller||!cDate)return {error:'behöver en säljarkolumn ("Last contacted by") och en datumkolumn ("Last contacted").'};
  const pkg=v=>{v=String(v||'').toLowerCase();return v.includes('singel')?'s189':v.includes('par')?'s229':v.includes('familj')?'s279':null;};
  const add=v=>{v=String(v||'').toLowerCase();return v.includes('singel')?'a49':v.includes('par')?'a79':v.includes('familj')?'a99':null;};
  const byKey={},unmatched=new Set();let skipped=0;
  rows.forEach(r=>{
    if(cCamp){const camp=String(r[cCamp]||'').toLowerCase().trim();if(camp&&camp!=='letuscook'){skipped++;return;}}
    const nm=String(r[cSeller]||'').trim();
    if(!nm)return;                                 // tom säljare = automatisk återuppringning
    const seller=importMatchSeller(nm);
    if(!seller){unmatched.add(nm);return;}
    const date=String(r[cDate]||'').slice(0,10);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date))return;
    const key=seller.id+'|'+date;
    let a=byKey[key];
    if(!a)a=byKey[key]={seller_id:seller.id,_name:seller.name,date:date,
      samtal:0,nej:0,callbacks:0,
      sold_s189:0,sold_s229:0,sold_s279:0,sold_a49:0,sold_a79:0,sold_a99:0,
      invalid:0,unqualified:0,cb_private:0,cb_shared:0,cb_vip:0};
    a.samtal++;
    const st=String(r[cStatus]||'').toLowerCase().trim();
    if(st==='success'){
      const pk=pkg(r[cPkg]);if(pk)a['sold_'+pk]++;
      if(cAddon){const ak=add(r[cAddon]);if(ak)a['sold_'+ak]++;}
    }else if(st==='not interested'){a.nej++;}
    else if(st==='invalid'){a.invalid++;}
    else if(st==='unqualified'){a.unqualified++;}
    if(st.indexOf('callback')>=0){
      a.callbacks++;
      if(st.indexOf('private')>=0)a.cb_private++;
      else if(st.indexOf('shared')>=0)a.cb_shared++;
      else if(st.indexOf('vip')>=0)a.cb_vip++;
    }
  });
  return {byKey,unmatched:[...unmatched],skipped};
}

/* Fil 2: dialer-aktivitet — endast kampanjen Letuscook räknas. */
function parseDialerFile(rows){
  if(!rows.length)return {error:'Aktivitetsfilen innehåller inga rader.'};
  const find=colFinder(rows);
  const cUser=find('users','user');
  const cCamp=find('campaign');
  const cCalls=find('number of calls','antal samtal');
  const cNej=find('not interested','ej intress');
  const cInval=find('invalid leads','ogiltig');
  const cActive=find('active time');
  const cAvg=find('average conversation','snittsamtal');
  if(!cUser)return {error:'behöver en "Users"-kolumn.'};
  const num=(r,c)=>{if(!c)return 0;const v=parseFloat(String(r[c]).replace(',','.'));return isNaN(v)?0:v;};
  const bySeller={},unmatched=new Set();let skipped=0;
  rows.forEach(r=>{
    if(cCamp){const camp=String(r[cCamp]||'').toLowerCase().trim();if(camp!=='letuscook'){skipped++;return;}}
    const nm=String(r[cUser]||'').trim();
    if(!nm||nm.toLowerCase()==='no user')return;
    const seller=importMatchSeller(nm);
    if(!seller){unmatched.add(nm);return;}
    let a=bySeller[seller.id];
    if(!a)a=bySeller[seller.id]={_name:seller.name,samtal:0,nej:0,aktiv_min:0,invalid:0,_avgSum:0,_avgN:0};
    a.samtal+=Math.round(num(r,cCalls));
    a.nej+=Math.round(num(r,cNej));
    a.invalid+=Math.round(num(r,cInval));
    a.aktiv_min+=hmsToMin(cActive?r[cActive]:0);
    const sec=hmsToSec(cAvg?r[cAvg]:0);
    if(sec>0){a._avgSum+=sec;a._avgN++;}
  });
  return {bySeller,unmatched:[...unmatched],skipped};
}

    result.style.borderLeft='3px solid '+(bad?'var(--err)':'var(--g)');
    result.textContent=msg;
  }
  function slot(num){
    const drop=ov.querySelector('#imp-drop'+num),fi=ov.querySelector('#imp-file'+num),tx=ov.querySelector('#imp-text'+num);
    drop.addEventListener('click',()=>fi.click());
    fi.addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      if(num===1)file1=f;else file2=f;
      tx.textContent='📄 '+f.name;
    });
  }
  slot(1);slot(2);
  function close(){mc.innerHTML='';render();}
  ov.querySelector('#imp-close').addEventListener('click',close);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('#imp-run').addEventListener('click',async()=>{
    const btn=ov.querySelector('#imp-run');
    if(!file1&&!file2){show('Välj minst en fil att importera.',true);return;}
    if(typeof XLSX==='undefined'){show('Excel-biblioteket kunde inte laddas. Kontrollera internet och försök igen.',true);return;}
    btn.disabled=true;btn.textContent='Importerar…';
    function fail(m){show(m,true);btn.disabled=false;btn.textContent='Importera';}
    const month=ov.querySelector('#imp-month').value||new Date().toISOString().slice(0,7);
    const monthStart=month+'-01';
    const yp=month.split('-').map(Number);
    const nx=new Date(yp[0],yp[1],1);
    const nextStart=nx.getFullYear()+'-'+String(nx.getMonth()+1).padStart(2,'0')+'-01';
    let lead=null,dialer=null;
    try{
      if(file1){const r=parseLeadLog(await readSheet(file1));if(r.error)return fail('Leadfil: '+r.error);lead=r;}
      if(file2){const r=parseDialerFile(await readSheet(file2));if(r.error)return fail('Dialerfil: '+r.error);dialer=r;}
    }catch(e){return fail('✗ '+(e.message||e));}

    // --- Leadfilen → en dagsrad per säljare och dag i vald månad ---
    const dayRows=[],leadSellers=new Set();let otherMonth=0;
    if(lead){
      Object.keys(lead.byKey).forEach(k=>{
        const a=lead.byKey[k];
        if(a.date.slice(0,7)!==month){otherMonth++;return;}
        leadSellers.add(a.seller_id);
        dayRows.push({
          seller_id:a.seller_id,date:a.date,source:'import',
          samtal:a.samtal,nej:a.nej,callbacks:a.callbacks,aktiv_min:0,
          sold_s189:a.sold_s189,sold_s229:a.sold_s229,sold_s279:a.sold_s279,
          sold_a49:a.sold_a49,sold_a79:a.sold_a79,sold_a99:a.sold_a99,
          ang_s189:0,ang_s229:0,ang_s279:0,ang_a49:0,ang_a79:0,ang_a99:0,
          dialer:{invalid_leads:a.invalid,unqualified:a.unqualified,
                  cb_private:a.cb_private,cb_shared:a.cb_shared,cb_vip:a.cb_vip},
          updated_at:new Date().toISOString()
        });
      });
    }
    // --- Dialerfilen → en månadsrad per säljare (aktiv tid + snittsamtalstid) ---
    const monthRows=[],dialerSellers=new Set();
    if(dialer){
      Object.keys(dialer.bySeller).forEach(sid=>{
        const av=dialer.bySeller[sid];
        dialerSellers.add(sid);
        monthRows.push({seller_id:sid,month:month,
          active_min:av.aktiv_min,
          avg_conv_sec:av._avgN>0?Math.round(av._avgSum/av._avgN):0,
          updated_at:new Date().toISOString()});
      });
    }
    const names=[...new Set([...[...leadSellers],...[...dialerSellers]].map(sid=>{
      const a=lead&&Object.values(lead.byKey).find(x=>x.seller_id===sid);
      const v=dialer&&dialer.bySeller[sid];
      return (a&&a._name)||(v&&v._name)||sid;
    }))];
    if(!leadSellers.size&&!dialerSellers.size){
      const um=[...new Set([...(lead?lead.unmatched:[]),...(dialer?dialer.unmatched:[])])];
      return fail('Inga rader matchade en säljare i systemet.'+(um.length?'\nOmatchade namn: '+um.join(', '):''));
    }
    show('Importerar…',false);
    // 1. Leadfil: ersätt månadens dagsrader för berörda säljare
    if(lead&&dayRows.length){
      let delErr=null;
      try{const dr=await sb.from('seller_daily_stats').delete().in('seller_id',[...leadSellers]).gte('date',monthStart).lt('date',nextStart);delErr=dr.error;}catch(e){delErr=e;}
      if(delErr)return fail('✗ Kunde inte rensa månaden: '+(delErr.message||delErr));
      let insErr=null;
      try{const ir=await sb.from('seller_daily_stats').upsert(dayRows,{onConflict:'seller_id,date'});insErr=ir.error;}catch(e){insErr=e;}
      if(insErr)return fail('✗ Kunde inte spara leadstatistiken: '+(insErr.message||insErr)+'\nKör om importen.');
    }
    // 2. Dialerfil: månadssiffror
    if(dialer&&monthRows.length){
      let dErr=null;
      try{const dres=await sb.from('salj_monthly_dialer').upsert(monthRows,{onConflict:'seller_id,month'});dErr=dres.error;}catch(e){dErr=e;}
      if(dErr)show('⚠️ Leadstatistiken sparades, men dialer-månadssiffrorna kunde inte sparas: '+(dErr.message||dErr),true);
    }
    await loadDashboardData();
    const um=[...new Set([...(lead?lead.unmatched:[]),...(dialer?dialer.unmatched:[])])];
    let msg='✓ Import klar för '+fmtMonth(month);
    if(lead)msg+='\n'+dayRows.length+' dagsrader från leadfilen ('+leadSellers.size+' säljare).';
    if(dialer)msg+='\n'+monthRows.length+' säljare fick dialer-månadssiffror.';
    msg+='\nSäljare: '+names.join(', ');
    if(otherMonth)msg+='\n'+otherMonth+' rad(er) gällde annan månad och hoppades över.';
    if(lead&&lead.skipped)msg+='\n'+lead.skipped+' rad(er) hoppades över (ej kampanjen Letuscook).';
    if(um.length)msg+='\n'+um.length+' omatchade namn hoppades över: '+um.join(', ');
    show(msg,false);
    btn.textContent='Klar';
  });
  mc.innerHTML='';mc.appendChild(ov);
}

function compDaysLeft(end){return Math.ceil((new Date(end+'T23:59:59')-new Date())/86400000);}
function fmtPeriod(s,e){
  const f=d=>{const x=new Date(d+'T00:00:00');return isNaN(x.getTime())?d:x.toLocaleDateString('sv-SE',{day:'numeric',month:'short'});};
  return f(s)+' – '+f(e);
}
function fireConfetti(){
  const colors=['#1E5C4E','#C8A84B','#E8C76A','#5C9DEA','#ffffff','#7BC47F'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*8)+'px';
    c.style.height=(9+Math.random()*11)+'px';
    c.style.animation='confettiFall '+(2.6+Math.random()*2.2)+'s linear '+(Math.random()*1.4)+'s forwards';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),7200);
  }
}

function renderTavlingar(main){
  main.innerHTML=`<div class="ph"><div><div class="ph-t">🏆 Tävlingar</div><div class="ph-s">Laddar…</div></div></div>
    <div class="ca"><div class="empty"><p>Laddar tävlingar…</p></div></div>`;
  loadAndRenderTavlingar(main);
}

async function loadAndRenderTavlingar(main){
  let comps=[];
  try{
    const {data}=await sb.from('competitions').select('*').order('created_at',{ascending:false});
    comps=data||[];
  }catch(e){}
  S.competitions=comps;
  S.standings={};
  for(const c of comps){
    try{
      const {data}=await sb.rpc('competition_standings',{p_competition_id:c.id});
      S.standings[c.id]=(data||[]).map(x=>({seller_id:x.seller_id,name:x.name,score:Number(x.score)||0}));
    }catch(e){S.standings[c.id]=[];}
  }
  if(S.role==='coach'){
    try{const r=await sb.from('sellers').select('id,name,active,deleted').order('name',{ascending:true});
      S.allSellers=(r.data||[]).filter(s=>s.active&&!s.deleted);}catch(e){}
  }
  if(S.tab!=='tavlingar')return;
  if(S.role==='coach')renderTavlingarCoach(main);
  else renderTavlingarSeller(main);
}

/* Lag-poäng: summan av de deltagande säljarnas poäng (gruppmål) */
function compTeamScore(c){
  const st=S.standings[c.id]||[];
  const ids=Array.isArray(c.participant_ids)?c.participant_ids:[];
  const rel=ids.length?st.filter(s=>ids.indexOf(s.seller_id)>=0):st;
  return rel.reduce((a,s)=>a+(Number(s.score)||0),0);
}

function renderTavlingarCoach(main){
  const active=S.competitions.filter(c=>c.active);
  const finished=S.competitions.filter(c=>!c.active);
  main.innerHTML=`

    </div>

      ${active.length>=3?'<div class="notice warn" style="background:#FAEEDA;color:var(--gd);border-color:var(--gold);">Du har 3 aktiva tävlingar – avsluta en innan du skapar en ny.</div>':''}

        </div>
      </div>

    if(!confirm('Avsluta tävlingen i förtid? Den flyttas till avslutade.'))return;
    const id=b.dataset.compEnd;
    const comp=S.competitions.find(x=>x.id===id);
    const st=S.standings[id]||[];
    const winner=(comp&&comp.type!=='lag'&&st[0]&&st[0].score>0)?st[0].seller_id:null;
    b.disabled=true;
    try{await sb.from('competitions').update({active:false,winner_id:winner}).eq('id',id);}catch(e){}
    render();

  }));

  const dl=compDaysLeft(c.end_date);
  const cnt=(Array.isArray(c.participant_ids)?c.participant_ids.length:0)||(S.standings[c.id]||[]).length;
  return `
    <div style="border:1px solid var(--br);border-radius:12px;padding:15px 16px;margin-bottom:11px;background:var(--w);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--tx);">${esc(c.title)}</div>
          <div style="font-size:12px;color:var(--mu);margin-top:3px;">${METRIC_ICON[c.metric]||'🎯'} ${esc(METRIC_LABELS[c.metric]||c.metric)} · ${fmtPeriod(c.start_date,c.end_date)} · ${dl>0?dl+' dagar kvar':(dl===0?'sista dagen':'tiden ute')} · 👥 ${cnt} säljare</div>
        </div>
        <span style="background:#FAEEDA;color:var(--gd);font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap;">GRUPPMÅL</span>

        <div style="height:11px;background:var(--bg2);border-radius:6px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--g),var(--gold));border-radius:6px;"></div></div>
      </div>
      ${c.prize?`<div style="margin-top:11px;font-size:11.5px;color:var(--gd);">🎁 Lagpris: ${esc(c.prize)}</div>`:''}
