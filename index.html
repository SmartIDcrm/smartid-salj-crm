        <div style="margin-bottom:1.2rem;"><label style="${lstyle}">Vilka säljare är med</label><div style="display:flex;flex-direction:column;gap:6px;max-height:175px;overflow-y:auto;">${sellerChecks}</div></div>
      </div>
      <div id="cn-msg" style="display:none;color:var(--err);font-size:12px;margin-bottom:.8rem;font-weight:600;"></div>
      <div class="modal-actions">
        <button class="btn btn-s" id="cn-cancel">Avbryt</button>
        <button class="btn btn-p" id="cn-save">Skapa tävling</button>
      </div>
    </div>`;
  let typ='individuell';
  ov.querySelectorAll('.cn-typ').forEach(btn=>btn.addEventListener('click',()=>{
    typ=btn.dataset.typ;
    ov.querySelectorAll('.cn-typ').forEach(b=>{
      const on=b.dataset.typ===typ;
      b.style.background=on?'var(--g)':'var(--bg)';
      b.style.color=on?'#fff':'var(--tx)';
      b.style.borderColor=on?'var(--g)':'var(--br)';
    });
    ov.querySelector('#cn-fi').style.display=typ==='individuell'?'':'none';
    ov.querySelector('#cn-fg').style.display=typ==='lag'?'':'none';
  }));
  ov.querySelector('#cn-cancel').addEventListener('click',()=>{mc.innerHTML='';});
  ov.addEventListener('click',e=>{if(e.target===ov)mc.innerHTML='';});
  ov.querySelector('#cn-save').addEventListener('click',async()=>{
    const msg=ov.querySelector('#cn-msg');
    function err(t){msg.style.display='block';msg.textContent=t;}
    const title=ov.querySelector('#cn-title').value.trim();
    const start=ov.querySelector('#cn-start').value;
    const end=ov.querySelector('#cn-end').value;
    if(!title){err('Ange en titel.');return;}
    if(!start||!end||end<start){err('Kontrollera start- och slutdatum.');return;}
    let row={title:title,start_date:start,end_date:end,active:true,type:typ};
    if(typ==='lag'){
      const goalRaw=ov.querySelector('#cn-goal-g').value;
      if(!goalRaw||parseInt(goalRaw)<1){err('Ange ett lagmål (minst 1).');return;}
      const pp=Array.from(ov.querySelectorAll('.cn-pp:checked')).map(c=>c.value);
      if(!pp.length){err('Välj minst en säljare som ska vara med.');return;}
      row.metric=ov.querySelector('#cn-metric-g').value;
      row.goal=parseInt(goalRaw);
      row.prize=ov.querySelector('#cn-prize-g').value.trim()||null;
      row.participant_ids=pp;
    }else{
      const goalRaw=ov.querySelector('#cn-goal').value;
      row.metric=ov.querySelector('#cn-metric').value;
      row.goal=goalRaw?parseInt(goalRaw):null;
      row.prize=ov.querySelector('#cn-prize').value.trim()||null;
      row.prize_2=ov.querySelector('#cn-prize2').value.trim()||null;
      row.prize_3=ov.querySelector('#cn-prize3').value.trim()||null;
      row.participant_ids=[];
    }
    const btn=ov.querySelector('#cn-save');btn.disabled=true;btn.textContent='Skapar…';
    let error=null;
    try{const res=await sb.from('competitions').insert(row);error=res.error;}catch(e){error=e;}
    if(error){btn.disabled=false;btn.textContent='Skapa tävling';err('Kunde inte spara: '+(error.message||error));return;}
    mc.innerHTML='';render();
  });
  mc.innerHTML='';mc.appendChild(ov);
}

function renderTavlingarSeller(main){
  const meId=S.seller&&S.seller.id;
  const active=S.competitions.filter(c=>{
    if(!c.active)return false;
    if(c.type==='lag'){
      const ids=Array.isArray(c.participant_ids)?c.participant_ids:[];
      return !ids.length||ids.indexOf(meId)>=0;
    }
    return true;
  });
  let leading=false;
  const cards=active.map(c=>{
    if(c.type==='lag')return compSellerGroupCard(c);
    const st=S.standings[c.id]||[];
    const myRank=st.findIndex(s=>s.seller_id===meId);
    const me_=myRank>=0?st[myRank]:{seller_id:meId,score:0};
    const leader=st[0]||{score:0,name:'–'};
    if(myRank===0&&leader.score>0)leading=true;
    return compSellerCard(c,st,myRank,me_,leader,meId);
  }).join('');
  main.innerHTML=`
    <div class="ph"><div><div class="ph-t">🏆 Tävlingar</div><div class="ph-s">Se hur du ligger till – kör hårt! 🔥</div></div></div>
    <div class="ca">
      ${active.length===0?'<div class="empty" style="padding:3.5rem 1rem;"><div style="font-size:46px;margin-bottom:.5rem;">🏆</div><p>Inga tävlingar igång just nu</p><small>Din coach lägger upp nya tävlingar här – håll utkik!</small></div>':`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;align-items:start;">${cards}</div>`}
    </div>`;
  if(leading)setTimeout(fireConfetti,400);
}

function compSellerCard(c,st,myRank,me_,leader,meId){
  const dl=compDaysLeft(c.end_date);
  const t3=st.slice(0,3);
  const podium=[t3[1],t3[0],t3[2]];
  const rankIdx=[1,0,2];
  const heights=[50,70,38];
  const medals=['🥈','🥇','🥉'];
  const barGrad=['linear-gradient(180deg,#C9CDD2,#A7ACB3)','linear-gradient(180deg,#E8C76A,#C8A84B)','linear-gradient(180deg,#D9A066,#B97F47)'];
  const isLeading=myRank===0&&leader.score>0;
  const gap=leader.score-me_.score;
  let status;
  if(c.goal){
    const pct=Math.min((me_.score/c.goal)*100,100);
    const done=me_.score>=c.goal;
    status=`<div style="font-size:11.5px;color:rgba(255,255,255,.9);margin-bottom:6px;font-weight:600;">Ditt mål: ${me_.score} / ${c.goal} ${done?'✅ KLART!':''}</div>
      <div style="height:9px;background:rgba(255,255,255,.22);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#E8C76A,#fff);border-radius:5px;transition:width 1.1s cubic-bezier(.2,.8,.2,1);"></div></div>`;
  }else if(isLeading){
    status='<div style="font-size:13.5px;font-weight:800;color:#fff;">🔥 Du leder – håll positionen!</div>';
  }else if(myRank<0||me_.score===0){
    status='<div style="font-size:12px;color:rgba(255,255,255,.9);">Kom igång – första poängen sätter dig på tavlan! 🚀</div>';
  }else{
    status=`<div style="font-size:12px;color:rgba(255,255,255,.92);">Du är <b>#${myRank+1}</b> – <b>${gap}</b> efter ${esc((leader.name||'').split(' ')[0])}. 💪</div>`;
  }
  const podiumHtml=podium.map((p,i)=>{
    if(!p)return '<div style="width:70px;"></div>';
    const isMe=p.seller_id===meId;
    const initial=((p.name||'?').trim()[0]||'?').toUpperCase();
    return `
      <div style="width:70px;display:flex;flex-direction:column;align-items:center;">
        <div style="font-size:21px;line-height:1;">${medals[i]}</div>
        <div style="width:32px;height:32px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin:3px 0 2px;${isMe?'box-shadow:0 0 0 2.5px var(--gold),0 0 10px rgba(200,168,75,.6);':''}">${initial}</div>
        <div style="font-size:10.5px;font-weight:700;color:var(--tx);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;">${esc((p.name||'').split(' ')[0])}${isMe?' (du)':''}</div>
        <div style="font-size:15px;font-weight:800;color:var(--g);margin:0 0 3px;">${p.score}</div>
        <div class="podium-bar" style="width:54px;height:${heights[i]}px;background:${barGrad[i]};animation-delay:${i*0.13}s;">
          <span style="font-size:12px;font-weight:800;color:rgba(255,255,255,.95);">${rankIdx[i]+1}</span>
        </div>
      </div>`;
  }).join('');
  const rankList=st.map((s,i)=>{
    const isMe=s.seller_id===meId;
    const medal=i<3?['🥇','🥈','🥉'][i]:'<span style="display:inline-block;width:16px;text-align:center;color:var(--mu);font-weight:700;font-size:11px;">'+(i+1)+'</span>';
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;margin-bottom:3px;background:${isMe?'#FAEEDA':'var(--bg)'};border:1px solid ${isMe?'var(--gold)':'transparent'};">
      <div style="font-size:12px;width:18px;text-align:center;">${medal}</div>
      <div style="flex:1;font-size:12px;font-weight:${isMe?'700':'500'};color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.name)}${isMe?' <span style="font-size:9px;background:var(--gold);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;">DU</span>':''}</div>
      <div style="font-size:13px;font-weight:800;color:var(--g);">${s.score}</div>
    </div>`;
  }).join('');
  return `
  <div class="comp-card-seller">
    <div style="background:linear-gradient(135deg,var(--gd),var(--g));padding:14px 15px;color:#fff;">
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;opacity:.85;"><span class="live-dot"></span>LIVE-TÄVLING</div>
      <div style="font-size:16px;font-weight:800;margin-top:4px;line-height:1.2;">${esc(c.title)}</div>
      <div style="font-size:11px;opacity:.82;margin-top:3px;">${METRIC_ICON[c.metric]||'🏆'} ${esc(METRIC_LABELS[c.metric]||c.metric)} · ${dl>1?dl+' dagar kvar':(dl===1?'1 dag kvar':(dl===0?'⏰ SISTA DAGEN!':'tiden ute'))}</div>
      ${c.prize?`<div style="display:inline-block;background-color:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;margin-top:8px;">🎁 ${esc(c.prize)}</div>`:''}
      <div style="margin-top:9px;">${status}</div>
    </div>
    <div style="background:var(--w);padding:14px 8px 4px;">
      <div style="display:flex;justify-content:center;align-items:flex-end;gap:6px;">${podiumHtml}</div>
    </div>
    <div style="background:var(--w);padding:4px 13px 15px;">
      <div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Ställning</div>
      ${rankList}
    </div>
  </div>`;
}

function compSellerGroupCard(c){
  const total=compTeamScore(c);
  const goal=n(c.goal)||0;
  const pct=goal?Math.min(Math.round(total/goal*100),100):0;
  const reached=goal&&total>=goal;
  const dl=compDaysLeft(c.end_date);
  return `
  <div class="comp-card-seller">
    <div style="background:linear-gradient(135deg,var(--gd),var(--g));padding:14px 15px;color:#fff;">
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;opacity:.85;">🎯 GRUPPMÅL · HELA LAGET</div>
      <div style="font-size:16px;font-weight:800;margin-top:4px;line-height:1.2;">${esc(c.title)}</div>
      <div style="font-size:11px;opacity:.82;margin-top:3px;">${METRIC_ICON[c.metric]||'🎯'} ${esc(METRIC_LABELS[c.metric]||c.metric)} · ${dl>1?dl+' dagar kvar':(dl===1?'1 dag kvar':(dl===0?'⏰ SISTA DAGEN!':'tiden ute'))}</div>
      ${c.prize?`<div style="display:inline-block;background-color:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;margin-top:8px;">🎁 ${esc(c.prize)}</div>`:''}
      <div style="margin-top:11px;">
        <div style="font-size:11.5px;font-weight:600;margin-bottom:6px;color:rgba(255,255,255,.92);">Laget: ${total} / ${goal} ${reached?'✅ MÅL UPPNÅTT!':''}</div>
        <div style="height:10px;background:rgba(255,255,255,.22);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#E8C76A,#fff);border-radius:5px;transition:width 1.1s cubic-bezier(.2,.8,.2,1);"></div></div>
      </div>
    </div>
    <div style="background:var(--w);padding:14px 15px;font-size:12.5px;font-weight:600;color:var(--tx);text-align:center;">
      ${reached?'🎉 Ni klarade det tillsammans!':'Kämpa tillsammans – '+Math.max(goal-total,0)+' kvar till målet! 💪'}
    </div>
  </div>`;
}

function renderSellers(main){
  if(S.role!=='coach'){
    main.innerHTML=`<div class="ph"><div><div class="ph-t">Lägg till säljare</div></div></div><div class="ca"><div class="notice warn">⚠️ Den här vyn är endast för coacher.</div></div>`;
    return;
  }
  main.innerHTML=`<div class="ph"><div><div class="ph-t">Lägg till säljare</div><div class="ph-s">Laddar…</div></div></div>
    <div class="ca"><div class="empty"><p>Laddar säljare…</p></div></div>`;
  loadAndRenderSellers(main);
}

async function loadAndRenderSellers(main){
  let sellers=[],profiles=[];
  try{const r=await sb.from('sellers').select('*').order('name',{ascending:true});sellers=r.data||[];}catch(e){}
  try{const r=await sb.from('profiles').select('*');profiles=r.data||[];}catch(e){}
  if(S.tab!=='team')return;
  sellers=sellers.filter(s=>!s.deleted);
  S.allSellers=sellers.filter(s=>s.active);
  const roleOf=s=>{const p=profiles.find(x=>x.seller_id===s.id||x.id===s.user_id);return p?p.role:'saljare';};
  const active=sellers.filter(s=>s.active);
  const inactive=sellers.filter(s=>!s.active);
  const row=s=>{
    const r=roleOf(s);
    return `<tr>
      <td class="h-day">${esc(s.name||'–')}</td>
      <td style="text-align:left;font-size:13px;color:var(--mu);">${esc(s.email||'–')}</td>
      <td style="font-size:12px;font-weight:600;">${r==='coach'?'👑 Coach':'Säljare'}</td>
      <td style="font-size:12px;font-weight:600;color:${s.active?'var(--g)':'var(--mu)'};">${s.active?'● Aktiv':'○ Inaktiv'}</td>
      <td style="text-align:right;white-space:nowrap;"><button class="btn btn-s btn-xs" data-toggle-seller="${s.id}" data-cur="${s.active?'1':'0'}">${s.active?'Inaktivera':'Aktivera'}</button><button class="btn btn-d btn-xs" data-del-seller="${s.id}" data-name="${esc(s.name||'')}" style="margin-left:6px;">Radera</button></td>
    </tr>`;
  };
  const tbl=rows=>`<div class="htable-wrap"><table class="htable">
    <thead><tr><th>Namn</th><th style="text-align:left;">E-post</th><th>Roll</th><th>Status</th><th></th></tr></thead>
    <tbody>${rows.map(row).join('')}</tbody></table></div>`;
  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">Lägg till säljare <span class="role-pill">Coach</span></div><div class="ph-s">${active.length} aktiva i laget</div></div>
      <div class="ph-a"><button class="btn btn-p" id="seller-add">+ Lägg till säljare</button></div>
    </div>
    <div class="ca">
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>Laget (${active.length})</h3></div>
        <div class="sec-body" style="padding:0;">
          ${active.length===0?'<div class="empty"><p>Inga aktiva säljare ännu</p><small>Klicka Lägg till säljare för att lägga till någon</small></div>':tbl(active)}
        </div>
      </div>
      ${inactive.length?`<div class="sec fade-in"><div class="sec-hdr"><h3>Inaktiverade (${inactive.length})</h3></div><div class="sec-body" style="padding:0;">${tbl(inactive)}</div></div>`:''}
    </div>`;
  document.getElementById('seller-add').addEventListener('click',()=>showInviteSellerModal(main));
  main.querySelectorAll('[data-toggle-seller]').forEach(b=>b.addEventListener('click',async()=>{
    const id=b.dataset.toggleSeller,cur=b.dataset.cur==='1';
    if(cur&&!confirm('Inaktivera säljaren? De försvinner ur scoreboards och statistik men datan finns kvar.'))return;
    b.disabled=true;
    try{await sb.from('sellers').update({active:!cur}).eq('id',id);}catch(e){}
    loadAndRenderSellers(main);
  }));
  main.querySelectorAll('[data-del-seller]').forEach(b=>b.addEventListener('click',async()=>{
    const id=b.dataset.delSeller,nm=b.dataset.name||'säljaren';
    if(!confirm('Radera '+nm+' permanent?\n\nSäljaren tas bort helt och försvinner ur scoreboarden för övriga säljare. Tidigare sälj finns kvar i statistiken.'))return;
    b.disabled=true;
    let err=null;
    try{const r=await sb.from('sellers').update({deleted:true}).eq('id',id);err=r.error;}catch(e){err=e;}
    if(err){b.disabled=false;alert('Kunde inte radera: '+(err.message||err));return;}
    loadAndRenderSellers(main);
  }));
}

function showInviteSellerModal(main){
  const mc=document.getElementById('mc');
  const ov=document.createElement('div');ov.className='overlay';
  const istyle='width:100%;padding:9px 11px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none;font-family:inherit;box-sizing:border-box;';
  const lstyle='display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;';
  ov.innerHTML=`
    <div class="modal" style="max-width:440px;">
      <h2>➕ Skapa säljarkonto</h2>
      <p>Du sätter e-post och lösenord själv – inget mejl skickas. Säljaren loggar bara in med uppgifterna du anger. Skriv ner lösenordet och ge det till säljaren.</p>
      <div style="margin-bottom:11px;"><label style="${lstyle}">Namn</label><input id="iv-name" type="text" placeholder="För- och efternamn" style="${istyle}"></div>
      <div style="margin-bottom:11px;"><label style="${lstyle}">E-post (används vid inloggning)</label><input id="iv-email" type="email" placeholder="namn@smartid.se" style="${istyle}"></div>
      <div style="margin-bottom:11px;"><label style="${lstyle}">Lösenord</label><input id="iv-pass" type="text" placeholder="Minst 6 tecken" style="${istyle}"></div>
      <div style="margin-bottom:1.2rem;"><label style="${lstyle}">Roll</label><select id="iv-role" style="${istyle}"><option value="saljare">Säljare</option><option value="coach">Coach</option></select></div>
      <div id="iv-msg" style="display:none;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:1rem;white-space:pre-line;border-left:3px solid var(--g);"></div>
      <div class="modal-actions">
        <button class="btn btn-s" id="iv-cancel">Avbryt</button>
        <button class="btn btn-p" id="iv-save">Skapa konto</button>
      </div>
    </div>`;
  function close(){mc.innerHTML='';}
  ov.querySelector('#iv-cancel').addEventListener('click',close);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('#iv-save').addEventListener('click',async()=>{
    const msg=ov.querySelector('#iv-msg');
    function show(t,bad){msg.style.display='block';msg.style.background=bad?'var(--errl)':'#EAF4EE';
      msg.style.color=bad?'var(--err)':'var(--gd)';msg.style.borderLeftColor=bad?'var(--err)':'var(--g)';msg.textContent=t;}
    const name=ov.querySelector('#iv-name').value.trim();
    const email=ov.querySelector('#iv-email').value.trim();
    const pass=ov.querySelector('#iv-pass').value;
    const role=ov.querySelector('#iv-role').value;
    if(!name){show('Ange ett namn.',true);return;}
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){show('Ange en giltig e-postadress.',true);return;}
    if(pass.length<6){show('Lösenordet måste vara minst 6 tecken.',true);return;}
    const btn=ov.querySelector('#iv-save');btn.disabled=true;btn.textContent='Skapar…';
    let res;
    try{res=await sb.functions.invoke('invite-seller',{body:{name:name,email:email,password:pass,role:role}});}
    catch(e){res={error:e};}
    if(res.error){
      btn.disabled=false;btn.textContent='Skapa konto';
      show('✗ Kunde inte nå servern. Är Edge Function-en deployad?\n'+(res.error.message||res.error),true);return;
    }
    if(!res.data||!res.data.ok){
      btn.disabled=false;btn.textContent='Skapa konto';
      show('✗ '+((res.data&&res.data.error)||'Okänt fel.'),true);return;
    }
    show('✓ '+(res.data.message||'Kontot skapat.'),false);
    btn.textContent='Klar';
    setTimeout(()=>{close();loadAndRenderSellers(main);},1500);
  });
  mc.innerHTML='';mc.appendChild(ov);
}

const TRAIN_CFG={
  prod:{course:'prod',title:'Produktutbildning',subtitle:'SmartIDs tjänster, paket och konkurrenter',icon:'📦',slides:PRODUCT_SLIDES,quiz:PRODUCT_QUIZ},
  salj:{course:'salj',title:'Säljutbildning',subtitle:'SPIN, invändningshantering och säljteknik',icon:'📈',slides:SALJ_SLIDES,quiz:SALJ_QUIZ}
};
function trainingUserRef(){return S.role==='coach'?'coach':((S.seller&&S.seller.id)||'coach');}

async function loadTrainingData(){
  try{const {data}=await sb.from('training_progress').select('*').eq('user_ref',trainingUserRef()).maybeSingle();S.trainingProgress=data||{};}
  catch(e){S.trainingProgress={};}
  try{const {data}=await sb.from('slide_overrides').select('*');S.slideOverrides={};(data||[]).forEach(r=>{S.slideOverrides[r.slide_key]=r.html;});}
  catch(e){S.slideOverrides={};}
  S.trainingLoaded=true;
}

function renderTraining(main,course){
  if(S.trainingLoaded){renderTrainingView(main,TRAIN_CFG[course]);return;}
  const cfg=TRAIN_CFG[course];
  main.innerHTML=`<div class="ph"><div><div class="ph-t">${cfg.title}</div><div class="ph-s">Laddar…</div></div></div>
    <div class="ca"><div class="empty"><p>Laddar utbildning…</p></div></div>`;
  loadTrainingData().then(()=>{
    if(S.tab==='produktutbildning')renderTrainingView(main,TRAIN_CFG.prod);
    else if(S.tab==='saljutbildning')renderTrainingView(main,TRAIN_CFG.salj);
  });
}

function renderTrainingView(main,cfg){
  const ts=S.training_state||{};
  if(ts.course===cfg.course){
    if(ts.mode==='slides')return renderTrainingSlides(main,cfg);
    if(ts.mode==='quiz')return renderTrainingQuiz(main,cfg);
    if(ts.mode==='result')return renderTrainingResult(main,cfg);
  }
  trainingOverview(main,cfg);
}

        <div class="sec-body">

        </div>
      </div>
    </div>`;
  main.querySelectorAll('[data-train-start]').forEach(b=>b.addEventListener('click',()=>startTraining(cfg.course,b.dataset.trainStart)));

function startTraining(course,mode){S.training_state={course:course,mode:mode,currentSlide:0,quizAnswers:{}};render();window.scrollTo(0,0);}
function exitTraining(){S.training_state={};render();window.scrollTo(0,0);}

function renderTrainingSlides(main,cfg){
  const ts=S.training_state;
  const idx=ts.currentSlide||0;
  const slide=cfg.slides[idx];
  const total=cfg.slides.length;
  const isLast=idx===total-1;
  const pct=((idx+1)/total)*100;
  const isCoach=S.role==='coach';
  const slideKey=cfg.course+'_'+idx;
  const ov=S.slideOverrides||{};
  const slideHtml=ov[slideKey]||slide.html;
  const isEdited=!!ov[slideKey];
  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">${cfg.title}</div><div class="ph-s">Slide ${idx+1} av ${total} · ${esc(slide.category)}${isEdited?' · <span style="color:var(--gold);">✏️ Redigerad</span>':''}</div></div>
      <div class="ph-a"><button class="btn btn-s" data-train-exit>✕ Stäng</button></div>
    </div>
    <div class="ca">
      <div class="slide-stage fade-in">
        <div class="slide-frame">
          <span class="slide-cat">${esc(slide.category)}</span>
          <span class="slide-num">${idx+1} / ${total}</span>
          ${isCoach?`<div style="position:absolute;top:14px;right:80px;display:flex;gap:6px;z-index:5;">
            <button class="btn btn-s" data-slide-edit style="background:var(--gold);color:#fff;border:none;font-size:11px;padding:4px 10px;">✏️ Redigera</button>
            ${isEdited?'<button class="btn btn-s" data-slide-reset style="background:var(--err);color:#fff;border:none;font-size:11px;padding:4px 10px;">↺ Återställ</button>':''}
          </div>`:''}
          <div>${slideHtml}</div>
        </div>
        <div class="slide-nav">
          <button class="btn btn-s" data-slide-nav="-1" ${idx===0?'disabled style="opacity:.4;cursor:not-allowed;"':''}>← Föregående</button>
          <div class="slide-progress"><div class="slide-progress-fill" style="width:${pct}%;"></div></div>
          <span class="slide-pos">${idx+1} / ${total}</span>
          ${isLast?'<button class="btn btn-p" data-slide-finish>📝 Starta prov →</button>':'<button class="btn btn-p" data-slide-nav="1">Nästa →</button>'}
        </div>
      </div>
    </div>`;
  main.querySelector('[data-train-exit]').addEventListener('click',exitTraining);
  main.querySelectorAll('[data-slide-nav]').forEach(b=>b.addEventListener('click',()=>navSlide(parseInt(b.dataset.slideNav))));
  const fin=main.querySelector('[data-slide-finish]');if(fin)fin.addEventListener('click',()=>finishSlides(cfg.course));
  const ed=main.querySelector('[data-slide-edit]');if(ed)ed.addEventListener('click',()=>editSlide(cfg.course,idx));
  const rs=main.querySelector('[data-slide-reset]');if(rs)rs.addEventListener('click',()=>resetSlide(cfg.course,idx));
}
function navSlide(dir){const ts=S.training_state;ts.currentSlide=(ts.currentSlide||0)+dir;render();window.scrollTo(0,0);}
function finishSlides(course){S.training_state={course:course,mode:'quiz',currentSlide:0,quizAnswers:{}};render();window.scrollTo(0,0);}

function renderTrainingQuiz(main,cfg){
  const ts=S.training_state;
  const idx=ts.currentSlide||0;
  const q=cfg.quiz[idx];
  const total=cfg.quiz.length;
  const isLast=idx===total-1;
  const pct=((idx+1)/total)*100;
  const selected=ts.quizAnswers[idx];
  const answered=Object.keys(ts.quizAnswers).length;
  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">${cfg.title} – Kunskapsprov</div><div class="ph-s">Fråga ${idx+1} av ${total} · 90 % rätt krävs</div></div>
      <div class="ph-a"><button class="btn btn-s" data-train-exit>✕ Avbryt</button></div>
    </div>
    <div class="ca">
      <div class="quiz-stage fade-in">
        <div class="quiz-q-num">Fråga ${idx+1} / ${total}</div>
        <div class="quiz-q">${esc(q.q)}</div>
        <div class="quiz-options">
          ${q.o.map((opt,i)=>`<button class="quiz-opt ${selected===i?'selected':''}" data-quiz-ans="${i}"><span class="quiz-opt-letter">${String.fromCharCode(65+i)}</span> ${esc(opt)}</button>`).join('')}
        </div>
      </div>
      <div class="slide-nav" style="background:var(--w);border-radius:14px;border:1px solid var(--br);">
        <button class="btn btn-s" data-quiz-nav="-1" ${idx===0?'disabled style="opacity:.4;cursor:not-allowed;"':''}>← Föregående</button>
        <div class="slide-progress"><div class="slide-progress-fill" style="width:${pct}%;"></div></div>
        <span class="slide-pos">${idx+1} / ${total}</span>
        ${isLast
          ?`<button class="btn btn-p" data-quiz-submit ${answered<total?'disabled style="opacity:.4;cursor:not-allowed;"':''}>✓ Lämna in</button>`
          :`<button class="btn btn-p" data-quiz-nav="1" ${selected===undefined?'disabled style="opacity:.4;cursor:not-allowed;"':''}>Nästa →</button>`}
      </div>
    </div>`;
  main.querySelector('[data-train-exit]').addEventListener('click',exitTraining);
  main.querySelectorAll('[data-quiz-ans]').forEach(b=>b.addEventListener('click',()=>answerQuiz(parseInt(b.dataset.quizAns))));
  main.querySelectorAll('[data-quiz-nav]').forEach(b=>b.addEventListener('click',()=>navQuiz(parseInt(b.dataset.quizNav))));
  const sub=main.querySelector('[data-quiz-submit]');if(sub)sub.addEventListener('click',()=>submitQuiz(cfg.course));
}
function answerQuiz(i){const ts=S.training_state;if(!ts.quizAnswers)ts.quizAnswers={};ts.quizAnswers[ts.currentSlide]=i;render();}
function navQuiz(dir){const ts=S.training_state;ts.currentSlide=(ts.currentSlide||0)+dir;render();window.scrollTo(0,0);}

async function submitQuiz(course){
  const ts=S.training_state;
  const cfg=TRAIN_CFG[course];
  let correct=0;cfg.quiz.forEach((q,i)=>{if(ts.quizAnswers[i]===q.c)correct++;});
  const pct=Math.round((correct/cfg.quiz.length)*100);
  const passed=pct>=90;
  const tp=S.trainingProgress||{};
  tp[course+'_completed']=true;
  tp[course+'_score']=pct;
  tp[course+'_attempts']=(tp[course+'_attempts']||0)+1;
  if(passed)tp[course+'_passed']=true;
  S.trainingProgress=tp;
  ts.mode='result';ts.score=pct;ts.correct=correct;ts.passed=passed;
  render();window.scrollTo(0,0);
  const payload={user_ref:trainingUserRef(),
    prod_completed:!!tp.prod_completed,prod_passed:!!tp.prod_passed,prod_score:tp.prod_score||0,prod_attempts:tp.prod_attempts||0,
    salj_completed:!!tp.salj_completed,salj_passed:!!tp.salj_passed,salj_score:tp.salj_score||0,salj_attempts:tp.salj_attempts||0};
  try{await sb.from('training_progress').upsert(payload,{onConflict:'user_ref'});}catch(e){}
}

function renderTrainingResult(main,cfg){
  const ts=S.training_state;
  const passed=ts.passed,pct=ts.score,correct=ts.correct,total=cfg.quiz.length;
  main.innerHTML=`
    <div class="ph"><div><div class="ph-t">${cfg.title} – Resultat</div></div></div>
    <div class="ca">
      <div class="quiz-result ${passed?'':'failed'} fade-in">
        <div class="big">${pct} %</div>
        <h2>${passed?'🎉 Godkänd!':'❌ Inte godkänd'}</h2>
        <p>Du svarade rätt på ${correct} av ${total} frågor</p>
        ${passed?'<p style="margin-top:.6rem;font-size:13px;">Diplom utfärdat – syns nu på utbildningssidan!</p>':'<p style="margin-top:.6rem;font-size:13px;">Du behöver minst 90 % rätt för att bli godkänd. Repetera materialet och försök igen.</p>'}
        <div class="quiz-summary">
          <div style="font-weight:700;margin-bottom:.6rem;">Frågor och svar:</div>
          ${cfg.quiz.map((q,i)=>{
            const ans=ts.quizAnswers[i];const right=ans===q.c;
            return `<div style="padding:.5rem 0;border-bottom:1px solid var(--bg2);">
              <div style="font-size:13px;margin-bottom:.2rem;"><strong>${i+1}. ${esc(q.q)}</strong></div>
              <div style="font-size:12px;color:${right?'var(--g)':'var(--err)'};">${right?'✓':'✗'} Ditt svar: ${esc(q.o[ans]||'(inget svar)')}${!right?` · <span style="color:var(--g);">Rätt: ${esc(q.o[q.c])}</span>`:''}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        ${!passed?'<button class="btn btn-p" data-train-start="slides">📖 Läs igen</button> <button class="btn btn-s" data-train-start="quiz">📝 Gör om provet</button>':''}
        <button class="btn btn-s" data-train-exit>← Tillbaka till översikt</button>
      </div>
    </div>`;
  main.querySelector('[data-train-exit]').addEventListener('click',exitTraining);
  main.querySelectorAll('[data-train-start]').forEach(b=>b.addEventListener('click',()=>startTraining(cfg.course,b.dataset.trainStart)));
}

/* --- Slide-redigering (endast coach) --- */
function editSlide(course,idx){
  const cfg=TRAIN_CFG[course];
  const slide=cfg.slides[idx];
  const slideKey=course+'_'+idx;
  const currentHtml=(S.slideOverrides||{})[slideKey]||slide.html;
  const mc=document.getElementById('mc');
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`
    <div style="background:var(--w);border-radius:14px;max-width:1100px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;">
      <div style="padding:1.1rem 1.4rem;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;">
        <div><div style="font-size:17px;font-weight:700;color:var(--gd);">✏️ Redigera slide</div>
          <div style="font-size:12px;color:var(--mu);">${esc(slide.category)} – ${cfg.title}, slide ${idx+1}</div></div>
        <button id="se-x" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--mu);">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:0;">
        <div style="padding:1rem;border-right:1px solid var(--br);display:flex;flex-direction:column;min-height:0;">
          <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:6px;">📝 HTML-kod</div>
          <textarea id="se-ta" style="flex:1;width:100%;font-family:monospace;font-size:12px;padding:10px;border:1px solid var(--br);border-radius:8px;resize:none;outline:none;color:var(--tx);background:var(--bg);min-height:380px;line-height:1.5;box-sizing:border-box;"></textarea>
        </div>
        <div style="padding:1rem;display:flex;flex-direction:column;min-height:0;overflow:hidden;">
          <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:6px;">👁 Förhandsgranskning</div>
          <div id="se-prev" style="flex:1;border:1px solid var(--br);border-radius:8px;padding:14px;overflow:auto;background:var(--bg);font-size:13px;"></div>
        </div>
      </div>
      <div style="padding:.9rem 1.4rem;border-top:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;background:var(--bg);">
        <div style="font-size:12px;color:var(--mu);">💡 HTML stöds: &lt;strong&gt;, &lt;p&gt;, &lt;ul&gt;, &lt;li&gt;, &lt;h3&gt; m.fl.</div>
        <div style="display:flex;gap:8px;"><button class="btn btn-s" id="se-cancel">Avbryt</button><button class="btn btn-p" id="se-save">💾 Spara ändring</button></div>
      </div>
    </div>`;
  mc.innerHTML='';mc.appendChild(ov);
  const ta=ov.querySelector('#se-ta'),prev=ov.querySelector('#se-prev');
  ta.value=currentHtml;prev.innerHTML=currentHtml;
  ta.addEventListener('input',()=>{prev.innerHTML=ta.value;});
  function close(){mc.innerHTML='';}
  ov.querySelector('#se-x').addEventListener('click',close);
  ov.querySelector('#se-cancel').addEventListener('click',close);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('#se-save').addEventListener('click',async()=>{
    const html=ta.value;
    const btn=ov.querySelector('#se-save');btn.disabled=true;btn.textContent='Sparar…';
    if(!S.slideOverrides)S.slideOverrides={};
    S.slideOverrides[slideKey]=html;
    try{await sb.from('slide_overrides').upsert({slide_key:slideKey,html:html},{onConflict:'slide_key'});}catch(e){}
    close();render();
  });
}
async function resetSlide(course,idx){
  if(!confirm('Återställ slide till originalversionen? Din redigerade text försvinner.'))return;
  const slideKey=course+'_'+idx;
  if(S.slideOverrides)delete S.slideOverrides[slideKey];
  try{await sb.from('slide_overrides').delete().eq('slide_key',slideKey);}catch(e){}
  render();
}

/* ============================================================
   LJUDFILER — ljudbibliotek (Supabase Storage)
   ============================================================ */
const AUDIO_BUCKET='call-recordings';
const AUDIO_TABLE='salj_audio_library';
const FB_SESSIONS='salj_feedback_sessions';
const FB_QUESTIONS='salj_feedback_questions';
function audioFmt(t){if(!isFinite(t))return '0:00';const m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s;}

function renderLjudfiler(main){
  if(S.audioLoaded){renderLjudfilerView(main);return;}
  main.innerHTML=`<div class="ph"><div><div class="ph-t">🎧 Ljudbibliotek</div><div class="ph-s">Laddar…</div></div></div>
    <div class="ca"><div class="empty"><p>Laddar ljudfiler…</p></div></div>`;
  loadAndRenderLjudfiler(main);
}

async function loadAndRenderLjudfiler(main){
  let rows=[];
  try{
    let q=sb.from(AUDIO_TABLE).select('*').order('created_at',{ascending:false});
    if(S.role!=='coach'&&S.seller)q=q.eq('seller_id',S.seller.id);
    const {data}=await q;rows=data||[];
  }catch(e){}
  S.audioFiles=rows;S.audioLoaded=true;
  if(S.role==='coach'&&!S.audioSeller&&(S.allSellers||[]).length)S.audioSeller=S.allSellers[0].id;
  if(S.tab==='ljudfiler')audioEnsureUrls(main);
}

/* Vilken säljare ljudvyn visar just nu. */
function audioActiveSeller(){
  if(S.role==='coach'){
    if(!S.audioSeller&&(S.allSellers||[]).length)S.audioSeller=S.allSellers[0].id;
    return S.audioSeller||'';
  }
  return (S.seller&&S.seller.id)||'';
}

/* Hämtar signerade URL:er för den aktiva säljarens spår, sen rendering. */
async function audioEnsureUrls(main){
  const sid=audioActiveSeller();
  const need=S.audioFiles.filter(a=>a.seller_id===sid&&a.storage_path&&a._url===undefined);
  for(const r of need){
    try{const {data}=await sb.storage.from(AUDIO_BUCKET).createSignedUrl(r.storage_path,3600);r._url=(data&&data.signedUrl)||null;}
    catch(e){r._url=null;}
  }
  if(S.tab==='ljudfiler')renderLjudfilerView(main);
}

function wireAudioSellerPick(main){
  const pick=main.querySelector('#audio-seller-pick');
  if(pick)pick.addEventListener('change',()=>{S.audioSeller=pick.value;audioEnsureUrls(main);});
}

function renderLjudfilerView(main){
  const isCoach=S.role==='coach';

  if(isCoach){
    html+=`
      <div class="audio-upload-card-modern">

          <div style="font-weight:700;color:var(--gd);font-size:14px;margin-bottom:.4rem;">Ladda upp ljudspår till ${esc(sellerName)}</div>
          <div class="audio-upload-grid-modern">
            <input type="text" id="audio-title" placeholder="Titel (t.ex. Bra avslut – ung kund)" class="audio-input">
            <input type="file" id="audio-file" accept="audio/*" class="audio-file-input">
            <button id="audio-upload-btn" class="audio-upload-btn-modern">⬆️ Ladda upp</button>
          </div>
          <div id="audio-upload-status" style="font-size:12px;color:var(--mu);margin-top:.5rem;"></div>

      html+=`
        <div class="audio-card-modern" data-id="${a.id}" style="--cat-color:var(--g);--cat-bg:#EAF4EE;animation-delay:${i*0.08}s;">

            </button>

            </audio>

    main.querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click',async e=>{
      e.stopPropagation();
      const id=btn.dataset.del;
      const a=S.audioFiles.find(x=>x.id===id);
      if(!a||!confirm('Ta bort ljudspåret "'+a.title+'"?'))return;
      btn.disabled=true;
      try{if(a.storage_path)await sb.storage.from(AUDIO_BUCKET).remove([a.storage_path]);}catch(e){}
      try{await sb.from(AUDIO_TABLE).delete().eq('id',id);}catch(e){}
      loadAndRenderLjudfiler(main);
    }));
  }
  wireAudioPlayers(main);
}

async function uploadAudio(main,sellerId){
  const titleEl=main.querySelector('#audio-title');
  const fileEl=main.querySelector('#audio-file');
  const statusEl=main.querySelector('#audio-upload-status');
  function st(t,c){statusEl.textContent=t;statusEl.style.color=c;}
  if(!sellerId){st('⚠️ Välj en säljare först.','var(--err)');return;}
  if(!titleEl.value.trim()){st('⚠️ Skriv en titel först.','var(--err)');return;}
  if(!fileEl.files||!fileEl.files[0]){st('⚠️ Välj en ljudfil.','var(--err)');return;}
  const file=fileEl.files[0];
  if(file.size>50*1024*1024){st('⚠️ Filen är för stor (max 50 MB).','var(--err)');return;}
  if(S.audioFiles.filter(a=>a.seller_id===sellerId).length>=5){st('⚠️ Max 5 ljudspår per säljare. Radera ett först.','var(--err)');return;}
  st('⏳ Laddar upp…','var(--mu)');
  const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path=sellerId+'/'+Date.now()+'_'+safeName;
  let upErr=null;
  try{const res=await sb.storage.from(AUDIO_BUCKET).upload(path,file);upErr=res.error;}
  catch(e){upErr=e;}
  if(upErr){st('❌ Uppladdning misslyckades: '+(upErr.message||upErr),'var(--err)');return;}
  let dbErr=null;
  try{const res=await sb.from(AUDIO_TABLE).insert({title:titleEl.value.trim(),seller_id:sellerId,storage_path:path,mime:file.type||'audio/mpeg',size:file.size});dbErr=res.error;}
  catch(e){dbErr=e;}
  if(dbErr){st('❌ Sparade filen men metadata misslyckades: '+(dbErr.message||dbErr),'var(--err)');return;}
  st('✓ Uppladdad!','var(--g)');
  setTimeout(()=>loadAndRenderLjudfiler(main),700);
}

function wireAudioPlayers(container){
  container.querySelectorAll('.audio-card-modern').forEach(item=>{
    const id=item.dataset.id;
    const audio=container.querySelector('#audio-'+id);
    if(!audio)return;
    const playBtn=container.querySelector('.audio-play-btn-modern[data-id="'+id+'"]');
    const rewindBtn=container.querySelector('.audio-skip-btn[data-action="rewind"][data-id="'+id+'"]');
    const forwardBtn=container.querySelector('.audio-skip-btn[data-action="forward"][data-id="'+id+'"]');
    const progress=container.querySelector('.audio-progress-modern[data-id="'+id+'"]');
    const bar=container.querySelector('#bar-'+id);
    const curEl=container.querySelector('#cur-'+id);
    const durEl=container.querySelector('#dur-'+id);
    const playIcon=playBtn.querySelector('.play-icon');
    const pauseIcon=playBtn.querySelector('.pause-icon');
    audio.addEventListener('loadedmetadata',()=>{durEl.textContent=audioFmt(audio.duration);});
    audio.addEventListener('timeupdate',()=>{
      curEl.textContent=audioFmt(audio.currentTime);
      if(audio.duration)bar.style.width=((audio.currentTime/audio.duration)*100)+'%';
    });
    audio.addEventListener('ended',()=>{playIcon.style.display='block';pauseIcon.style.display='none';item.classList.remove('playing');});
    audio.addEventListener('play',()=>{
      container.querySelectorAll('audio.audio-source').forEach(a=>{if(a!==audio&&!a.paused)a.pause();});
      container.querySelectorAll('.audio-card-modern.playing').forEach(c=>c.classList.remove('playing'));
      playIcon.style.display='none';pauseIcon.style.display='block';item.classList.add('playing');
    });
    audio.addEventListener('pause',()=>{playIcon.style.display='block';pauseIcon.style.display='none';item.classList.remove('playing');});
    playBtn.addEventListener('click',e=>{e.stopPropagation();if(audio.paused)audio.play();else audio.pause();});
    rewindBtn.addEventListener('click',e=>{e.stopPropagation();audio.currentTime=Math.max(0,audio.currentTime-10);});
    forwardBtn.addEventListener('click',e=>{e.stopPropagation();audio.currentTime=Math.min(audio.duration||0,audio.currentTime+10);});
    progress.addEventListener('click',e=>{
      e.stopPropagation();
      const rect=progress.getBoundingClientRect();
      const pct=(e.clientX-rect.left)/rect.width;
      if(audio.duration)audio.currentTime=audio.duration*pct;
    });
  });
}

/* ============================================================
   COACHNING — feedback-sessioner
   ============================================================ */
function cnBadge(status){
  return status==='done'
    ? '<span style="background:#EAF4EE;color:var(--g);font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;">Klar</span>'
    : '<span style="background:#FAEEDA;color:#9a7d2e;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;">Öppen</span>';
}
function fbDaysSince(ts){return Math.floor((Date.now()-new Date(ts).getTime())/86400000);}
function fbTrashDaysLeft(s){return Math.max(0,30-fbDaysSince(s.deleted_at));}

function cnRow(s,showSeller,mode){
  const date=s.created_at?new Date(s.created_at).toLocaleDateString('sv-SE'):'';
  const meta=(showSeller?esc(s._sellerName)+' · ':'')+date+(s.duration?' · '+esc(s.duration):'');
  const isCoach=S.role==='coach';
  const savedBadge=s.saved_by_seller?'<span style="font-size:10px;font-weight:700;background:#EAF4EE;color:var(--gd);padding:3px 8px;border-radius:6px;white-space:nowrap;">★ Sparad</span>':'';
  let right;
  if(mode==='trash'){
    const dl=fbTrashDaysLeft(s);
    right=`<span style="font-size:11px;color:var(--mu);white-space:nowrap;">Raderas om ${dl} ${dl===1?'dag':'dagar'}</span>
      <button class="btn btn-s btn-xs" data-restore="${s.id}">Återställ</button>`;
  }else{
    right=cnBadge(s.status)+savedBadge+(isCoach?`<button class="cn-del-btn" data-delsession="${s.id}" title="Radera session" style="background:none;border:none;cursor:pointer;color:var(--mu);font-size:15px;padding:4px 6px;border-radius:6px;">🗑</button>`:'');
  }
  return `<div class="cn-row" style="display:flex;align-items:center;gap:12px;width:100%;background:var(--w);border:1px solid var(--br);border-radius:10px;padding:13px 15px;">
    <div data-open="${s.id}" style="flex:1;min-width:0;cursor:pointer;">
      <div style="font-weight:700;color:var(--gd);font-size:14px;">${esc(s.title)}</div>
      <div style="font-size:12px;color:var(--mu);margin-top:2px;">${meta}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">${right}</div>
  </div>`;
}

function renderCoachning(main){
  if(S.coachLoaded){renderCoachningView(main);return;}
  main.innerHTML='<div class="ph"><div><div class="ph-t">💬 Coachning</div><div class="ph-s">Laddar…</div></div></div><div class="ca"><div class="empty"><p>Laddar sessioner…</p></div></div>';
  loadAndRenderCoachning(main);
}

async function loadAndRenderCoachning(main){
  let sessions=[],questions=[],sellers=[];
  try{const r=await sb.from(FB_SESSIONS).select('*').order('created_at',{ascending:false});sessions=r.data||[];}catch(e){}
  try{const r=await sb.from(FB_QUESTIONS).select('*').order('sort_order',{ascending:true});questions=r.data||[];}catch(e){}
  try{const r=await sb.from('sellers').select('id,name').order('name',{ascending:true});sellers=r.data||[];}catch(e){}
  /* göm sessioner raderade för mer än 30 dagar sedan (om säljaren inte sparat dem) */
  sessions=sessions.filter(s=>!s.deleted_at||fbDaysSince(s.deleted_at)<30||s.saved_by_seller);
  for(const s of sessions){
    if(!s.audio_path){s._audioUrl=null;continue;}
    try{const r=await sb.storage.from(AUDIO_BUCKET).createSignedUrl(s.audio_path,3600);s._audioUrl=(r.data&&r.data.signedUrl)||null;}
    catch(e){s._audioUrl=null;}
  }
  const nameById={};sellers.forEach(x=>{nameById[x.id]=x.name;});
  sessions.forEach(s=>{s._sellerName=nameById[s.seller_id]||'Okänd säljare';});
  S.coachSessions=sessions;S.feedbackQuestions=questions;S.coachSellers=sellers;S.coachLoaded=true;
  if(S.tab==='coachning')renderCoachningView(main);
}

function renderCoachningView(main){
  if(S.coachOpenSession){
    const s=S.coachSessions.find(x=>x.id===S.coachOpenSession);
    if(s){renderSessionDetail(main,s);return;}
    S.coachOpenSession=null;
  }
  if(S.role==='coach')renderCoachningCoach(main);
  else renderCoachningSeller(main);
}

    {key:'shared',label:'Gemensamma frågor',sub:'Säljaren och coachen svarar'},

  let html=`
    <div class="ph">
      <div><div class="ph-t">💬 Coachning</div><div class="ph-s">Feedback-sessioner och frågebank</div></div>
      <button class="btn btn-p" id="cn-new">+ Skapa session</button>
    </div>

    html+=`<details class="cn-trash" style="margin-top:1.7rem;border:1px solid var(--br);border-radius:10px;background:var(--w);">
      <summary style="cursor:pointer;font-size:14px;font-weight:700;color:var(--gd);padding:13px 15px;user-select:none;list-style-position:inside;">🗑 Raderade sessioner (${trash.length})</summary>
      <div style="padding:0 15px 14px;">
        <div style="font-size:12.5px;color:var(--mu);margin-bottom:.8rem;">Raderade sessioner ligger kvar i 30 dagar och kan återställas. Sen tas de bort.</div>
        <div style="display:flex;flex-direction:column;gap:8px;">`+trash.map(s=>cnRow(s,true,'trash')).join('')+`</div>
      </div>
    </details>`;
  }
  html+=`<h3 style="font-size:14px;font-weight:700;color:var(--gd);margin:1.6rem 0 .5rem;">Coach-frågor</h3>
    <div style="font-size:12.5px;color:var(--mu);margin-bottom:.9rem;">Frågor som visas i varje feedback-session.</div>`;
  QT.forEach(t=>{
    const qs=S.feedbackQuestions.filter(q=>q.question_type===t.key);
    html+=`<div style="border:1px solid var(--br);border-radius:10px;padding:13px 15px;margin-bottom:10px;background:var(--w);">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><div style="font-weight:700;font-size:13px;color:var(--gd);">${t.label}</div><div style="font-size:11.5px;color:var(--mu);">${t.sub}</div></div>
        <button class="btn btn-s" data-addq="${t.key}" style="padding:5px 11px;font-size:12px;">+ Lägg till</button>
      </div>`;
    qs.forEach(q=>{
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0 0;margin-top:8px;border-top:1px solid var(--bg2);">
        <div style="flex:1;font-size:13px;color:var(--tx);">${esc(q.question)}</div>
        <button data-delq="${q.id}" title="Ta bort" style="background:none;border:none;cursor:pointer;color:var(--mu);font-size:14px;">🗑</button>
      </div>`;

    html+='</div>';
  });
  html+='</div>';
  main.innerHTML=html;
  main.querySelector('#cn-new').addEventListener('click',showCreateSessionModal);
  main.querySelectorAll('[data-open]').forEach(b=>b.addEventListener('click',()=>{S.coachOpenSession=b.dataset.open;render();}));
  main.querySelectorAll('[data-addq]').forEach(b=>b.addEventListener('click',()=>showAddQuestionModal(b.dataset.addq)));
  main.querySelectorAll('[data-delq]').forEach(b=>b.addEventListener('click',()=>deleteQuestion(b.dataset.delq)));
  main.querySelectorAll('[data-delsession]').forEach(b=>b.addEventListener('click',()=>{const s=S.coachSessions.find(x=>x.id===b.dataset.delsession);if(s)deleteSession(s);}));
  main.querySelectorAll('[data-restore]').forEach(b=>b.addEventListener('click',()=>restoreSession(b.dataset.restore)));
}

function renderCoachningSeller(main){
  const sessions=S.coachSessions.filter(s=>(!S.seller||s.seller_id===S.seller.id)&&(!s.deleted_at||s.saved_by_seller));
  let html=`<div class="ph"><div><div class="ph-t">💬 Mina sessioner</div><div class="ph-s">Feedback från din coach</div></div></div><div class="ca">`;
  if(!sessions.length){
    html+='<div class="empty"><p>Du har inga feedback-sessioner än. Din coach skapar dem åt dig.</p></div>';
  }else{
    html+='<div style="display:flex;flex-direction:column;gap:8px;">'+sessions.map(s=>cnRow(s,false,'active')).join('')+'</div>';
  }
  html+='</div>';
  main.innerHTML=html;
  main.querySelectorAll('[data-open]').forEach(b=>b.addEventListener('click',()=>{S.coachOpenSession=b.dataset.open;render();}));
}

function renderSessionDetail(main,s){
  const isCoach=S.role==='coach';
  const ans=s.answers||{};
  const specific=Array.isArray(s.specific_qs)?s.specific_qs:[];
  function field(key,val,ph,readonly){
    return `<textarea data-ans="${key}" ${readonly?'readonly':''} placeholder="${ph||''}" style="width:100%;min-height:58px;padding:8px 10px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;font-family:inherit;color:var(--tx);background:${readonly?'var(--bg2)':'var(--bg)'};resize:vertical;box-sizing:border-box;">${esc(val||'')}</textarea>`;
  }
  function qcard(title,body){
    return `<div style="border:1px solid var(--br);border-radius:10px;padding:13px 15px;margin-bottom:10px;background:var(--w);">
      <div style="font-weight:700;font-size:13.5px;color:var(--gd);margin-bottom:8px;">${esc(title)}</div>${body}</div>`;
  }
  let html=`
    <div class="ph">
      <div><div class="ph-t">${esc(s.title)}</div><div class="ph-s">${esc(s._sellerName)} · ${s.created_at?new Date(s.created_at).toLocaleDateString('sv-SE'):''}${s.duration?' · '+esc(s.duration):''}</div></div>
      <button class="btn btn-s" id="cn-back">← Tillbaka</button>
    </div>
    <div class="ca">`;
  if(s._audioUrl){
    html+=`<div style="margin-bottom:1.1rem;"><div style="font-size:11.5px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">Samtalsinspelning</div>
      <audio controls controlsList="nodownload" oncontextmenu="return false;" style="width:100%;"><source src="${s._audioUrl}"></audio></div>`;
  }
  /* När säljaren markerat klar får coachen en sammanfattning av säljarens svar */
  if(isCoach&&s.status==='done'){
    let sum='';
    const sumRow=(q,a)=>`<div style="margin-bottom:10px;"><div style="font-weight:600;font-size:12.5px;color:var(--gd);">${esc(q)}</div><div style="font-size:13px;color:var(--tx);white-space:pre-wrap;">${esc(a)}</div></div>`;
    S.feedbackQuestions.forEach(q=>{
      if(q.question_type==='coach')return;
      const a=ans['s_'+q.id];
      if(a&&a.trim())sum+=sumRow(q.question,a);
    });
    specific.forEach((sq,i)=>{
      const a=ans['sp_'+i];
      if(a&&a.trim())sum+=sumRow((sq&&sq.q)||sq||('Fråga '+(i+1)),a);
    });
    if(s.seller_notes&&s.seller_notes.trim())sum+=sumRow('Säljarens anteckningar',s.seller_notes);
    if(!sum)sum='<div style="font-size:13px;color:var(--mu);">Säljaren markerade sessionen klar utan att skriva något.</div>';
    html+=`<div style="border:1px solid var(--g);border-radius:10px;padding:14px 16px;margin-bottom:1.1rem;background:#EAF4EE;">
      <div style="font-weight:700;font-size:13.5px;color:var(--gd);margin-bottom:10px;">✓ Säljarens sammanfattning</div>${sum}</div>`;
  }
  S.feedbackQuestions.forEach(q=>{
    if(q.question_type==='coach'){
      if(!isCoach)return;                                  /* säljaren ser inte coachfrågor */
      html+=qcard(q.question,field('c_'+q.id,ans['c_'+q.id],'Coachens svar…',false));
    }else if(q.question_type==='seller'){
      html+=qcard(q.question,field('s_'+q.id,ans['s_'+q.id],isCoach?'':'Ditt svar…',isCoach));
    }else{
      if(isCoach){
        const body=`<div style="font-size:11px;font-weight:700;color:var(--mu);margin-bottom:5px;">SÄLJARENS SVAR</div>${field('s_'+q.id,ans['s_'+q.id],'',true)}`
          +`<div style="font-size:11px;font-weight:700;color:var(--mu);margin:9px 0 5px;">COACHENS SVAR</div>${field('c_'+q.id,ans['c_'+q.id],'Coachens svar…',false)}`;
        html+=qcard(q.question,body);
      }else{                                               /* säljaren ser bara sitt eget svar */
        html+=qcard(q.question,field('s_'+q.id,ans['s_'+q.id],'Ditt svar…',false));
      }
    }
  });
  specific.forEach((sq,i)=>{
    html+=qcard((sq&&sq.q)||sq||('Fråga '+(i+1)),field('sp_'+i,ans['sp_'+i],isCoach?'':'Ditt svar…',isCoach));
  });
  html+=qcard('Säljarens anteckningar',field('__seller_notes',s.seller_notes,isCoach?'':'Egna tankar…',isCoach));
  if(isCoach)html+=qcard('Coachens anteckningar',field('__coach_notes',s.coach_notes,'Sammanfattning…',false)); /* säljaren ser inte coachens anteckningar */
  html+=`<div id="cn-msg" style="display:none;font-size:12.5px;font-weight:600;margin:.4rem 0;"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:.6rem;">
      <button class="btn btn-p" id="cn-save">Spara</button>`;
  if(s.status!=='done')html+='<button class="btn btn-s" id="cn-done">Markera som klar</button>';
  else html+='<button class="btn btn-s" id="cn-reopen">Återöppna</button>';
  if(!isCoach)html+='<button class="btn btn-s" id="cn-savefb" style="margin-left:auto;'+(s.saved_by_seller?'color:var(--gd);font-weight:700;':'')+'">'+(s.saved_by_seller?'★ Sparad':'💾 Spara feedback')+'</button>';
  if(isCoach)html+='<button class="btn btn-s" id="cn-del" style="margin-left:auto;color:var(--err);">Ta bort</button>';
  html+='</div></div>';
  main.innerHTML=html;
  main.querySelector('#cn-back').addEventListener('click',()=>{S.coachOpenSession=null;render();});
  main.querySelector('#cn-save').addEventListener('click',()=>saveSession(main,s,null));
  const d=main.querySelector('#cn-done');if(d)d.addEventListener('click',()=>saveSession(main,s,'done'));
  const r=main.querySelector('#cn-reopen');if(r)r.addEventListener('click',()=>saveSession(main,s,'open'));
  const x=main.querySelector('#cn-del');if(x)x.addEventListener('click',()=>deleteSession(s));
  const sv=main.querySelector('#cn-savefb');if(sv)sv.addEventListener('click',()=>toggleSaveFeedback(s));
}

async function saveSession(main,s,statusChange){
  const msg=main.querySelector('#cn-msg');
  function show(t,bad){msg.style.display='block';msg.style.color=bad?'var(--err)':'var(--g)';msg.textContent=t;}
  const isCoach=S.role==='coach';
  const newAns=Object.assign({},s.answers||{});
  let coachNotes=s.coach_notes,sellerNotes=s.seller_notes;
  main.querySelectorAll('[data-ans]').forEach(el=>{
    if(el.hasAttribute('readonly'))return;
    const k=el.dataset.ans;
    if(k==='__coach_notes')coachNotes=el.value;
    else if(k==='__seller_notes')sellerNotes=el.value;
    else newAns[k]=el.value;
  });
  const patch={answers:newAns};
  if(isCoach)patch.coach_notes=coachNotes;else patch.seller_notes=sellerNotes;
  if(statusChange)patch.status=statusChange;
  const btn=main.querySelector('#cn-save');btn.disabled=true;
  try{
    const{error}=await sb.from(FB_SESSIONS).update(patch).eq('id',s.id);
    if(error){show('Kunde inte spara: '+error.message,true);btn.disabled=false;return;}
    Object.assign(s,patch);
    show('✓ Sparat.',false);
    if(statusChange){setTimeout(()=>{S.coachOpenSession=null;S.coachLoaded=false;render();},700);}
    else btn.disabled=false;
  }catch(e){show('Något gick fel: '+(e.message||e),true);btn.disabled=false;}
}

async function deleteSession(s){
  if(!confirm('Radera sessionen "'+s.title+'"?\n\nDen hamnar bland Raderade sessioner och ligger kvar där i 30 dagar innan den tas bort. Du kan återställa den under tiden.'))return;
  try{await sb.from(FB_SESSIONS).update({deleted_at:new Date().toISOString()}).eq('id',s.id);}catch(e){}
  S.coachOpenSession=null;S.coachLoaded=false;render();
}

async function restoreSession(id){
  try{await sb.from(FB_SESSIONS).update({deleted_at:null}).eq('id',id);}catch(e){}
  S.coachLoaded=false;render();
}

async function toggleSaveFeedback(s){
  const nv=!s.saved_by_seller;
  try{await sb.from(FB_SESSIONS).update({saved_by_seller:nv}).eq('id',s.id);}catch(e){}
  s.saved_by_seller=nv;S.coachLoaded=false;render();
}

async function deleteQuestion(id){
  if(!confirm('Ta bort frågan?'))return;
  try{await sb.from(FB_QUESTIONS).delete().eq('id',id);}catch(e){}
  S.coachLoaded=false;render();
}

/* ============================================================
   MÅL & STREAK — bonusmätare
   ============================================================ */
function malNetSalj(d){
  return (n(d.sold_s189)+n(d.sold_s229)+n(d.sold_s279))
       - (n(d.ang_s189)+n(d.ang_s229)+n(d.ang_s279));
}

function renderMal(main){
  const days=S.dailyStats||[];
  const month=new Date().toISOString().slice(0,7);
  let monthSalj=0,totalSalj=0;
  days.forEach(d=>{
    const v=malNetSalj(d);
    totalSalj+=v;
    if(String(d.date).slice(0,7)===month)monthSalj+=v;
  });
  monthSalj=Math.max(0,monthSalj);
  totalSalj=Math.max(0,totalSalj);

  const meters=[
    {label:'Månadsbonus',sub:'Nollställs vid varje månadsskifte',value:monthSalj,goal:40,ic:'📅'},
    {label:'Bonusmål',sub:'Räknas från start – nollställs aldrig',value:totalSalj,goal:100,ic:'🎯'},
    {label:'Storbonus',sub:'Räknas från start – nollställs aldrig',value:totalSalj,goal:200,ic:'🏆'}
  ];

  function meterCard(m){
    const pct=Math.min(100,(m.value/m.goal)*100);
    const done=m.value>=m.goal;
    const left=Math.max(0,m.goal-m.value);
    return `<div class="bmeter${done?' bmeter-done':''}">
      <div class="bmeter-top">
        <div class="bmeter-ic">${m.ic}</div>
        <div class="bmeter-head">
          <div class="bmeter-label">${m.label}</div>
          <div class="bmeter-sub">${m.sub}</div>
        </div>
        <div class="bmeter-reward${done?' br-on':''}">${done?'🎉 Upplåst!':'🎁 Hemlig bonus'}</div>
      </div>
      <div class="bmeter-track"><div class="bmeter-fill${done?' bf-done':''}" style="width:${pct}%;"></div></div>
      <div class="bmeter-foot">
        <span class="bmeter-count">${m.value} / ${m.goal} sälj</span>
        <span class="bmeter-status">${done?'🎉 Bonus upplåst!':left+' sälj kvar'}</span>
      </div>
      ${done?`<div class="bmeter-msg">🎉 Grattis! Du har nått ${m.goal} sälj – en överraskning väntar på dig!</div>`:''}
    </div>`;
  }

  const anyDone=meters.some(m=>m.value>=m.goal);

  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">Mål & Streak</div><div class="ph-s">Sälj dig mot bonusarna</div></div>
    </div>
    <div class="ca">
      <div class="bmeter-grid">
        ${meters.map(meterCard).join('')}
      </div>
      <div class="surprise-box">
        <div class="surprise-gifts">
          ${meters.map(m=>`<span class="sgift${m.value>=m.goal?' sgift-open':''}">${m.value>=m.goal?'🎉':'🎁'}</span>`).join('')}
        </div>
        <div class="surprise-text">Nå mätarna för att öppna överraskningarna</div>
      </div>
    </div>`;

  if(anyDone&&!S.celebrated){S.celebrated=true;if(typeof fireConfetti==='function')fireConfetti();}
  if(!anyDone)S.celebrated=false;
}

const KAL_SLOTS=['11:00–12:30','12:40–14:00','15:00–16:30','16:40–18:00'];
const KAL_BREAKS={0:'12:30–12:40 · Paus',1:'14:00–15:00 · Lunch',2:'16:30–16:40 · Paus'};
const KAL_DAYS=['Måndag','Tisdag','Onsdag','Torsdag','Fredag'];
const KAL_TYPES={feedback:'Feedback',saljpass:'Säljpass',livelyssning:'Livelyssning',planering:'Planering'};
const SV_MONTHS=['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];

function isoLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function kalMonday(d){const x=new Date(d);const dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);x.setHours(0,0,0,0);return x;}
function kalDefaultWeek(){
  const now=new Date();const dow=(now.getDay()+6)%7;const base=new Date(now);
  if(dow===5||dow===6||(dow===4&&now.getHours()>=13))base.setDate(base.getDate()+7);
  return isoLocal(kalMonday(base));
}
function kalDayDate(weekStr,dayIdx){const d=new Date(weekStr+'T00:00:00');d.setDate(d.getDate()+dayIdx);return d;}
function kalWeekLabel(weekStr){
  const mon=kalDayDate(weekStr,0),fri=kalDayDate(weekStr,4);
  const sameM=mon.getMonth()===fri.getMonth();
  return mon.getDate()+(sameM?'':' '+SV_MONTHS[mon.getMonth()])+'–'+fri.getDate()+' '+SV_MONTHS[fri.getMonth()]+' '+fri.getFullYear();
}

function renderKalender(main){
  if(S.role!=='coach'){renderPlaceholder(main,'kalender');return;}
  if(!S.kalWeek)S.kalWeek=kalDefaultWeek();
  if(S.kalLoadedWeek===S.kalWeek){renderKalenderView(main);return;}
  main.innerHTML='<div class="ph"><div><div class="ph-t">Kalender & planering</div><div class="ph-s">Laddar…</div></div></div><div class="ca"><div class="empty"><p>Laddar veckan…</p></div></div>';
  loadKalender(main);
}

async function loadKalender(main){
  let rows=[];
  try{const r=await sb.from('salj_schedule').select('*').eq('week',S.kalWeek);rows=r.data||[];}catch(e){}
  S.kalRows=rows;S.kalLoadedWeek=S.kalWeek;
  if(S.tab==='kalender')renderKalenderView(main);
}

function renderKalenderView(main){
  const rows=S.kalRows||[];
  const cellOf=(d,s)=>rows.find(r=>r.day_idx===d&&r.slot_idx===s)||null;
  const noteRow=rows.find(r=>r.day_idx===-1)||null;
  const sellerName=id=>{const x=(S.allSellers||[]).find(s=>s.id===id);return x?x.name:'';};

  let head='<tr><th></th>';
  KAL_DAYS.forEach((dn,i)=>{
    const dt=kalDayDate(S.kalWeek,i);
    head+=`<th><span class="kal-dn">${dn}</span><span class="kal-dd">${dt.getDate()}/${dt.getMonth()+1}</span></th>`;
  });
  head+='</tr>';

  let bodyRows='';
  KAL_SLOTS.forEach((slabel,s)=>{
    let tr=`<tr><td class="kal-time">${slabel}</td>`;
    for(let d=0;d<5;d++){
      const c=cellOf(d,s);
      if(c&&c.type){
        const sn=c.seller_id?sellerName(c.seller_id):'';
        tr+=`<td class="kcell t-${c.type}" data-d="${d}" data-s="${s}"><div class="kcell-type">${KAL_TYPES[c.type]||esc(c.type)}</div>${sn?`<div class="kcell-seller">👤 ${esc(sn)}</div>`:''}</td>`;
      }else{
        tr+=`<td class="kcell kcell-empty" data-d="${d}" data-s="${s}">+</td>`;
      }
    }
    tr+='</tr>';
    bodyRows+=tr;
    if(KAL_BREAKS[s]!==undefined)bodyRows+=`<tr><td class="kal-time"></td><td class="kal-break" colspan="5">${KAL_BREAKS[s]}</td></tr>`;
  });

  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">Kalender & planering <span class="role-pill">Coach</span></div><div class="ph-s">Boka pass för veckan – klicka i rutorna</div></div>
    </div>
    <div class="ca">
      <div class="kal-toolbar">
        <div class="kal-wknav">
          <button class="btn btn-s" id="kal-prev">←</button>
          <span class="kal-wklabel">${kalWeekLabel(S.kalWeek)}</span>
          <button class="btn btn-s" id="kal-next">→</button>
        </div>
        <button class="btn btn-s" id="kal-today">Nuvarande vecka</button>
        <div style="flex:1;"></div>
        <button class="btn btn-s" id="kal-copy">📋 Kopiera förra veckan</button>
        <button class="btn btn-p" id="kal-report">📧 Skicka veckorapport</button>
      </div>
      <div class="sec fade-in">
        <div class="sec-body" style="overflow-x:auto;">
          <table class="kal-grid"><thead>${head}</thead><tbody>${bodyRows}</tbody></table>
          <div class="kal-legend">
            ${Object.keys(KAL_TYPES).map(k=>`<span class="kal-leg-item"><span class="ktype-dot kd-${k}"></span>${KAL_TYPES[k]}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>📝 Övrigt – anteckningar för veckan</h3></div>
        <div class="sec-body">
          <textarea id="kal-note" rows="4" style="width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:9px;font-size:13px;font-family:inherit;color:var(--tx);outline:none;box-sizing:border-box;resize:vertical;" placeholder="Fri text – påminnelser, mål, händelser…">${esc(noteRow?noteRow.note:'')}</textarea>
          <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:.7rem;">
            <span id="kal-note-msg" style="font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;"></span>
            <button class="btn btn-s" id="kal-note-save">Spara anteckning</button>
          </div>
        </div>
      </div>
      <div id="kal-msg" style="display:none;border-radius:8px;padding:11px 13px;font-size:13px;white-space:pre-line;margin-top:1rem;"></div>
    </div>`;

  function go(week){S.kalWeek=week;renderKalender(main);}
  main.querySelector('#kal-prev').addEventListener('click',()=>go(isoLocal(kalDayDate(S.kalWeek,-7))));
  main.querySelector('#kal-next').addEventListener('click',()=>go(isoLocal(kalDayDate(S.kalWeek,7))));
  main.querySelector('#kal-today').addEventListener('click',()=>go(kalDefaultWeek()));
  main.querySelectorAll('.kcell').forEach(td=>td.addEventListener('click',()=>showKalCellModal(main,+td.dataset.d,+td.dataset.s)));
  main.querySelector('#kal-note-save').addEventListener('click',async()=>{
    const txt=main.querySelector('#kal-note').value;
    const btn=main.querySelector('#kal-note-save');btn.disabled=true;btn.textContent='Sparar…';
    let error=null;
    try{const r=await sb.from('salj_schedule').upsert(
      {week:S.kalWeek,day_idx:-1,slot_idx:0,type:'ovrigt',note:txt,updated_at:new Date().toISOString()},
      {onConflict:'week,day_idx,slot_idx'});error=r.error;}catch(e){error=e;}
    btn.disabled=false;btn.textContent='Spara anteckning';
    const m=main.querySelector('#kal-note-msg');
    if(error){m.style.color='var(--err)';m.textContent='✗ Kunde inte spara';}
    else{m.style.color='var(--g)';m.textContent='✓ Sparat';S.kalLoadedWeek=null;}
    m.style.opacity='1';setTimeout(()=>{const e=main.querySelector('#kal-note-msg');if(e)e.style.opacity='0';},2200);
  });
  main.querySelector('#kal-copy').addEventListener('click',()=>kalCopyLastWeek(main));
  main.querySelector('#kal-report').addEventListener('click',()=>kalSendReport(main));
}

function showKalCellModal(main,day,slot){
  const mc=document.getElementById('mc');
  const ov=document.createElement('div');ov.className='overlay';
  const cur=(S.kalRows||[]).find(r=>r.day_idx===day&&r.slot_idx===slot);
  const dt=kalDayDate(S.kalWeek,day);
  let selType=cur?cur.type:null;
  const sellers=S.allSellers||[];
  ov.innerHTML=`<div class="modal" style="max-width:380px;">
    <h2>${KAL_DAYS[day]} ${dt.getDate()}/${dt.getMonth()+1}</h2>
    <p style="margin-top:-4px;">${KAL_SLOTS[slot]}</p>
    <div id="kal-types">
      ${Object.keys(KAL_TYPES).map(k=>`<div class="ktype-opt${selType===k?' sel':''}" data-k="${k}"><span class="ktype-dot kd-${k}"></span>${KAL_TYPES[k]}</div>`).join('')}
    </div>
    <div style="margin:12px 0 1.1rem;">
      <label style="display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;">Säljare (valfritt)</label>
      <select id="kal-seller" style="width:100%;padding:9px 11px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none;font-family:inherit;box-sizing:border-box;">
        <option value="">— Ingen —</option>
        ${sellers.map(s=>`<option value="${s.id}" ${cur&&cur.seller_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select>
    </div>
    <div id="kal-cell-msg" style="display:none;font-size:12px;font-weight:600;color:var(--err);margin-bottom:.7rem;"></div>
    <div class="modal-actions">
      ${cur?'<button class="btn btn-d" id="kal-cell-del">Ta bort</button>':''}
      <button class="btn btn-s" id="kal-cell-cancel">Avbryt</button>
      <button class="btn btn-p" id="kal-cell-save">Spara</button>
    </div>
  </div>`;
  function close(){mc.innerHTML='';}
  ov.querySelector('#kal-cell-cancel').addEventListener('click',close);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelectorAll('.ktype-opt').forEach(o=>o.addEventListener('click',()=>{
    selType=o.dataset.k;
    ov.querySelectorAll('.ktype-opt').forEach(x=>x.classList.toggle('sel',x===o));
  }));
  function reloadAndClose(){close();S.kalLoadedWeek=null;renderKalender(main);}
  ov.querySelector('#kal-cell-save').addEventListener('click',async()=>{
    const m=ov.querySelector('#kal-cell-msg');
    if(!selType){m.style.display='block';m.textContent='Välj en passtyp.';return;}
    const sid=ov.querySelector('#kal-seller').value||null;
    const btn=ov.querySelector('#kal-cell-save');btn.disabled=true;btn.textContent='Sparar…';
    let error=null;
    try{const r=await sb.from('salj_schedule').upsert(
      {week:S.kalWeek,day_idx:day,slot_idx:slot,type:selType,seller_id:sid,updated_at:new Date().toISOString()},
      {onConflict:'week,day_idx,slot_idx'});error=r.error;}catch(e){error=e;}
    if(error){btn.disabled=false;btn.textContent='Spara';m.style.display='block';m.textContent='Kunde inte spara: '+(error.message||error);return;}
    reloadAndClose();
  });
  const del=ov.querySelector('#kal-cell-del');
  if(del)del.addEventListener('click',async()=>{
    del.disabled=true;
    try{await sb.from('salj_schedule').delete().eq('week',S.kalWeek).eq('day_idx',day).eq('slot_idx',slot);}catch(e){}
    reloadAndClose();
  });
  mc.innerHTML='';mc.appendChild(ov);
}

function kalShowMsg(main,msg,bad){
  const m=main.querySelector('#kal-msg');if(!m)return;
  m.style.display='block';
  m.style.background=bad?'var(--errl)':'#EAF4EE';
  m.style.color=bad?'var(--err)':'var(--gd)';
  m.style.borderLeft='3px solid '+(bad?'var(--err)':'var(--g)');
  m.textContent=msg;
}

async function kalCopyLastWeek(main){
  if(!confirm('Kopiera alla bokade pass från förra veckan till denna vecka? Befintliga pass skrivs över.'))return;
  const prev=isoLocal(kalDayDate(S.kalWeek,-7));
  let prevRows=[];
  try{const r=await sb.from('salj_schedule').select('*').eq('week',prev);prevRows=r.data||[];}catch(e){}
  const toCopy=prevRows.filter(r=>r.day_idx>=0&&r.type);
  if(!toCopy.length){kalShowMsg(main,'Förra veckan hade inga bokade pass att kopiera.',true);return;}
  const upserts=toCopy.map(r=>({week:S.kalWeek,day_idx:r.day_idx,slot_idx:r.slot_idx,type:r.type,seller_id:r.seller_id||null,updated_at:new Date().toISOString()}));
  let error=null;
  try{const r=await sb.from('salj_schedule').upsert(upserts,{onConflict:'week,day_idx,slot_idx'});error=r.error;}catch(e){error=e;}
  if(error){kalShowMsg(main,'✗ Kunde inte kopiera: '+(error.message||error),true);return;}
  S.kalLoadedWeek=null;renderKalender(main);
}

async function kalSendReport(main){
  const rows=S.kalRows||[];
  const sellerName=id=>{const x=(S.allSellers||[]).find(s=>s.id===id);return x?x.name:'';};
  const days=KAL_DAYS.map((dn,d)=>{
    const dt=kalDayDate(S.kalWeek,d);
    const passes=[];
    KAL_SLOTS.forEach((sl,s)=>{
      const c=rows.find(r=>r.day_idx===d&&r.slot_idx===s);
      if(c&&c.type)passes.push({time:sl,type:KAL_TYPES[c.type]||c.type,seller:c.seller_id?sellerName(c.seller_id):''});
    });
    return {label:dn+' '+dt.getDate()+'/'+(dt.getMonth()+1),passes:passes};
  });
  const noteRow=rows.find(r=>r.day_idx===-1);
  const total=days.reduce((a,d)=>a+d.passes.length,0);
  // Veckans ordervärde — summa av alla säljares orderbelopp mån–fre
  const monday=S.kalWeek,friday=isoLocal(kalDayDate(S.kalWeek,4));
  const orderValue=(S.allStats||[])
    .filter(d=>String(d.date)>=monday&&String(d.date)<=friday)
    .reduce((a,d)=>a+dayOrderbelopp(d),0);
  if(!confirm('Skicka veckorapporten ('+total+' bokade pass) till tl@smartid.se och kt@smartid.se?'))return;
  const btn=main.querySelector('#kal-report');btn.disabled=true;btn.textContent='Skickar…';
  let res;
  try{res=await sb.functions.invoke('send-week-report',{body:{weekLabel:kalWeekLabel(S.kalWeek),days:days,note:noteRow?noteRow.note:'',orderValue:orderValue}});}
  catch(e){res={error:e};}
  btn.disabled=false;btn.textContent='📧 Skicka veckorapport';
  if(res.error){kalShowMsg(main,'✗ Kunde inte nå servern. Är Edge Function-en deployad?\n'+(res.error.message||res.error),true);return;}
  if(!res.data||!res.data.ok){kalShowMsg(main,'✗ '+((res.data&&res.data.error)||'Okänt fel.'),true);return;}
  kalShowMsg(main,'✓ '+(res.data.message||'Veckorapport skickad.'),false);
}

/* ============================================================

   ============================================================ */
function renderPlaceholder(main,tab){
  const titles={dagligt:'Daglig rapport',historik:'Historik',provision:'Provision',
    produktutbildning:'Produktutbildning',saljutbildning:'Säljutbildning',ljudfiler:'Ljudfiler',
    mal:'Mål & Streak',tavlingar:'Tävlingar',team:'Lägg till säljare',teamstats:'Statistik säljare',allstats:'All statistik'};
  const title=titles[tab]||'Sida';
  main.innerHTML=`
    <div class="ph"><div><div class="ph-t">${esc(title)}</div><div class="ph-s">Byggs i en kommande etapp</div></div></div>
    <div class="ca">
      <div class="ph-soon">
        <div class="ph-soon-ic">🚧</div>
        <h2>${esc(title)} byggs i nästa etapp</h2>
        <p>Den här vyn finns redan färdig i demon och kopplas till Supabase steg för steg. Etapp 1 (inloggning + dashboard) är klar.</p>
      </div>
    </div>`;
}

   EVENT-BINDNINGAR
   ============================================================ */
(function(){
  document.getElementById('login-btn').addEventListener('click',doLogin);
  ['li-email','li-pass'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  });
  document.getElementById('logout-btn').addEventListener('click',doLogout);
  document.getElementById('changepw-btn').addEventListener('click',showChangePasswordModal);
  document.getElementById('forgot-link').addEventListener('click',()=>{document.getElementById('fp-msg').style.display='none';showOnly('forgot-screen');});
  document.getElementById('fp-btn').addEventListener('click',doForgotPassword);
  document.getElementById('fp-back').addEventListener('click',()=>showOnly('login-screen'));
  document.getElementById('fp-email').addEventListener('keydown',e=>{if(e.key==='Enter')doForgotPassword();});
  document.getElementById('rp-btn').addEventListener('click',doResetPassword);
  ['rp-pass','rp-pass2'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doResetPassword();});
  });
  /* Återställningslänk i mejl → visa "sätt nytt lösenord"-skärmen */
  sb.auth.onAuthStateChange((event)=>{
    if(event==='PASSWORD_RECOVERY'){S.recovery=true;showOnly('reset-screen');}
  });
  document.getElementById('sb-nav').addEventListener('click',e=>{
    const btn=e.target.closest('.sbi');
    if(!btn)return;
    document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.tab=btn.dataset.tab;
    render();
  });
  /* Starta: finns session → appen, annars login */
  bootstrap();
})();
