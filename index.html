<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartID Sälj-CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --g:#1E5C4E;--gd:#1A3D30;--gm:#2D7A65;--gt:#4AAF96;
  --gold:#C8A84B;--w:#fff;--bg:#F4F8F6;--bg2:#EBF2EF;
  --br:#C8DDD4;--tx:#1A3D30;--mu:#557A6A;
  --err:#C0392B;--errl:#FDEDEC;
  --warn:#E67E22;--warnl:#FDF2E9;
  --sb:240px;
  --blue:#3B7DD8;--bluel:#E8F1FB;
  --purple:#7C5BC9;--purplel:#EFEAFC;
}
html[data-theme="dark"]{
  --g:#2D9476;--gd:#E8F4EE;--gm:#3DA585;--gt:#5BC9A8;
  --gold:#D4B85F;--w:#1F2A26;--bg:#161E1B;--bg2:#243029;
  --br:#3A4A42;--tx:#E8F4EE;--mu:#9CB5A8;
  --err:#E55B4E;--errl:#3A1F1C;
  --warn:#F39C42;--warnl:#3A2A1A;
  --blue:#5B95E0;--bluel:#1F2D40;
  --purple:#9C7BD9;--purplel:#2A2138;
}
html[data-theme="dark"] body{background:var(--bg);color:var(--tx);}
html[data-theme="dark"] .login-card{background:#243029;}
html[data-theme="dark"] .login-card input,html[data-theme="dark"] input,html[data-theme="dark"] select,html[data-theme="dark"] textarea{background:var(--bg2);color:var(--tx);border-color:var(--br);}
html[data-theme="dark"] .sb-snippet b{background:#5A4D1E;color:var(--tx);}
html[data-theme="dark"] .mn-col blockquote{background:#2D2618;}
html[data-theme="dark"] .sa-highlight{background:#1F3024;}
html[data-theme="dark"] .sa-tip{background:var(--bg2);}
html[data-theme="dark"] audio{filter:invert(.85) hue-rotate(180deg);}
@media (max-width:900px){
  :root{--sb:0;}
  .sidebar{position:fixed;top:0;left:-260px;width:240px;height:100vh;z-index:100;transition:left .25s;box-shadow:0 0 30px rgba(0,0,0,.3);}
  .sidebar.open{left:0;}
  .topbar{padding:.45rem .8rem;}
  .tb-breadcrumb{display:none;}
  .tb-search{max-width:none;}
  .ph,.ca{padding-left:1rem;padding-right:1rem;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .sa-stats{grid-template-columns:1fr 1fr;}
  .mn-grid.both{grid-template-columns:1fr;}
  #v3-mobile-menu{display:flex;}
  #ai-panel{width:100vw;height:100vh;bottom:0;right:0;max-height:100vh;border-radius:0;}
  #ai-bubble{bottom:12px;right:12px;}
}
#v3-mobile-menu{display:none;width:38px;height:38px;border-radius:8px;border:none;background:transparent;cursor:pointer;align-items:center;justify-content:center;color:var(--gd);}
#v3-mobile-menu:hover{background:var(--bg);}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;}
.mobile-overlay.show{display:block;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gd),var(--g));padding:1rem;}
.login-card{background:var(--w);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 12px 48px rgba(0,0,0,.25);}
.login-logo{font-size:28px;font-weight:700;color:var(--g);margin-bottom:.2rem;}
.login-logo span{color:var(--gt);}
.login-sub{font-size:13px;color:var(--mu);margin-bottom:2rem;}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
.login-card input{width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;color:var(--tx);background:var(--bg);margin-bottom:14px;outline:none;transition:border-color .2s;}
.login-card input:focus{border-color:var(--gt);}
.login-btn{width:100%;padding:11px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s;}
.login-btn:hover{opacity:.88;}
.login-btn:disabled{opacity:.55;cursor:default;}
.login-err{color:var(--err);font-size:12px;margin-top:10px;display:none;text-align:center;}
.login-link{display:block;width:100%;background:none;border:none;color:var(--g);font-size:12.5px;font-weight:600;cursor:pointer;margin-top:12px;padding:4px;font-family:inherit;}
.login-link:hover{text-decoration:underline;}
.login-card p.login-info{font-size:13px;color:var(--mu);line-height:1.55;margin-bottom:1.2rem;}

/* APP */
.shell{display:none;height:100vh;overflow:hidden;}
.shell.show{display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sb);flex-shrink:0;background:var(--gd);display:flex;flex-direction:column;height:100%;overflow-y:auto;}
.sb-hdr{padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo{font-size:18px;font-weight:700;color:#fff;}
.sb-logo span{color:var(--gt);}
.sb-tag{font-size:11px;color:var(--gt);margin-top:2px;font-weight:600;letter-spacing:.05em;}
.sb-user{font-size:12px;color:rgba(255,255,255,.55);margin-top:.7rem;display:flex;align-items:center;gap:8px;padding:6px 4px;}
.sb-user-avatar{width:26px;height:26px;border-radius:50%;background:var(--gt);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.sb-role{font-size:10px;color:var(--gt);font-weight:700;letter-spacing:.05em;}
.sb-nav{flex:1;padding:.7rem .5rem;}
.sb-sec{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:.5rem .8rem .25rem;margin-top:.4rem;}
.sbi{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;margin-bottom:2px;background:transparent;border:none;width:100%;text-align:left;transition:all .15s;}
.sbi:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sbi.active{background:rgba(255,255,255,.12);color:#fff;}
.sbi svg{flex-shrink:0;opacity:.7;}
.sbi.active svg{opacity:1;color:var(--gt);}
.sbi .soon{margin-left:auto;font-size:9px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:.03em;}
.sb-ftr{padding:.7rem .5rem;border-top:1px solid rgba(255,255,255,.06);}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:transparent;border:none;color:rgba(255,255,255,.45);font-size:12px;cursor:pointer;border-radius:6px;transition:all .2s;}
.logout-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);}

/* MAIN */
.main{flex:1;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.ph{padding:1.1rem 1.6rem;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:1rem;flex-wrap:wrap;}
.ph-t{font-size:18px;font-weight:600;}
.ph-s{font-size:12px;color:var(--mu);margin-top:2px;}
.ca{flex:1;padding:1.4rem 1.6rem;}
.role-pill{font-size:12px;color:var(--gold);background:#FAEEDA;padding:3px 9px;border-radius:5px;font-weight:600;margin-left:6px;vertical-align:middle;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:1.5rem;}
.kpi{background:var(--w);border:1px solid var(--br);border-radius:14px;padding:1.2rem 1.3rem;}
.kpi-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:.7rem;}
.kpi-ic.green{background:#EAF4EE;color:var(--g);}
.kpi-ic.gold{background:#FAEEDA;color:var(--gold);}
.kpi-ic.blue{background:var(--bluel);color:var(--blue);}
.kpi-ic.purple{background:var(--purplel);color:var(--purple);}
.kpi-ic.orange{background:var(--warnl);color:var(--warn);}
.kpi-l{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:.3rem;}
.kpi-v{font-size:28px;font-weight:700;color:var(--tx);line-height:1;}
.kpi-sub{font-size:11px;color:var(--mu);margin-top:.4rem;}

/* SECTION CARDS */
.sec{background:var(--w);border:1px solid var(--br);border-radius:14px;overflow:hidden;margin-bottom:1.2rem;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.4rem;border-bottom:1px solid var(--bg2);gap:1rem;}
.sec-hdr h3{font-size:14px;font-weight:600;}
.sec-body{padding:1.2rem 1.4rem;}

.empty{text-align:center;padding:2.4rem 1rem;color:var(--mu);}
.empty p{font-size:14px;font-weight:600;}
.empty small{font-size:12px;}

/* NOTICE */
.notice{border-radius:10px;padding:12px 16px;margin-bottom:1.2rem;font-size:13px;line-height:1.5;}
.notice.warn{background:var(--warnl);border:1px solid #F0C090;border-left:3px solid var(--warn);color:var(--tx);}

/* PLACEHOLDER (kommande etapper) */
.ph-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 1rem;}
.ph-soon-ic{font-size:48px;margin-bottom:1rem;}
.ph-soon h2{font-size:18px;font-weight:600;margin-bottom:.4rem;}
.ph-soon p{font-size:13px;color:var(--mu);max-width:360px;line-height:1.6;}

/* LOADER */
.loader{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:var(--bg);}
.spin{width:34px;height:34px;border:3px solid var(--bg2);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader p{font-size:13px;color:var(--mu);}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .5s ease-out forwards;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px;}

/* ===== ETAPP 2: knappar, formulär, tabeller ===== */
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .18s;}
.btn:disabled{opacity:.55;cursor:default;}
.btn-p{background:var(--g);color:#fff;}
.btn-p:hover{background:var(--gm);}
.btn-d{background:transparent;color:var(--err);border:1px solid #F09595;}
.btn-d:hover{background:var(--errl);}
.fl{display:flex;flex-direction:column;gap:5px;}
.fl label{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;}
.fl input{padding:8px 10px;border:1px solid var(--br);border-radius:8px;background:var(--bg);color:var(--tx);font-size:14px;outline:none;font-weight:500;}
.fl input:focus{border-color:var(--gt);}
.daily-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.salj-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px;padding:.7rem 0;border-bottom:1px solid var(--bg2);align-items:center;}
.salj-row:last-child{border:none;}
.salj-name{font-size:13px;font-weight:600;color:var(--tx);}
.prov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
.prov-item{padding:11px 13px;background:var(--bg);border:1px solid var(--br);border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.prov-item .pl{font-size:11px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.prov-item .pv{font-size:14px;font-weight:700;color:var(--g);}
.htable-wrap{overflow-x:auto;}
.htable{width:100%;border-collapse:collapse;font-size:13px;min-width:720px;}
.htable thead th{background:var(--bg2);color:var(--mu);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--br);}
.htable thead th:not(:first-child){text-align:center;}
.htable tbody td{padding:10px 12px;border-bottom:1px solid var(--bg2);white-space:nowrap;}
.htable tbody td:not(:first-child){text-align:center;}
.htable tbody tr:hover td{background:var(--bg);}
.h-day{font-weight:600;font-size:13px;}
.h-num{font-weight:600;font-size:14px;color:var(--tx);}
.h-num.salj{color:var(--g);}
.h-num.no{color:var(--mu);}
.h-num.cb{color:var(--blue);}
.tot-row td{background:var(--bg2);font-weight:700;border-top:2px solid var(--br);}
.bar-chart{display:flex;flex-direction:column;gap:12px;}
.bar-row{display:grid;grid-template-columns:130px 1fr 140px;gap:12px;align-items:center;}
.bar-row .bl{font-size:13px;font-weight:600;color:var(--tx);}
.bar-row .bw{height:22px;background:var(--bg2);border-radius:6px;overflow:hidden;}
.bar-row .bf{height:100%;border-radius:6px;transition:width .6s ease;}
.bar-row .bv{font-size:13px;font-weight:700;text-align:right;}
.btn-s{background:var(--bg2);color:var(--tx);border:1px solid var(--br);}
.btn-s:hover{background:var(--br);}
.btn-xs{padding:6px 10px;font-size:12px;}
.circles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;}
.circ-card{background:var(--w);border:1px solid var(--br);border-radius:14px;padding:1.1rem;text-align:center;}
.circ-wrapper{position:relative;width:120px;height:120px;margin:0 auto .55rem;}
.circ-svg{width:120px;height:120px;transform:rotate(-90deg);}
.circ-bg{fill:none;stroke:var(--bg2);stroke-width:12;}
.circ-fg{fill:none;stroke-width:12;stroke-linecap:round;}
.circ-wrapper>div{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.circ-pct{font-size:21px;font-weight:700;}
.circ-label{font-size:10px;color:var(--mu);margin-top:2px;}
.circ-title{font-size:13px;font-weight:600;color:var(--tx);}
.overlay{position:fixed;inset:0;background:rgba(15,42,30,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal{background:var(--w);border-radius:16px;padding:1.6rem;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.25);}
.modal h2{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:.5rem;}
.modal p{font-size:13px;color:var(--mu);line-height:1.55;margin-bottom:1rem;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:.5rem;}
.fdrop{border:2px dashed var(--br);border-radius:10px;padding:1.6rem;text-align:center;cursor:pointer;margin-bottom:1rem;transition:border-color .18s;}
.fdrop:hover{border-color:var(--gt);}
@keyframes confettiFall{0%{transform:translateY(-15vh) rotate(0);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:.25;}}
.confetti-piece{position:fixed;top:0;z-index:9999;pointer-events:none;border-radius:2px;}
.podium-bar{display:flex;align-items:flex-start;justify-content:center;padding-top:4px;border-radius:6px 6px 0 0;transform-origin:bottom;animation:podiumRise .6s cubic-bezier(.2,.8,.2,1) both;}
@keyframes podiumRise{from{transform:scaleY(0);}to{transform:scaleY(1);}}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff5252;margin-right:5px;animation:livePulse 1.4s infinite;}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.comp-card-seller{border-radius:14px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.12);}

/* === UTBILDNING === */
.train-hero{background:linear-gradient(135deg,var(--gd) 0%,var(--g) 60%,var(--gm) 100%);color:#fff;border-radius:16px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.train-hero::before{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(74,175,150,.3),transparent 70%);}
.train-hero h1{font-size:26px;font-weight:700;margin-bottom:.4rem;position:relative;}
.train-hero p{font-size:14px;opacity:.85;max-width:600px;position:relative;line-height:1.6;}
.train-status-bar{display:flex;gap:14px;margin-top:1.4rem;flex-wrap:wrap;position:relative;}
.train-stat{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:.7rem 1rem;flex:1;min-width:140px;}
.train-stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;opacity:.7;font-weight:600;}
.train-stat-v{font-size:22px;font-weight:700;margin-top:2px;}

.cert-card{background:linear-gradient(135deg,#FFF6D6 0%,#FAEEDA 100%);border:2px solid var(--gold);border-radius:14px;padding:1.5rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;}
.cert-icon{font-size:48px;}
.cert-card h3{font-size:18px;color:var(--gd);margin-bottom:.25rem;}
.cert-card p{font-size:13px;color:var(--mu);}
.cert-card .cert-date{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:.4rem;}

.slide-stage{background:var(--w);border:1px solid var(--br);border-radius:14px;padding:0;overflow:hidden;margin-bottom:1.2rem;}
.slide-frame{min-height:520px;padding:2.4rem 2rem;background:linear-gradient(180deg,var(--bg) 0%,#fff 100%);position:relative;}
.slide-num{position:absolute;top:14px;right:18px;background:var(--g);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.slide-cat{position:absolute;top:14px;left:18px;background:var(--gold);color:#fff;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.slide-h1{font-size:32px;font-weight:800;color:var(--gd);margin:1.5rem 0 .8rem;line-height:1.2;}
.slide-h2{font-size:22px;font-weight:700;color:var(--g);margin:1.2rem 0 .6rem;}
.slide-h3{font-size:16px;font-weight:700;color:var(--gd);margin:1rem 0 .4rem;}
.slide-lead{font-size:16px;line-height:1.7;color:var(--tx);margin-bottom:1rem;}
.slide-frame ul{margin:.8rem 0 1.2rem 1.2rem;}
.slide-frame li{font-size:15px;line-height:1.65;color:var(--tx);margin-bottom:.5rem;}
.slide-frame strong{color:var(--gd);}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:1.2rem 0;}
.stat-box{background:var(--w);border:2px solid var(--gold);border-radius:12px;padding:1rem;text-align:center;}
.stat-big{font-size:30px;font-weight:800;color:var(--err);}
.stat-lbl{font-size:11px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem;}

.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:1rem 0;}
.feat-item{background:var(--bg);border-left:3px solid var(--gt);border-radius:8px;padding:.9rem 1.1rem;}
.feat-item h4{font-size:14px;font-weight:700;color:var(--gd);margin-bottom:.3rem;}
.feat-item p{font-size:12px;color:var(--mu);line-height:1.5;}

.pkg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:1rem 0;}
.pkg-card{background:var(--w);border:1.5px solid var(--br);border-radius:12px;padding:1.2rem;text-align:center;position:relative;transition:transform .2s;}
.pkg-name{font-size:12px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.pkg-tier{font-size:18px;font-weight:700;margin-top:.2rem;}
.pkg-price{font-size:24px;font-weight:800;color:var(--g);margin:.4rem 0;}
.pkg-price small{font-size:12px;font-weight:500;color:var(--mu);}
.pkg-desc{font-size:11px;color:var(--mu);font-weight:600;margin-bottom:.6rem;}
.pkg-list{font-size:12px;color:var(--tx);text-align:left;line-height:1.7;margin-top:.5rem;border-top:1px solid var(--bg2);padding-top:.7rem;}

.compare-tbl{width:100%;border-collapse:collapse;margin:1rem 0;font-size:13px;}
.compare-tbl th{background:var(--gd);color:#fff;padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.compare-tbl th:not(:first-child){text-align:center;}
.compare-tbl td{padding:8px 12px;border-bottom:1px solid var(--bg2);}
.compare-tbl td:not(:first-child){text-align:center;font-weight:600;}
.compare-tbl tr:hover td{background:var(--bg);}
.check-yes{color:var(--g);font-size:16px;font-weight:700;}
.check-no{color:#ddd;font-size:16px;}

.process-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:1rem 0;}
.proc-step{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem;position:relative;padding-left:50px;}
.proc-step .num{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.proc-step h4{font-size:13px;font-weight:700;color:var(--gd);margin-bottom:.2rem;}
.proc-step p{font-size:11px;color:var(--mu);line-height:1.4;}

.objection-card{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem;margin-bottom:.8rem;}
.objection-card .obj{background:var(--errl);border-left:3px solid var(--err);border-radius:6px;padding:.6rem .9rem;margin-bottom:.6rem;}
.objection-card .obj-l{font-size:10px;font-weight:700;color:var(--err);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem;}
.objection-card .ans{background:#EAF4EE;border-left:3px solid var(--g);border-radius:6px;padding:.6rem .9rem;}
.objection-card .ans-l{font-size:10px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem;}
.objection-card .obj p,.objection-card .ans p{font-size:13px;line-height:1.55;}

.spin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:1rem 0;}
.spin-item{background:var(--w);border:1.5px solid var(--gt);border-radius:10px;padding:.9rem;}
.spin-letter{display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--gt);color:#fff;text-align:center;line-height:28px;font-weight:800;font-size:14px;}
.spin-name{font-size:13px;font-weight:700;margin-top:.4rem;color:var(--gd);}
.spin-q{font-size:12px;color:var(--mu);font-style:italic;line-height:1.5;margin-top:.3rem;}

.fab-flow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:1rem 0;align-items:stretch;}
.fab-step{background:var(--w);border:1.5px solid var(--br);border-radius:10px;padding:.9rem;position:relative;}
.fab-step .letter{font-size:32px;font-weight:800;color:var(--gt);line-height:1;}
.fab-step h4{font-size:12px;font-weight:700;color:var(--gd);margin:.3rem 0;}
.fab-step p{font-size:12px;color:var(--mu);font-style:italic;line-height:1.5;}

.tech-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:1rem 0;}
.tech-card{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem;}
.tech-card h4{font-size:13px;font-weight:700;color:var(--gd);margin-bottom:.4rem;}
.tech-quote{background:var(--bg);border-left:3px solid var(--gold);padding:.5rem .8rem;border-radius:6px;margin:.4rem 0;font-size:12px;font-style:italic;line-height:1.5;color:var(--tx);}
.tech-when{font-size:11px;color:var(--mu);font-weight:600;}

.slide-nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.4rem;background:var(--bg2);border-top:1px solid var(--br);}
.slide-progress{flex:1;margin:0 1rem;height:6px;background:var(--br);border-radius:3px;overflow:hidden;}
.slide-progress-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--gt));border-radius:3px;transition:width .3s;}
.slide-pos{font-size:12px;color:var(--mu);font-weight:600;min-width:60px;text-align:center;}

/* QUIZ */
.quiz-stage{background:var(--w);border:1px solid var(--br);border-radius:14px;padding:1.6rem 1.8rem;margin-bottom:1.2rem;}
.quiz-q-num{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem;}
.quiz-q{font-size:18px;font-weight:700;color:var(--gd);margin-bottom:1.2rem;line-height:1.4;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{background:var(--bg);border:1.5px solid var(--br);border-radius:10px;padding:.9rem 1.1rem;cursor:pointer;transition:all .15s;font-size:14px;color:var(--tx);text-align:left;}
.quiz-opt:hover{background:var(--bg2);border-color:var(--gt);}
.quiz-opt.selected{background:#EAF4EE;border-color:var(--g);}
.quiz-opt.correct{background:#EAF4EE;border-color:var(--g);}
.quiz-opt.incorrect{background:var(--errl);border-color:var(--err);}
.quiz-opt-letter{display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--w);border:1.5px solid var(--br);text-align:center;line-height:21px;font-weight:700;font-size:12px;margin-right:8px;}
.quiz-opt.selected .quiz-opt-letter{background:var(--g);color:#fff;border-color:var(--g);}
.quiz-opt.correct .quiz-opt-letter{background:var(--g);color:#fff;border-color:var(--g);}
.quiz-opt.incorrect .quiz-opt-letter{background:var(--err);color:#fff;border-color:var(--err);}

.quiz-result{background:linear-gradient(135deg,var(--g),var(--gt));color:#fff;border-radius:14px;padding:2.2rem 1.8rem;text-align:center;margin-bottom:1.2rem;}
.quiz-result.failed{background:linear-gradient(135deg,#A32D2D,var(--err));}
.quiz-result .big{font-size:56px;font-weight:800;line-height:1;margin-bottom:.4rem;}
.quiz-result h2{font-size:22px;margin-bottom:.4rem;}
.quiz-result p{font-size:14px;opacity:.9;}
.quiz-summary{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem 1.2rem;margin-top:1rem;text-align:left;color:var(--tx);}

/* === LJUDBIBLIOTEK === */
.audio-upload-card{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1.2rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}

/* === MODERN AUDIO LIBRARY (3 kategorier) === */
@keyframes slideInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(74,175,150,.5);}50%{box-shadow:0 0 0 10px rgba(74,175,150,0);}}
@keyframes wave{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.4);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0;}50%{transform:scale(1.05);}70%{transform:scale(.95);}100%{transform:scale(1);opacity:1;}}

.audio-cat-tabs{display:flex;gap:8px;margin-bottom:1.4rem;flex-wrap:wrap;}
.audio-cat-tab{flex:1;min-width:200px;display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--w);border:2px solid var(--br);border-radius:14px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--gd);transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.audio-cat-tab:hover{transform:translateY(-2px);border-color:var(--cat-color);box-shadow:0 6px 14px rgba(0,0,0,.08);}
.audio-cat-tab.active{background:var(--cat-bg);border-color:var(--cat-color);color:var(--cat-color);box-shadow:0 4px 12px rgba(0,0,0,.06);}
.audio-cat-tab.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cat-color);}
.audio-cat-icon{font-size:22px;}
.audio-cat-label{flex:1;text-align:left;}
.audio-cat-count{background:var(--cat-color);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center;}

.audio-cat-header{display:flex;align-items:center;gap:14px;background:var(--cat-bg);border-left:4px solid var(--cat-color);border-radius:12px;padding:16px 20px;margin-bottom:1.4rem;animation:slideInUp .4s ease;}
.audio-cat-header-icon{font-size:32px;}
.audio-cat-header-title{font-size:18px;font-weight:700;color:var(--cat-color);margin-bottom:2px;}
.audio-cat-header-desc{font-size:13px;color:var(--mu);}
.audio-cat-header-stats{margin-left:auto;background:#fff;color:var(--cat-color);font-weight:700;padding:6px 14px;border-radius:20px;font-size:13px;border:1px solid var(--cat-color);}

.audio-upload-card-modern{display:flex;align-items:flex-start;gap:14px;background:linear-gradient(135deg,var(--w),var(--bg));border:2px dashed var(--br);border-radius:14px;padding:18px;margin-bottom:1.4rem;transition:border-color .2s;}
.audio-upload-card-modern:hover{border-color:var(--cat-color,var(--g));}
.audio-upload-icon{font-size:32px;animation:bounceIn .5s ease;}
.audio-upload-grid-modern{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:8px;}
.audio-upload-grid-modern .audio-input{padding:9px 12px;border:1px solid var(--br);border-radius:8px;font-size:13px;font-family:inherit;}
.audio-upload-grid-modern .audio-file-input{grid-column:1/-1;padding:9px;border:1px dashed var(--br);border-radius:8px;font-size:12px;cursor:pointer;background:var(--bg2);}
.audio-upload-btn-modern{padding:9px 18px;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.audio-upload-btn-modern:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.audio-upload-btn-modern:active{transform:translateY(0);}

.audio-grid-modern{display:grid;grid-template-columns:1fr;gap:14px;}
.audio-card-modern,.audio-card-empty{background:var(--w);border:2px solid var(--br);border-radius:14px;padding:16px;position:relative;animation:slideInUp .5s ease both;transition:all .25s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.audio-card-modern:hover{transform:translateY(-3px);border-color:var(--cat-color);box-shadow:0 8px 20px rgba(0,0,0,.08);}
.audio-card-modern.playing{border-color:var(--cat-color);background:linear-gradient(135deg,var(--w) 60%,var(--cat-bg));box-shadow:0 6px 18px rgba(0,0,0,.1);}
.audio-card-modern.playing::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cat-color),transparent);background-size:200% 100%;animation:shimmer 2s linear infinite;}
.audio-card-num{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;color:var(--mu);opacity:.6;letter-spacing:.05em;}
.audio-card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;padding-right:30px;}
.audio-card-icon{font-size:24px;flex-shrink:0;}
.audio-card-info{flex:1;min-width:0;}
.audio-card-title{font-size:14.5px;font-weight:700;color:var(--gd);margin:0 0 4px;line-height:1.3;}
.audio-card-meta{display:flex;gap:10px;font-size:11px;color:var(--mu);font-weight:500;}
.audio-delete-btn-modern{background:transparent;border:none;cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px;opacity:.4;transition:all .15s;}
.audio-delete-btn-modern:hover{opacity:1;background:var(--errl);}

.audio-player-modern{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:8px;}
.audio-play-btn-modern{background:var(--cat-color);color:#fff;border:none;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;}
.audio-play-btn-modern:hover{transform:scale(1.08);}
.audio-card-modern.playing .audio-play-btn-modern{animation:pulseGlow 1.5s ease-in-out infinite;}
.audio-skip-btn{background:var(--w);border:1px solid var(--br);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gd);flex-shrink:0;transition:all .15s;position:relative;font-family:inherit;gap:1px;}
.audio-skip-btn:hover{background:var(--cat-color);color:#fff;border-color:var(--cat-color);}
.audio-skip-btn .skip-num{font-size:8px;font-weight:700;letter-spacing:-.02em;}
.audio-time-wrap-modern{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.audio-time-current,.audio-time-total{font-size:11px;color:var(--mu);font-variant-numeric:tabular-nums;flex-shrink:0;font-weight:600;}
.audio-progress-modern{flex:1;height:6px;background:rgba(0,0,0,.08);border-radius:4px;cursor:pointer;overflow:hidden;position:relative;}
.audio-progress-bar-modern{height:100%;background:linear-gradient(90deg,var(--cat-color),var(--cat-color));width:0%;transition:width .12s linear;border-radius:4px;position:relative;}
.audio-card-modern.playing .audio-progress-bar-modern::after{content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--cat-color);border-radius:50%;box-shadow:0 0 8px var(--cat-color);animation:wave 1s ease-in-out infinite;}

.audio-card-empty{border-style:dashed;background:var(--bg);text-align:center;padding:24px 16px;opacity:.7;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;}
.audio-card-empty:hover{opacity:1;border-color:var(--cat-color);}
.audio-empty-icon{font-size:32px;opacity:.5;margin-bottom:6px;}
.audio-empty-text{font-size:13px;font-weight:600;color:var(--mu);}
.audio-empty-sub{font-size:11px;color:var(--mu);margin-top:2px;opacity:.7;}

@media(min-width:768px){.audio-grid-modern{grid-template-columns:repeat(auto-fill,minmax(380px,1fr));}}
.audio-upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.audio-upload-grid textarea,.audio-upload-grid .audio-file-input,.audio-upload-grid .audio-upload-btn{grid-column:1 / -1;}
.audio-input{padding:.55rem .8rem;border:1px solid var(--br);border-radius:6px;font-size:13px;font-family:inherit;background:var(--w);color:var(--gd);}
.audio-input:focus{outline:none;border-color:var(--g);}
.audio-file-input{padding:.5rem;border:1px dashed var(--br);border-radius:6px;font-size:12px;cursor:pointer;background:var(--bg2);}
.audio-upload-btn{background:var(--g);color:#fff;border:none;border-radius:6px;padding:.65rem 1.4rem;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.audio-upload-btn:hover{background:var(--gd);}
.audio-list{display:flex;flex-direction:column;gap:.8rem;}
.audio-empty{text-align:center;padding:3rem 1rem;background:var(--w);border:1px dashed var(--br);border-radius:10px;}
.audio-item{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem 1.2rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.audio-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:.7rem;}
.audio-item-info{flex:1;min-width:0;}
.audio-item-title{font-size:14px;font-weight:700;color:var(--gd);margin:0 0 .3rem;}
.audio-item-meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem;}
.audio-meta-tag{font-size:11px;color:var(--mu);background:var(--bg2);padding:2px 7px;border-radius:10px;}
.audio-item-desc{font-size:12px;color:var(--mu);line-height:1.5;margin:.3rem 0 0;}
.audio-delete-btn{background:transparent;border:1px solid var(--br);color:var(--err);border-radius:6px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.audio-delete-btn:hover{background:var(--errl);border-color:var(--err);}
.audio-player{display:flex;align-items:center;gap:.6rem;background:var(--bg2);border-radius:8px;padding:.6rem .8rem;}
.audio-play-btn,.audio-rewind-btn,.audio-forward-btn{background:var(--w);border:1px solid var(--br);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g);transition:all .15s;flex-shrink:0;}
.audio-play-btn:hover,.audio-rewind-btn:hover,.audio-forward-btn:hover{background:var(--g);color:#fff;border-color:var(--g);}
.audio-play-btn{background:var(--g);color:#fff;border-color:var(--g);width:38px;height:38px;}
.audio-play-btn:hover{background:var(--gd);}
.audio-time-wrap{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;}
.audio-time-current,.audio-time-total{font-size:11px;color:var(--mu);font-variant-numeric:tabular-nums;flex-shrink:0;}
.audio-progress{flex:1;height:6px;background:rgba(0,0,0,.08);border-radius:3px;cursor:pointer;position:relative;overflow:hidden;}
.audio-progress-bar{height:100%;background:var(--g);width:0%;transition:width .1s linear;}
.audio-source{display:none;}

/* === MÅL & STREAK — bonusmätare === */
.bmeter-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}
.bmeter{background:var(--bg);border:1px solid var(--br);border-radius:14px;padding:17px 19px;transition:.25s;}
.bmeter-done{border-color:var(--g);background:linear-gradient(135deg,#EAF4EE,#F5FBF7);box-shadow:0 4px 18px rgba(46,160,90,.14);}
.bmeter-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.bmeter-ic{font-size:24px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-radius:11px;flex-shrink:0;}
.bmeter-done .bmeter-ic{background:#fff;}
.bmeter-head{flex:1;min-width:0;}
.bmeter-label{font-size:15px;font-weight:700;color:var(--tx);}
.bmeter-sub{font-size:11px;color:var(--mu);margin-top:1px;}
.bmeter-reward{font-size:13px;font-weight:800;color:var(--mu);background:var(--bg2);padding:6px 13px;border-radius:20px;white-space:nowrap;}
.bmeter-reward.br-on{color:#fff;background:var(--g);}
.bmeter-track{height:13px;background:var(--bg2);border-radius:7px;overflow:hidden;}
.bmeter-fill{height:100%;background:linear-gradient(90deg,var(--gt),var(--g));border-radius:7px;transition:width .9s cubic-bezier(.2,.8,.2,1);}
.bmeter-fill.bf-done{background:linear-gradient(90deg,var(--g),var(--gold));}
.bmeter-foot{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;}
.bmeter-count{font-weight:700;color:var(--tx);}
.bmeter-status{font-weight:600;color:var(--mu);}
.bmeter-done .bmeter-status{color:var(--gd);}
.bmeter-msg{margin-top:11px;background:#fff;border:1px dashed var(--g);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--gd);font-weight:600;}
.surprise-box{background:linear-gradient(135deg,var(--gd),var(--g));border-radius:14px;padding:22px;text-align:center;}
.surprise-gifts{display:flex;justify-content:center;gap:20px;margin-bottom:11px;}
.sgift{font-size:32px;display:inline-block;animation:sgiftbob 1.9s ease-in-out infinite;filter:grayscale(.6) opacity(.6);}
.sgift:nth-child(2){animation-delay:.32s;}
.sgift:nth-child(3){animation-delay:.64s;}
.sgift-open{filter:none;animation:sgiftpop 1.4s ease-in-out infinite;}
.surprise-text{font-size:14px;font-weight:700;letter-spacing:.02em;color:#fff;background:linear-gradient(90deg,rgba(255,255,255,.55),#fff,var(--gold),#fff,rgba(255,255,255,.55));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3.4s linear infinite;}
@keyframes sgiftbob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes sgiftpop{0%,100%{transform:scale(1) rotate(-5deg);}50%{transform:scale(1.16) rotate(5deg);}}
@keyframes shimmer{to{background-position:-200% center;}}
/* === KALENDER === */
.kal-toolbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:14px;}
.kal-wknav{display:flex;align-items:center;gap:7px;}
.kal-wklabel{font-size:13px;font-weight:700;color:var(--tx);min-width:160px;text-align:center;}
.kal-grid{width:100%;border-collapse:separate;border-spacing:5px;min-width:680px;}
.kal-grid th{font-size:12px;font-weight:700;color:var(--tx);padding:6px 4px 9px;text-align:center;}
.kal-dn{display:block;}
.kal-dd{display:block;font-size:11px;font-weight:500;color:var(--mu);margin-top:1px;}
.kal-time{font-size:10.5px;font-weight:600;color:var(--mu);white-space:nowrap;text-align:right;padding-right:8px;width:78px;}
.kcell{background:var(--bg2);border-radius:9px;height:60px;cursor:pointer;padding:7px 8px;border:1.5px solid transparent;vertical-align:top;transition:.13s;}
.kcell:hover{border-color:var(--g);}
.kcell-empty{color:var(--mu);font-size:17px;text-align:center;font-weight:600;opacity:.35;}
.kcell-type{font-size:12px;font-weight:700;line-height:1.25;}
.kcell-seller{font-size:10.5px;color:var(--mu);margin-top:3px;}
.kcell.t-feedback{background:#E8F0FE;border-color:#BBD3F7;}
.kcell.t-feedback .kcell-type{color:#2563EB;}
.kcell.t-saljpass{background:#EAF4EE;border-color:#A8D8B9;}
.kcell.t-saljpass .kcell-type{color:var(--gd);}
.kcell.t-livelyssning{background:#F1ECFB;border-color:#D3C2EF;}
.kcell.t-livelyssning .kcell-type{color:#7C3AED;}
.kcell.t-planering{background:#FCF1E2;border-color:#EFD3A4;}
.kcell.t-planering .kcell-type{color:#C2781A;}
.kal-break{background:repeating-linear-gradient(45deg,var(--bg2),var(--bg2) 8px,#fff 8px,#fff 16px);border-radius:8px;text-align:center;font-size:11px;font-weight:600;color:var(--mu);}

  {category:'Tilläggstjänst',html:`<h1 class="slide-h1">Skydda Min Adress – ta bort dig från sökmotorerna</h1><p class="slide-lead">SmartIDs egen tilläggstjänst som tar bort dina uppgifter från <strong>Hitta.se, Eniro, MrKoll, Ratsit, Merinfo</strong> och <strong>Google</strong>.</p><div class="pkg-grid"><div class="pkg-card"><div class="pkg-tier">Singel</div><div class="pkg-price">49 kr<small>/mån</small></div><div class="pkg-desc">1 person</div></div><div class="pkg-card"><div class="pkg-tier">Par</div><div class="pkg-price">79 kr<small>/mån</small></div><div class="pkg-desc">2 personer</div></div><div class="pkg-card"><div class="pkg-tier">Familj</div><div class="pkg-price">99 kr<small>/mån</small></div><div class="pkg-desc">Upp till 5</div></div></div><h3 class="slide-h3">Vad gör vi konkret?</h3><div class="feature-grid"><div class="feat-item"><h4>🔍 Identifierar exponering</h4><p>Skannar var dina uppgifter (namn, adress, personnr, telefon) ligger publikt.</p></div><div class="feat-item"><h4>📨 Skickar raderingsbegäran</h4><p>Begär borttagning via GDPR + sajternas frivilliga raderingsformulär.</p></div><div class="feat-item"><h4>🔄 Bevakar löpande</h4><p>Folkbokföringen återpublicerar var 6–12:e månad. Vi gör om processen.</p></div><div class="feat-item"><h4>📋 Rapport till dig</h4><p>Du får regelbunden statusrapport på vilka sajter som rensats.</p></div></div><div style="background:var(--bg2);border-left:4px solid var(--gold);padding:.8rem 1.2rem;border-radius:6px;margin-top:1rem;font-size:13px;line-height:1.6;">💡 <strong>Säljpoäng:</strong> Sajterna har utgivningsbevis (yttrandefrihetsgrundlagen) och behöver normalt inte radera. Det här är ett tidskrävande, repeterande jobb som ingen kund orkar med själv – därför är det värt 49 kr/mån. <strong>Tryggsam, Förebygg och Rikskydd har INTE denna tjänst.</strong></div><p style="font-style:italic;color:var(--mu);font-size:12px;text-align:center;margin-top:.8rem;">Särskilt värdefullt för: poliser, journalister, lärare, soc   {category:'Konkurrenter översikt',html:`<h1 class="slide-h1">Marknaden för ID-skydd i Sverige</h1><p class="slide-lead">SmartID är inte ensamma – men vi är ensamma om <strong>en sak som verkligen betyder något</strong>. Se sista kolumnen.</p><table class="compare-tbl"><thead><tr><th>Aktör</th><th>Pris singel</th><th>Skydda Min Adress</th><th>Näthat</th><th style="background:rgba(200,168,75,0.18);">💰 Ekonomisk ersättning</th></tr></thead><tbody><tr style="background:rgba(200,168,75,0.18);"><td><strong>SmartID Premium</strong></td><td><strong>189 kr</strong></td><td><span class="check-yes">✓</span></td><td><span class="check-yes">✓</span></td><td style="background:rgba(74,175,150,0.2);"><strong style="color:var(--g);">135 000 kr/år ✓</strong></td></tr><tr><td>Rikskydd</td><td>189 kr</td><td><span class="check-no">–</span></td><td><span class="check-no">–</span></td><td style="background:var(--errl);"><strong style="color:var(--err);">0 kr</strong></td></tr><tr><td>Förebygg ID-Skydd</td><td>159 kr</td><td><span class="check-no">–</span></td><td><span class="check-no">–</span></td><td style="background:var(--errl);"><strong style="color:var(--err);">0 kr</strong></td></tr><tr><td>Tryggsam Premium</td><td>129 kr</td><td><span class="check-no">–</span></td><td><span class="check-no">–</span></td><td style="background:var(--errl);"><strong style="color:var(--err);">0 kr</strong></td></tr></tbody></table><div style="background:var(--errl);border-left:4px solid var(--err);padding:1rem 1.2rem;border-radius:8px;margin-top:1.2rem;"><strong style="color:var(--err);font-size:14px;">⚠️ VIKTIGT ATT FÖRSTÅ:</strong><p style="font-size:13px;line-height:1.7;margin-top:.4rem;">Tryggsam, Förebygg och Rikskydd är <strong>vanliga ID-skydd</strong>. De larmar när något händer och ger juridisk hjälp/assistans. <strong>Men ingen av dem ger kunden tillbaka pengarna</strong> som bedragaren stulit.</p><p style="font-size:13px;line-height:1.7;margin-top:.5rem;"><strong>Hos SmartID ingår en rik   {category:'Steg 1 – Inledning',html:`<h1 class="slide-h1">Steg 1: Inledningen</h1><p class="slide-lead" style="color:var(--gold);font-weight:600;">De första 10 sekunderna avgör allt</p><h3 class="slide-h3">Tre regler att följa:</h3><ul><li><strong>Bekräfta att du nått rätt person</strong> – "Har jag kommit rätt?"</li><li><strong>Energi & leende i rösten</strong> – stå upp om du kan, lagom tempo</li><li><strong>Hook</strong> – väck nyfikenhet om bedrägeriproblemet i Sverige</li></ul><div style="background:var(--bg2);border-left:4px solid var(--g);border-radius:8px;padding:1.1rem 1.3rem;margin-top:1.2rem;"><div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">📞 Manus – inledning (SmartIDs officiella manus)</div><p style="font-size:14px;line-height:1.7;font-style:italic;">"Hej [kundens namn]! Det är [ditt namn] från Smart ID. Har jag kommit rätt?"</p><p style="font-size:14px;line-height:1.7;font-style:italic;margin-top:.6rem;">[Kund svarar] "Perfekt! Jag ringer för att prata om något som blivit ett riktigt stort problem i Sverige på senaste tiden. Har du hört om alla bedrägerier och ID-kapningar som sker just nu?"</p></div><div style="background:var(--errl);border-left:3px solid var(--err);padding:.7rem 1rem;border-radius:6px;margin-top:1rem;font-size:12px;line-height:1.5;">⚠️ <strong>Aldrig:</strong> "Stör jag?", "Jag tar bara 2 sekunder", påståenden om kapad identitet utan grund.</div>`},

  {category:'Steg 2 – Behovsanalys',html:`<h1 class="slide-h1">Steg 2: Bygg problemet</h1><p class="slide-lead" style="color:var(--gold);font-weight:600;">Få kunden att förstå hotet – innan du presenterar lösningen</p><h3 class="slide-h3">Anpassa efter kundens svar – tre vägar:</h3><div class="objection-card"><div class="obj" style="background:#FFF7E6;border-left-color:var(--gold);"><div class="obj-l" style="color:var(--gold);">Om kunden INTE har hört om problemet</div><p style="font-style:italic;">"Nej, det är faktiskt något som många missar. Men det är så pass vanligt nu att nästan <strong>300 000 svenskar drabbades av bedrägerier förra året</strong>. Och det handlar inte bara om nätbedrägerier, utan om folk som får sina personuppgifter stulna och utnyttjade på olika sätt."</p></div></div><div class="objection-card"><div class="obj" style="background:#FFF7E6;border-left-color:var(--gold);"><div class="obj-l" style="color:var(--gold);">Om kunden HAR hört om problemet</div><p style="font-style:italic;">"Ja, det är skrämmande. Och det här är verkligen något som påverkar oss alla. Det kan handla om att någon tar lån i ditt namn, eller handlar varor på kredit som du inte har beställt. <strong>Visste du att dina privata uppgifter är offentligt sökbara på nätet?</strong>"</p></div></div><div class="objection-card"><div class="obj" style="background:#FFF7E6;border-left-color:var(--gold);"><div class="obj-l" style="color:var(--gold);">Om kunden känner någon drabbad</div><p style="font-style:italic;">"Det är verkligen hemskt när det händer, och det kan vara svårt att få hjälp när det väl har hänt. <strong>Har du eller någon du känner haft något skydd mot det här?</strong>"</p></div></div><div style="background:var(--bg2);border-left:4px solid var(--g);padding:.8rem 1.2rem;border-radius:6px;margin-top:1rem;font-size:13px;line-height:1.6;"><strong>💡 Tips:</strong> Lyssna aktivt. Upprepa kundens svar med egna ord. Max 2–3 frågor – det är ett samtal, inte en intervju.</div>`},

  {category:'Steg 3 – Presentation',html:`<h1 class="slide-h1">Steg 3: Presentera lösningen</h1><p class="slide-lead" style="color:var(--gold);font-weight:600;">Det här är hjärtat av samtalet – håll det enkelt och tydligt</p><div style="background:var(--bg2);border-left:4px solid var(--g);border-radius:8px;padding:1.1rem 1.3rem;margin-bottom:1rem;"><div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">📞 Manus – presentation av lösning</div><p style="font-size:14px;line-height:1.7;font-style:italic;">"Så här kommer vi in. På Smart ID har vi i samarbete med <strong>Trygghansa</strong> utvecklat en heltäckande bedrägeriförsäkring som inte bara skyddar dig mot ID-kapning, utan också ger dig <strong>ekonomisk ersättning på upp till 135 000 kronor</strong> om du drabbas. Du får också <strong>rättsligt stöd på upp till 1,3 miljoner kronor per år</strong>. Det innebär att om du blir utsatt för ett bedrägeri, hjälper våra jurister dig att bestrida krav och återställa din kreditvärdighet. Det är en riktig livräddare i dessa tider."</p></div><div style="background:#FFF7E6;border-left:4px solid var(--gold);border-radius:8px;padding:1.1rem 1.3rem;"><div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">🎁 Manus – kampanj</div><p style="font-size:14px;line-height:1.7;font-style:italic;">"Just nu har vi dessutom en kampanj där du får <strong>första månaden gratis</strong> för att testa och känna dig trygg med försäkringen. Dessutom får du en <strong>prisgaranti</strong>, vilket betyder att vi aldrig höjer ditt pris så länge du är kund. Det här är ett erbjudande vi har just nu, och du får alla inloggningsuppgifter direkt efter samtalet. <strong>Låter det som något som kan vara intressant?</strong>"</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1rem;"><div class="feat-item" style="border-left-color:var(--g);"><h4 style="color:var(--g);">✔ Kom ihåg</h4><ul style="margin:.4rem 0 0 1rem;font-size:12px;line-height:1.6;"><li>135 000 kr ekonomisk ersättning</li><li>1,3 miljoner kr rättsligt stöd/år</li><li>Första månaden gratis</li><li>Prisgaranti – ingen höjning</li></ul></div><div class="feat-item" style="border-left-color:var(--err);"><h4 style="color:var(--err);">✘ Undvik</h4><ul style="margin:.4rem 0 0 1rem;font-size:12px;line-height:1.6;"><li>Rabbla alla funktioner</li><li>Branschjargong</li><li>Skrämselteknik utan grund</li><li>Falska SMS som "bevis"</li></ul></div></div>`},

  {category:'Steg 4 – Avslut',html:`<h1 class="slide-h1">Steg 4: Avslut & bekräftelse</h1><p class="slide-lead" style="color:var(--gold);font-weight:600;">Tre delar: hushållsfråga → pris → bekräftelse</p><div style="background:var(--bg2);border-left:4px solid var(--g);border-radius:8px;padding:1.1rem 1.3rem;margin-bottom:1rem;"><div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">📞 Manus – fråga om hushållet</div><p style="font-size:14px;line-height:1.7;font-style:italic;">"Är du ensam i hushållet eller bor ni flera? Beroende på hur många ni är, justerar vi priset så att det passar för alla som behöver skydd."</p></div><div style="background:var(--bg2);border-left:4px solid var(--g);border-radius:8px;padding:1.1rem 1.3rem;margin-bottom:1rem;"><div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">📞 Manus – avslut & pris</div><p style="font-size:14px;line-height:1.7;font-style:italic;">"Så, efter din <strong>gratis månad</strong>, kostar det <strong>189 kronor i månaden för hela hushållet</strong>, och du får direkt tillgång till alla funktioner via din e-post. Du kan då skydda dina uppgifter som telefonnummer, e-post och pass. <strong>Vad hade du för e-postadress?</strong>"</p></div><div style="background:#FFF7E6;border-left:4px solid var(--gold);border-radius:8px;padding:1.1rem 1.3rem;"><div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">📞 Manus – aktivering & sammanfattning</div><p style="font-size:14px;line-height:1.7;font-style:italic;">"Perfekt, då skickar vi iväg allt till dig! Försäkringen börjar gälla redan idag, och du kommer få ett välkomstmail där du kan komma igång. Så nu vill jag bara <strong>sammanfatta vad vi har gått igenom</strong>, och sedan får du en <strong>länk via SMS för att aktivera försäkringen</strong>. Om något känns oklart eller om du tycker att jag pratar för snabbt eller långsamt, säg bara till!"</p><p style="font-size:14px;line-height:1.7;font-style:italic;margin-top:.6rem;">"Jag vill bara att du ska känna dig helt trygg med ditt val. Om du har några frågor längre fram är det bara att höra av dig. Och kom ihåg, <strong>inget är bindande om du inte känner dig säker</strong>. Låter det bra för dig?"</p></div>`},

  {category:'Invändningar',html:`<h1 class="slide-h1">Hantera de vanligaste invändningarna</h1><p class="slide-lead">Med säkra delaccepter och brandvarnarliknelsen som genomgående tråd.</p>

  <div style="background:linear-gradient(135deg,#FFF7E6,#FFEFD0);border-left:4px solid var(--gold);border-radius:10px;padding:1.1rem 1.3rem;margin:1rem 0 1.4rem;">
    <div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">🔥 Liknelsen som binder ihop allt</div>
    <p style="font-size:13.5px;line-height:1.7;font-style:italic;margin:0;"><strong>"Vanligt ID-skydd är som en brandvarnare</strong> – den piper när det börjar brinna, men släcker inte branden och bygger inte upp ditt hus igen. <strong>Hemförsäkringen är som brandkåren</strong> – hjälper med själva släckningen, men bara med en bråkdel av kostnaden. <strong>Vi är hela paketet:</strong> brandvarnare, brandkår och försäkring som faktiskt ersätter det du förlorat – <strong>135 000 kr rakt på kontot</strong> + <strong>1,3 miljoner i juridik</strong>."</p>
  </div>

  <div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Jag har redan ett skydd"</p></div><div class="ans"><div class="ans-l">Bra svar (med delaccept + liknelse)</div><p>"Det är jättebra att du tagit steget och skaffat ett skydd! Men de flesta tjänster idag är som <strong>brandvarnare</strong> – de varnar dig, men ger ingen ekonomisk ersättning om bedragaren hinner före. <strong>Och vi är ju båda överens om att en brandvarnare inte räcker om huset står i lågor, eller hur?</strong> Det är där vi är annorlunda. Vi har en <strong>riktig försäkring via Trygg-Hansa</strong> – <strong>135 000 kr rakt på ditt konto</strong> + <strong>1,3 miljoner i juridiskt stöd per år</strong>. Det är skillnaden mellan att få en varning – och att faktiskt få pengarna tillbaka."</p></div></div>

  <div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Jag har redan ID-skydd via min hemförsäkring"</p></div><div class="ans"><div class="ans-l">Bra svar (med delaccept + liknelse)</div><p>"Det förstår jag – många tror det. <strong>Och det är ju logiskt att tänka så, hemförsäkringen ska ju täcka det mesta.</strong> Men hemförsäkringen är som <strong>brandkåren</strong> – de hjälper till med själva släckningen, alltså juridiken. Trygg-Hansas hemförsäkring max <strong>50 000 kr för hela hushållet per år</strong>, Folksam upp till 100 000 i juridik. <strong>Inga pengar in på kontot.</strong> Vi gör BÅDE brandkåren OCH försäkringen som bygger upp ditt hus igen: <strong>135 000 kr rakt in på bankkontot</strong> via Trygg-Hansa, plus <strong>1,3 miljoner i rättsligt stöd per år</strong>."</p></div></div>

  <div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Det är för dyrt"</p></div><div class="ans"><div class="ans-l">Bra svar (med delaccept + verkligt fall)</div><p>"Jag förstår – pris är viktigt. <strong>Och vi vill ju alla få ut maximalt av varje krona vi spenderar.</strong> 189 kr i månaden för hela hushållet blir <strong>6 kr om dagen</strong>. Just nu får du dessutom <strong>första månaden gratis</strong> + <strong>prisgaranti</strong> så vi aldrig höjer priset så länge du är kund. Catherine Bråkenhielm förlorade <strong>600 000 kr</strong> på en AI-bluff förra året – för 6 kr om dagen hade hon haft 135 000 kr tillbaka och full juridisk hjälp."</p></div></div>

  <div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Jag är försiktig – händer inte mig"</p></div><div class="ans"><div class="ans-l">Bra svar (med delaccept + AI-vinkel)</div><p>"Det är jättebra att du är försiktig – det är 95 % av jobbet. <strong>Och du har helt rätt i att vara medveten – det är bara klokt.</strong> Förra året drabbades <strong>nästan 300 000 svenskar</strong> – och de flesta var också försiktiga. Bedragare har idag <strong>AI-verktyg</strong> som imiterar röster av människor du litar på, falska BankID-popups som ser identiska ut. Det handlar inte längre om kunskap – det handlar om att ha <strong>en back-up när det otänkbara händer</strong>. Det är därför vi finns."</p></div></div>

  <div style="background:var(--bg2);border-left:4px solid var(--g);border-radius:8px;padding:1rem 1.2rem;margin-top:1.2rem;font-size:13px;line-height:1.65;">
    <strong style="color:var(--g);">💡 Säljteknik – Säkra delaccepter</strong><br>
    En säker delaccept är ett <strong>konstaterande av en självklarhet</strong> – inte en fråga om SmartIDs erbjudande. Använd dessa universellt:<br>
    <span style="display:inline-block;margin-top:6px;">✅ <em>"Vi är ju båda överens om att..."</em></span><br>
    <span style="display:inline-block;">✅ <em>"Du har helt rätt i att..."</em></span><br>
    <span style="display:inline-block;">✅ <em>"Det är ju logiskt att tänka så..."</em></span><br>
    <span style="display:inline-block;color:var(--err);margin-top:6px;">❌ Aldrig "skulle du inte känna dig tryggare?" – kunden kan svara "nej" och avsluta.</span>
  </div>`},

  {category:'Mer invändningar',html:`<h1 class="slide-h1">Fler invändningar att kunna</h1><div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Jag måste tänka på det"</p></div><div class="ans"><div class="ans-l">Bra svar</div><p>"Absolut, det förstår jag. Inget är bindande förrän du själv aktiverar via SMS-länken. Det viktiga är att du känner dig trygg med ditt val. Vad är det som gör dig osäker just nu – är det priset, eller något annat jag kan förklara bättre?"</p></div></div><div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Hur vet jag att ni inte är ett av lurendrejer-företagen?"</p></div><div class="ans"><div class="ans-l">Bra svar</div><p>"En berättigad fråga – Svensk Handel har varnat för seriösa imitatörer. Vi är registrerade hos Finansinspektionen, försäkringsgivaren är Trygg-Hansa (grundat 1828), och du kan kolla Reco/Trustpilot. Vi använder ALDRIG falska SMS eller skrämselteknik."</p></div></div><div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Banken ersätter mig om något händer"</p></div><div class="ans"><div class="ans-l">Bra svar</div><p>"Tyvärr får man inte hjälp av varken bank eller hemförsäkring om man drabbas. Bankerna prövar varje fall enskilt och Swish är dessutom helt undantaget. Med vår <strong>Trygghansa-försäkring</strong> har du <strong>135 000 kr i ekonomisk garanti</strong> oavsett bankens beslut. Plus <strong>1,3 miljoner kr/år i rättsligt stöd</strong> om du behöver överklaga."</p></div></div><div class="objection-card"><div class="obj"><div class="obj-l">Invändning</div><p>"Jag har inte tid"</p></div><div class="ans"><div class="ans-l">Bra svar</div><p>"Förstår. Just därför har vi 24/7-assistans – när något händer ringer DU oss, och VI tar resten: spärrar konton, ringer banken, polisanmäler. Du behöver inte göra något själv."</p></div></div>`},

  {category:'Steg 5 – Eftersälj',html:`<h1 class="slide-h1">Steg 5: Eftersälj</h1><p class="slide-lead" style="color:var(--gold);font-weight:600;">En nöjd kund är din bästa säljare</p><h3 class="slide-h3">Fyra saker direkt efter ja:</h3><ul><li><strong>SMS-länk för aktivering OMEDELBART</strong> – kunden får aktiveringslänk via SMS direkt efter samtalet.</li><li><strong>Bekräfta tryggheten</strong> – "Inget är bindande om du inte känner dig säker."</li><li><strong>Merförsäljning</strong> – "Vi har också Skydda Min Adress för 49 kr/mån som tar bort dig från Hitta.se, Eniro, MrKoll. Vill du lägga till?"</li><li><strong>Be om referens</strong> – "Känner du någon som också borde skydda sig? Vi ger en månads rabatt per tipsad."</li></ul><div style="background:var(--bg2);border-left:4px solid var(--gold);border-radius:8px;padding:1rem 1.2rem;margin-top:1rem;font-style:italic;font-size:13px;line-height:1.7;">"Jag vill bara att du ska känna dig helt trygg med ditt val. Om du har några frågor längre fram är det bara att höra av dig. Och kom ihåg, inget är bindande om du inte känner dig säker."</div><h3 class="slide-h3">Förhindra avhopp (churn)</h3><div style="background:var(--bg2);border-left:4px solid var(--g);border-radius:8px;padding:1rem 1.2rem;margin-top:.5rem;font-size:14px;line-height:1.7;">Om kunden vill avsluta:<br><strong>1.</strong> Lyssna först. Förstå varför.<br><strong>2.</strong> Påminn om värdet: 135 000 kr försäkring, 1,3 miljoner kr rättsligt stöd, prisgaranti.<br><strong>3.</strong> Citat: <em>"Jag förstår. Innan du avslutar – vet du att du fortfarande har 135 000 kr i ekonomisk ersättning och 1,3 miljoner i rättsligt stöd? Vad är det egentligen som inte funkar för dig?"</em></div>`},

  {category:'Målgrupper',html:`<h1 class="slide-h1">Säljvinklar per målgrupp</h1><div class="feature-grid"><div class="feat-item"><h4>👴 Pensionärer 60+</h4><p><strong>Smärta:</strong> BankID-bedrägeri, telefonbedrägeri.<br><strong>Story:</strong> Evy Lundvall (500k), Eskilstuna-ligan (12 mkr).<br><strong>Vinkel:</strong> "Du behöver inte vara teknisk – vi gör jobbet."<br><strong>Paket:</strong> Premium Singel/Par.</p></div><div class="feat-item"><h4>👨‍👩‍👧‍👦 Familjer</h4><p><strong>Smärta:</strong> Tonåringar på sociala medier, näthat, e-handel.<br><strong>Story:</strong> 58 % av 18–24-åringar utsatta för shoppingbedrägerier.<br><strong>Vinkel:</strong> Tonåringars ID-kapning upptäcks först vid första lånet.<br><strong>Paket:</strong> Premium Familj 279 + Skydda Min Adress Familj 99.</p></div><div class="feat-item"><h4>💼 Singlar 25–40</h4><p><strong>Smärta:</strong> Dejtingappar, investeringsbedrägeri.<br><strong>Story:</strong> Catherine Bråkenhielm (600k), Mick Jagger Solna (18 mkr).<br><strong>Vinkel:</strong> AI-deepfakes är 2025-vardag.<br><strong>Paket:</strong> Premium Singel + Skydda Min Adress.</p></div><div class="feat-item"><h4>🏢 Småföretagare</h4><p><strong>Smärta:</strong> VD/BEC-bedrägeri (214 mkr 2025), tidsbrist.<br><strong>Story:</strong> 51 % av svenska småföretag utsatta för ID-kapningsförsök.<br><strong>Vinkel:</strong> Du har inte tid att jaga MrKoll, Ratsit varje månad.<br><strong>Paket:</strong> Premium + Skydda Min Adress.</p></div></div>`},

  {category:'Cheat Sheet',html:`<h1 class="slide-h1">Cheat Sheet – på en blick</h1><div class="process-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));"><div class="proc-step"><div class="num">1</div><h4>INLEDNING</h4><p style="font-size:11px;line-height:1.5;">"Har jag kommit rätt?"<br>Hook om bedrägerier<br>Energi & värme</p></div><div class="proc-step"><div class="num">2</div><h4>BEHOVSANALYS</h4><p style="font-size:11px;line-height:1.5;">Anpassa efter svar<br>Lyssna aktivt<br>Hitta smärtan</p></div><div class="proc-step"><div class="num">3</div><h4>PRESENTATION</h4><p style="font-size:11px;line-height:1.5;">135 000 kr ersättning<br>1,3 mkr rättsligt stöd<br>Första månaden gratis</p></div><div class="proc-step"><div class="num">4</div><h4>AVSLUT</h4><p style="font-size:11px;line-height:1.5;">Hushållsfråga<br>189 kr/mån<br>Be om e-post</p></div><div class="proc-step"><div class="num">5</div><h4>EFTERSÄLJ</h4><p style="font-size:11px;line-height:1.5;">SMS-aktivering<br>Adress-skydd mer-sälj<br>Tipsa-en-vän</p></div></div><h3 class="slide-h3">Topp-9 Statistik att kunna utantill:</h3><ol style="font-size:13px;line-height:1.7;margin-left:1.4rem;"><li><strong>300 000</strong> svenskar drabbade förra året</li><li><strong>232 862</strong> anmälda bedrägerier 2025 (Brå)</li><li><strong>5,7 mdr</strong> brottsvinster (Polisen)</li><li><strong>1,5 mdr</strong> AI-investeringsbedrägerier (FI)</li><li><strong>500 000 kr</strong> Evy Lundvalls förlust</li><li><strong>600 000 kr</strong> Catherine Bråkenhielms förlust</li><li><strong>135 000 kr</strong> ekonomisk ersättning</li><li><strong>1,3 miljoner kr</strong> rättsligt stöd/år</li><li><strong>189 kr/mån</strong> hela hushållet</li></ol>`},

  {category:'Klart',html:`<h1 class="slide-h1">Du är redo!</h1><p class="slide-lead">Du har gått igenom säljprocessens fem steg, hela säljmanuset, hur du anpassar samtalet efter kundens svar, hur du presenterar lösningen och kampanjen, samt de vanligaste invändningarna och hur du hanterar dem.</p><div style="background:linear-gradient(135deg,var(--gold),#E8C76A);color:#fff;border-radius:12px;padding:1.4rem;margin:1.2rem 0;text-align:center;font-size:18px;font-weight:700;font-style:italic;">"Sälj inte – hjälp. Den som hjälper mest, säljer mest."</div><div style="background:var(--bg2);border-left:4px solid var(--gold);border-radius:8px;padding:1.2rem 1.4rem;"><p style="font-size:15px;line-height:1.6;"><strong>Nu väntar provet!</strong> 15 frågor om allt detta. <strong>90 % rätt krävs</strong> (minst 14 av 15) för diplom.</p></div>`},
];

// === SALES QUIZ (15 frågor med svenska källor och paragrafer) ===
const SALJ_QUIZ=[

/* ---- Hjälpfunktioner ---- */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtMin(min){min=Math.max(0,Math.round(min||0));const h=Math.floor(min/60),m=min%60;return h+'h '+m+'m';}
function fmtSec(s){s=Math.max(0,Math.round(n(s)));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function show(id,disp){document.getElementById(id).style.display=disp||'';}
function hide(id){document.getElementById(id).style.display='none';}
function sum(arr,k){return arr.reduce((a,d)=>a+(Number(d[k])||0),0);}
function n(v){return Number(v)||0;}
function emptyDay(date){return{date:date,samtal:0,nej:0,callbacks:0,aktiv_min:0,
  sold_s189:0,sold_s229:0,sold_s279:0,sold_a49:0,sold_a79:0,sold_a99:0,
  ang_s189:0,ang_s229:0,ang_s279:0,ang_a49:0,ang_a79:0,ang_a99:0};}
function dayTotalSalj(d){return n(d.sold_s189)+n(d.sold_s229)+n(d.sold_s279);}
function dayTotalAddon(d){return n(d.sold_a49)+n(d.sold_a79)+n(d.sold_a99);}
function dayTotalAng(d){return n(d.ang_s189)+n(d.ang_s229)+n(d.ang_s279)+n(d.ang_a49)+n(d.ang_a79)+n(d.ang_a99);}
function dayProvision(d){const r=ROLES[S.role==='coach'?'coach':'saljare'];
  return (n(d.sold_s189)-n(d.ang_s189))*r.s189+(n(d.sold_s229)-n(d.ang_s229))*r.s229+(n(d.sold_s279)-n(d.ang_s279))*r.s279
        +(n(d.sold_a49)-n(d.ang_a49))*r.a49+(n(d.sold_a79)-n(d.ang_a79))*r.a79+(n(d.sold_a99)-n(d.ang_a99))*r.a99;}
function dayOrderbelopp(d){return (n(d.sold_s189)-n(d.ang_s189))*PRICES.s189+(n(d.sold_s229)-n(d.ang_s229))*PRICES.s229+(n(d.sold_s279)-n(d.ang_s279))*PRICES.s279
        +(n(d.sold_a49)-n(d.ang_a49))*PRICES.a49+(n(d.sold_a79)-n(d.ang_a79))*PRICES.a79+(n(d.sold_a99)-n(d.ang_a99))*PRICES.a99;}
function fmtDate(s){
  if(!s)return '';
  const d=new Date(s+'T00:00:00');
  if(isNaN(d.getTime()))return s;
  const man=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const dag=['sön','mån','tis','ons','tor','fre','lör'];
  return dag[d.getDay()]+' '+d.getDate()+' '+man[d.getMonth()];
}
/* "2026-05" eller "2026-05-01" → "Maj 2026" */
function fmtMonth(s){
  if(!s)return '';
  const m=String(s).slice(0,7).split('-');
  const MAN=['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
  const idx=parseInt(m[1],10)-1;
  return (MAN[idx]||m[1])+' '+m[0];
}
/* "HH:MM:SS" / "MM:SS" → minuter resp. sekunder */
function hmsToMin(v){
  if(v==null||v==='')return 0;
  const p=String(v).split(':').map(x=>parseFloat(String(x).replace(',','.'))||0);
  if(p.length===3)return Math.round(p[0]*60+p[1]+p[2]/60);
  if(p.length===2)return Math.round(p[0]+p[1]/60);
  return Math.round(p[0]);
}
function hmsToSec(v){
  if(v==null||v==='')return 0;
  const p=String(v).split(':').map(x=>parseFloat(String(x).replace(',','.'))||0);
  if(p.length===3)return Math.round(p[0]*3600+p[1]*60+p[2]);
  if(p.length===2)return Math.round(p[0]*60+p[1]);
  return Math.round(p[0]);
}

async function doLogin(){

async function doForgotPassword(){

    if(error){

      btn.disabled=false;btn.textContent='Skicka återställningslänk';return;

    btn.disabled=false;btn.textContent='Skicka återställningslänk';

/* ============================================================
   BOOTSTRAP — hämtar användare, profil, säljare och dashboard-data
   ============================================================ */
async function bootstrap(){
  if(S.recovery){showOnly('reset-screen');return;}
  showOnly('loader');
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){showOnly('login-screen');return;}
    S.user=session.user;

    /* Profil → roll */
    const {data:prof}=await sb.from('profiles').select('*').eq('id',S.user.id).maybeSingle();
    S.profile=prof||null;
    S.role=(prof&&prof.role==='coach')?'coach':'saljare';

    /* Säljarrad – via profiles.seller_id, annars via sellers.user_id */
    let seller=null;
    if(prof&&prof.seller_id){
      const {data}=await sb.from('sellers').select('*').eq('id',prof.seller_id).maybeSingle();
      seller=data||null;
    }
    if(!seller){
      const {data}=await sb.from('sellers').select('*').eq('user_id',S.user.id).maybeSingle();
      seller=data||null;
    }
    S.seller=seller;

    await loadDashboardData();
    showOnly('app');
    paintSidebar();
    render();
  }catch(e){
    S.loadError=e.message||String(e);
    showOnly('app');
    paintSidebar();
    render();
  }
}

async function loadDashboardData(){
  S.loadError=null;
  /* Egen dagsstatistik */
  if(S.seller){
    const {data,error}=await sb.from('seller_daily_stats')
      .select('*').eq('seller_id',S.seller.id).order('date',{ascending:true});
    if(error)S.loadError=error.message;
    S.dailyStats=data||[];
  }else{
    S.dailyStats=[];
  }
  /* Månads-dialerstatistik (aktiv tid + snittsamtalstid) */
  if(S.seller){
    try{const r=await sb.from('salj_monthly_dialer').select('*').eq('seller_id',S.seller.id);S.monthlyDialer=r.data||[];}
    catch(e){S.monthlyDialer=[];}
  }else{S.monthlyDialer=[];}
  /* Scoreboard (RPC – returnerar sälj/tillägg per säljare) */
  try{
    const {data,error}=await sb.rpc('salj_scoreboard');
    if(error)throw error;
    S.scoreboard=(data||[]).map(x=>({
      seller_id:x.seller_id,name:x.name,
      salj:Number(x.salj)||0,tillagg:Number(x.tillagg)||0
    }));
  }catch(e){
    S.scoreboard=[];
  }
  /* Raderade säljare ska inte synas i scoreboarden för någon */
  try{
    const r=await sb.from('sellers').select('id,deleted');
    const del=new Set((r.data||[]).filter(s=>s.deleted).map(s=>s.id));
    if(del.size)S.scoreboard=S.scoreboard.filter(x=>!del.has(x.seller_id));
  }catch(e){}
  /* Coach: hela lagets data för All statistik */
  if(S.role==='coach'){
    try{
      const sres=await sb.from('sellers').select('*').eq('active',true).order('name',{ascending:true});
      S.allSellers=(sres.data||[]).filter(s=>!s.deleted);
      const ares=await sb.from('seller_daily_stats').select('*').order('date',{ascending:true});
      S.allStats=ares.data||[];
      const mres=await sb.from('salj_monthly_dialer').select('*');
      S.allMonthlyDialer=mres.data||[];
    }catch(e){S.allSellers=[];S.allStats=[];S.allMonthlyDialer=[];}
  }
}

function showOnly(id){
  ['loader','login-screen','forgot-screen','reset-screen','app'].forEach(x=>{
    const el=document.getElementById(x);
    if(!el)return;
    if(x===id){el.style.display=(x==='app'||x==='loader')?'flex':'block';el.classList&&el.classList.add('show');}
    else{el.style.display='none';el.classList&&el.classList.remove('show');}
  });
}

function openCommandPalette(){
  const back=document.getElementById('v3-cp-back');if(!back)return;
  back.classList.add('show');
  const input=document.getElementById('cp-q');
  input.focus();input.select();
  const list=document.getElementById('cp-list');
  let activeIdx=0;

  const renderCp=async(q)=>{
    q=(q||'').toLowerCase().trim();
    const items=[];
    // Flikar
    const tabs=Object.entries(TAB_TITLES).filter(([k,v])=>{
      if(!q)return true;return v.toLowerCase().includes(q)||k.toLowerCase().includes(q);
    }).slice(0,8);
    if(tabs.length){
      items.push({section:'Flikar'});
      tabs.forEach(([k,v])=>items.push({type:'tab',key:k,label:v,sub:'Hoppa',icon:'📑'}));
    }
    // Säljare
    if(q){
      const sellers=(S.allSellers||[]).filter(s=>(s.name||'').toLowerCase().includes(q)).slice(0,5);
      if(sellers.length){
        items.push({section:'Säljare'});
        sellers.forEach(s=>items.push({type:'seller',key:s.id,label:s.name,sub:'Min statistik',icon:'👤'}));
      }
    }
    // Samtal-sök
    if(q&&q.length>=3&&(S.role==='coach'||S.role==='admin')){
      items.push({section:'Sökning i transkript'});
      items.push({type:'search-call',key:q,label:`Sök "${q}" i alla samtal`,sub:'Samtalsanalys',icon:'🎙'});
    }
    if(!items.length){
      list.innerHTML='<div class="empty" style="padding:1.5rem;"><p style="font-size:13px;">Inga matchningar</p></div>';
      return;
    }
    list.innerHTML=items.map((it,i)=>{
      if(it.section)return `<div class="cp-section">${esc(it.section)}</div>`;
      return `<div class="cp-item${i===activeIdx?' active':''}" data-i="${i}"><span class="cp-item-ic">${it.icon}</span><span>${esc(it.label)}</span><span class="cp-item-sub">${esc(it.sub)}</span></div>`;
    }).join('');
    list.querySelectorAll('.cp-item').forEach(el=>{
      el.onclick=()=>execCpItem(items[parseInt(el.dataset.i)]);
    });
  };

  input.oninput=(e)=>renderCp(e.target.value);
  input.onkeydown=(e)=>{
    const visible=list.querySelectorAll('.cp-item');
    if(e.key==='Escape'){back.classList.remove('show');}
    else if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,visible.length-1);visible.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));}
    else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);visible.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));}
    else if(e.key==='Enter'){
      const active=list.querySelector('.cp-item.active')||list.querySelector('.cp-item');
      if(active)active.click();
    }
  };
  back.onclick=(e)=>{if(e.target===back)back.classList.remove('show');};
  renderCp(input.value);
}

function execCpItem(it){
  const back=document.getElementById('v3-cp-back');back.classList.remove('show');
  if(it.type==='tab'){
    S.tab=it.key;
    document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
    document.querySelector(`.sbi[data-tab="${it.key}"]`)?.classList.add('active');
    render();
  }else if(it.type==='seller'){
    S.statsSeller=it.key;S.tab='minstats';
    document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
    document.querySelector('.sbi[data-tab="minstats"]')?.classList.add('active');
    render();
  }else if(it.type==='search-call'){
    if(!S.sa)S.sa={};S.sa.query=it.key;S.sa.openId=null;
    S.tab='samtalsanalys';
    document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
    document.querySelector('.sbi[data-tab="samtalsanalys"]')?.classList.add('active');
    render();
  }
}

function npGetRead(){try{return new Set(JSON.parse(localStorage.getItem('v3-np-read')||'[]'));}catch{return new Set();}}
function npMarkRead(ids){const r=npGetRead();ids.forEach(i=>r.add(i));try{localStorage.setItem('v3-np-read',JSON.stringify([...r]));}catch{}}
function npRelTime(t){if(!t)return '';const d=new Date(t),now=new Date(),diff=(now-d)/1000;
  if(diff<60)return 'just nu';if(diff<3600)return Math.floor(diff/60)+' min sen';if(diff<86400)return Math.floor(diff/3600)+' h sen';return Math.floor(diff/86400)+' dgr sen';}

async function buildNotifications(){
  const items=[];
  const today=new Date();today.setHours(0,0,0,0);
  const todayISO=today.toISOString();
  const isCoach=S.role==='coach'||S.role==='admin'||S.role==='kundtjanst';
  try{
    if(isCoach){
      const {data:newCalls}=await sb.from('call_recordings').select('id,cdr_id,recorded_at').gte('recorded_at',todayISO).eq('analyzed',true).order('recorded_at',{ascending:false}).limit(20);
      if(newCalls?.length)items.push({id:'analyzed-today',icon:'📊',txt:`<strong>${newCalls.length}</strong> nya AI-analyser idag`,time:npRelTime(newCalls[0].recorded_at),tab:'samtalsanalys'});
      const {data:hr}=await sb.from('call_analysis').select('recording_id,processed_at').eq('regret_risk','high').gte('processed_at',todayISO).order('processed_at',{ascending:false}).limit(20);
      if(hr?.length)items.push({id:'high-regret-today',icon:'⚠️',txt:`<strong>${hr.length}</strong> samtal med hög ångerrisk idag`,time:npRelTime(hr[0].processed_at),tab:'samtalsanalys'});
      const {data:fb}=await sb.from('call_feedback').select('id,target_type,rating,created_at').gte('created_at',todayISO).order('created_at',{ascending:false}).limit(5);
      if(fb?.length)items.push({id:'feedback-today',icon:'👍',txt:`<strong>${fb.length}</strong> nya feedback-markeringar gjorda idag`,time:npRelTime(fb[0].created_at)});
    }
    // Mål-milestones (alla)
    const sellerId=S.seller?.id;
    if(sellerId){
      const ym=new Date().toISOString().slice(0,7);
      const {data:goal}=await sb.from('salj_goals').select('*').eq('seller_id',sellerId).eq('ym',ym).maybeSingle();
      if(goal){
        const days=(S.dailyStats||[]).filter(d=>d.seller_id===sellerId&&String(d.date).slice(0,7)===ym);
        const tot=f=>days.reduce((a,d)=>a+(d[f]||0),0);
        const checks=[
          {label:'Singel',cur:tot('sold_s189'),mal:goal.mal_singel,id:'mal-singel'},
          {label:'Par',cur:tot('sold_s229'),mal:goal.mal_par,id:'mal-par'},
          {label:'Familj',cur:tot('sold_s279'),mal:goal.mal_familj,id:'mal-familj'},
        ];
        for(const c of checks){
          if(!c.mal)continue;
          const pct=Math.floor((c.cur/c.mal)*100);
          if(pct>=100)items.push({id:c.id+'-100',icon:'🏆',txt:`Du nådde <strong>${c.label}-målet</strong>! (${c.cur}/${c.mal})`,time:'idag',tab:'mal'});
          else if(pct>=75)items.push({id:c.id+'-75',icon:'🎯',txt:`Du är <strong>${pct}%</strong> av ${c.label}-målet (${c.cur}/${c.mal})`,time:'idag',tab:'mal'});
        }
      }
    }
  }catch(e){console.warn('notif build err',e);}
  return items;
}

async function loadNotifications(){
  const list=document.getElementById('np-list');if(!list)return;
  list.innerHTML='<div class="empty" style="padding:1.5rem;"><p style="font-size:12px;">Laddar…</p></div>';
  const items=await buildNotifications();
  // Markera alla som lästa när panelen öppnas
  const ids=items.map(i=>i.id);
  if(!items.length){list.innerHTML='<div class="empty" style="padding:1.5rem;"><p style="font-size:12.5px;">Inga nya notiser</p></div>';return;}
  list.innerHTML=items.map(it=>`<div class="np-item" data-tab="${esc(it.tab||'')}"><div><span style="margin-right:6px;">${it.icon}</span>${it.txt}</div><div class="np-item-time">${esc(it.time)}</div></div>`).join('');
  list.querySelectorAll('.np-item').forEach(el=>{el.onclick=()=>{const t=el.dataset.tab;if(t){S.tab=t;document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));document.querySelector(`.sbi[data-tab="${t}"]`)?.classList.add('active');render();}document.getElementById('v3-np').classList.remove('show');npMarkRead(ids);updateBellBadge();};});
  // Mark read efter 1.5s (så användaren hinner se badge minska)
  setTimeout(()=>{npMarkRead(ids);updateBellBadge();},1500);
}

async function updateBellBadge(){
  const bell=document.querySelector('#tb-bell');if(!bell)return;
  bell.querySelectorAll('.tb-bell-badge').forEach(b=>b.remove());
  const items=await buildNotifications();
  const read=npGetRead();
  const unread=items.filter(it=>!read.has(it.id));
  if(unread.length){
    const b=document.createElement('span');b.className='tb-bell-badge';
    b.textContent=unread.length;
    bell.appendChild(b);
  }
}

function scoreboardRows(){
  const board=S.scoreboard.map(x=>({...x,total:x.salj+x.tillagg})).sort((a,b)=>b.total-a.total);
