function renderSessionDetail(main,s){
  const isCoach=S.role==='coach';
  const ans=s.answers||{};
  const specific=Array.isArray(s.specific_qs)?s.specific_qs:[];
  function field(key,val,ph,readonly){
    return `<textarea data-ans="${key}" ${readonly?'readonly':''} placeholder="${ph||''}" style="width:100%;min-height:58px;padding:8px 10px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;font-family:inherit;color:var(--tx);background:${readonly?'var(--bg2)':'var(--bg)'};resize:vertical;box-sizing:border-box;">${esc(val||'')}</textarea>`;
  }
  function qcard(title,body){
    return `<div style="border:1px solid var(--br);border-radius:10px;padding:13px 15px;margin-bottom:10px;background:var(--w);">
      <div style="font-weight:700;font-size:13.5px;color:var(--gd);margin-bottom:8px;">${esc(title)}</div>${body}</div>`;
  }
  let html=`
    <div class="ph">
      <div><div class="ph-t">${esc(s.title)}</div><div class="ph-s">${esc(s._sellerName)} · ${s.created_at?new Date(s.created_at).toLocaleDateString('sv-SE'):''}${s.duration?' · '+esc(s.duration):''}</div></div>
      <button class="btn btn-s" id="cn-back">← Tillbaka</button>
    </div>
    <div class="ca">`;
  if(s._audioUrl){
    html+=`<div style="margin-bottom:1.1rem;"><div style="font-size:11.5px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">Samtalsinspelning</div>
      <audio controls controlsList="nodownload" oncontextmenu="return false;" style="width:100%;"><source src="${s._audioUrl}"></audio></div>`;
  }
  /* När säljaren markerat klar får coachen en sammanfattning av säljarens svar */
  if(isCoach&&s.status==='done'){
    let sum='';
    const sumRow=(q,a)=>`<div style="margin-bottom:10px;"><div style="font-weight:600;font-size:12.5px;color:var(--gd);">${esc(q)}</div><div style="font-size:13px;color:var(--tx);white-space:pre-wrap;">${esc(a)}</div></div>`;
    S.feedbackQuestions.forEach(q=>{
      if(q.question_type==='coach')return;
      const a=ans['s_'+q.id];
      if(a&&a.trim())sum+=sumRow(q.question,a);
    });
    specific.forEach((sq,i)=>{
      const a=ans['sp_'+i];
      if(a&&a.trim())sum+=sumRow((sq&&sq.q)||sq||('Fråga '+(i+1)),a);
    });
    if(s.seller_notes&&s.seller_notes.trim())sum+=sumRow('Säljarens anteckningar',s.seller_notes);
    if(!sum)sum='<div style="font-size:13px;color:var(--mu);">Säljaren markerade sessionen klar utan att skriva något.</div>';
    html+=`<div style="border:1px solid var(--g);border-radius:10px;padding:14px 16px;margin-bottom:1.1rem;background:#EAF4EE;">
      <div style="font-weight:700;font-size:13.5px;color:var(--gd);margin-bottom:10px;">✓ Säljarens sammanfattning</div>${sum}</div>`;
  }
  S.feedbackQuestions.forEach(q=>{
    if(q.question_type==='coach'){
      if(!isCoach)return;                                  /* säljaren ser inte coachfrågor */
      html+=qcard(q.question,field('c_'+q.id,ans['c_'+q.id],'Coachens svar…',false));
    }else if(q.question_type==='seller'){
      html+=qcard(q.question,field('s_'+q.id,ans['s_'+q.id],isCoach?'':'Ditt svar…',isCoach));
    }else{
      if(isCoach){
        const body=`<div style="font-size:11px;font-weight:700;color:var(--mu);margin-bottom:5px;">SÄLJARENS SVAR</div>${field('s_'+q.id,ans['s_'+q.id],'',true)}`
          +`<div style="font-size:11px;font-weight:700;color:var(--mu);margin:9px 0 5px;">COACHENS SVAR</div>${field('c_'+q.id,ans['c_'+q.id],'Coachens svar…',false)}`;
        html+=qcard(q.question,body);
      }else{                                               /* säljaren ser bara sitt eget svar */
        html+=qcard(q.question,field('s_'+q.id,ans['s_'+q.id],'Ditt svar…',false));
      }
    }
  });
  specific.forEach((sq,i)=>{
    html+=qcard((sq&&sq.q)||sq||('Fråga '+(i+1)),field('sp_'+i,ans['sp_'+i],isCoach?'':'Ditt svar…',isCoach));
  });
  html+=qcard('Säljarens anteckningar',field('__seller_notes',s.seller_notes,isCoach?'':'Egna tankar…',isCoach));
  if(isCoach)html+=qcard('Coachens anteckningar',field('__coach_notes',s.coach_notes,'Sammanfattning…',false)); /* säljaren ser inte coachens anteckningar */
  html+=`<div id="cn-msg" style="display:none;font-size:12.5px;font-weight:600;margin:.4rem 0;"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:.6rem;">
      <button class="btn btn-p" id="cn-save">Spara</button>`;
  if(s.status!=='done')html+='<button class="btn btn-s" id="cn-done">Markera som klar</button>';
  else html+='<button class="btn btn-s" id="cn-reopen">Återöppna</button>';
  if(!isCoach)html+='<button class="btn btn-s" id="cn-savefb" style="margin-left:auto;'+(s.saved_by_seller?'color:var(--gd);font-weight:700;':'')+'">'+(s.saved_by_seller?'★ Sparad':'💾 Spara feedback')+'</button>';
  if(isCoach)html+='<button class="btn btn-s" id="cn-del" style="margin-left:auto;color:var(--err);">Ta bort</button>';
  html+='</div></div>';
  main.innerHTML=html;
  main.querySelector('#cn-back').addEventListener('click',()=>{S.coachOpenSession=null;render();});
  main.querySelector('#cn-save').addEventListener('click',()=>saveSession(main,s,null));
  const d=main.querySelector('#cn-done');if(d)d.addEventListener('click',()=>saveSession(main,s,'done'));
  const r=main.querySelector('#cn-reopen');if(r)r.addEventListener('click',()=>saveSession(main,s,'open'));
  const x=main.querySelector('#cn-del');if(x)x.addEventListener('click',()=>deleteSession(s));
  const sv=main.querySelector('#cn-savefb');if(sv)sv.addEventListener('click',()=>toggleSaveFeedback(s));
}

async function saveSession(main,s,statusChange){
  const msg=main.querySelector('#cn-msg');
  function show(t,bad){msg.style.display='block';msg.style.color=bad?'var(--err)':'var(--g)';msg.textContent=t;}
  const isCoach=S.role==='coach';
  const newAns=Object.assign({},s.answers||{});
  let coachNotes=s.coach_notes,sellerNotes=s.seller_notes;
  main.querySelectorAll('[data-ans]').forEach(el=>{
    if(el.hasAttribute('readonly'))return;
    const k=el.dataset.ans;
    if(k==='__coach_notes')coachNotes=el.value;
    else if(k==='__seller_notes')sellerNotes=el.value;
    else newAns[k]=el.value;
  });
  const patch={answers:newAns};
  if(isCoach)patch.coach_notes=coachNotes;else patch.seller_notes=sellerNotes;
  if(statusChange)patch.status=statusChange;
  const btn=main.querySelector('#cn-save');btn.disabled=true;
  try{
    const{error}=await sb.from(FB_SESSIONS).update(patch).eq('id',s.id);
    if(error){show('Kunde inte spara: '+error.message,true);btn.disabled=false;return;}
    Object.assign(s,patch);
    show('✓ Sparat.',false);
    if(statusChange){setTimeout(()=>{S.coachOpenSession=null;S.coachLoaded=false;render();},700);}
    else btn.disabled=false;
  }catch(e){show('Något gick fel: '+(e.message||e),true);btn.disabled=false;}
}

async function deleteSession(s){
  if(!confirm('Radera sessionen "'+s.title+'"?\n\nDen hamnar bland Raderade sessioner och ligger kvar där i 30 dagar innan den tas bort. Du kan återställa den under tiden.'))return;
  try{await sb.from(FB_SESSIONS).update({deleted_at:new Date().toISOString()}).eq('id',s.id);}catch(e){}
  S.coachOpenSession=null;S.coachLoaded=false;render();
}

async function restoreSession(id){
  try{await sb.from(FB_SESSIONS).update({deleted_at:null}).eq('id',id);}catch(e){}
  S.coachLoaded=false;render();
}

async function toggleSaveFeedback(s){
  const nv=!s.saved_by_seller;
  try{await sb.from(FB_SESSIONS).update({saved_by_seller:nv}).eq('id',s.id);}catch(e){}
  s.saved_by_seller=nv;S.coachLoaded=false;render();
}

async function deleteQuestion(id){
  if(!confirm('Ta bort frågan?'))return;
  try{await sb.from(FB_QUESTIONS).delete().eq('id',id);}catch(e){}
  S.coachLoaded=false;render();
}

function showAddQuestionModal(type){
  const labels={shared:'gemensam fråga',seller:'säljarfråga',coach:'coachfråga'};
  const mc=document.getElementById('mc');
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal" style="max-width:440px;">
    <h2>Ny ${labels[type]||'fråga'}</h2>
    <textarea id="aq-text" placeholder="Skriv frågan…" style="width:100%;min-height:80px;padding:9px 11px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;font-family:inherit;box-sizing:border-box;margin-bottom:.4rem;"></textarea>
    <div id="aq-msg" style="display:none;color:var(--err);font-size:12px;margin-bottom:.6rem;font-weight:600;"></div>
    <div class="modal-actions"><button class="btn btn-s" id="aq-cancel">Avbryt</button><button class="btn btn-p" id="aq-save">Lägg till</button></div>
  </div>`;
  function close(){mc.innerHTML='';}
  ov.querySelector('#aq-cancel').addEventListener('click',close);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('#aq-save').addEventListener('click',async()=>{
    const txt=ov.querySelector('#aq-text').value.trim();
    const m=ov.querySelector('#aq-msg');
    if(!txt){m.style.display='block';m.textContent='Skriv en fråga.';return;}
    const btn=ov.querySelector('#aq-save');btn.disabled=true;btn.textContent='Sparar…';
    const order=S.feedbackQuestions.filter(q=>q.question_type===type).length+1;
    try{
      const{error}=await sb.from(FB_QUESTIONS).insert({question:txt,question_type:type,sort_order:order});
      if(error){m.style.display='block';m.textContent='Fel: '+error.message;btn.disabled=false;btn.textContent='Lägg till';return;}
    }catch(e){m.style.display='block';m.textContent='Fel: '+(e.message||e);btn.disabled=false;btn.textContent='Lägg till';return;}
    close();S.coachLoaded=false;render();
  });
  mc.innerHTML='';mc.appendChild(ov);
}

function showCreateSessionModal(){
  const mc=document.getElementById('mc');
  const ov=document.createElement('div');ov.className='overlay';
  const ist='width:100%;padding:9px 11px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none;font-family:inherit;box-sizing:border-box;';
  const lst='display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;';
  ov.innerHTML=`<div class="modal" style="max-width:480px;">
    <h2>➕ Skapa feedback-session</h2>
    <div style="margin-bottom:11px;"><label style="${lst}">Säljare</label>
      <select id="cs-seller" style="${ist}"><option value="">— Välj säljare —</option>${S.coachSellers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div>
    <div style="margin-bottom:11px;"><label style="${lst}">Titel</label><input id="cs-title" type="text" placeholder="T.ex. Prisinvändning – Andersson" style="${ist}"></div>
    <div style="margin-bottom:11px;"><label style="${lst}">Samtalets längd</label><input id="cs-dur" type="text" placeholder="T.ex. 8:32" style="${ist}"></div>
    <div style="margin-bottom:11px;"><label style="${lst}">Samtalsinspelning (valfritt)</label><input id="cs-audio" type="file" accept="audio/*" style="${ist}"></div>
    <div style="margin-bottom:1rem;"><label style="${lst}">Specifika frågor – en per rad</label>
      <textarea id="cs-qs" placeholder="T.ex. 2:10 – varför stannade du upp här?" style="${ist}min-height:80px;resize:vertical;"></textarea></div>
    <div id="cs-msg" style="display:none;font-size:12.5px;font-weight:600;margin-bottom:.7rem;"></div>
    <div class="modal-actions"><button class="btn btn-s" id="cs-cancel">Avbryt</button><button class="btn btn-p" id="cs-save">Skapa session</button></div>
  </div>`;
  function close(){mc.innerHTML='';}
  ov.querySelector('#cs-cancel').addEventListener('click',close);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('#cs-save').addEventListener('click',async()=>{
    const m=ov.querySelector('#cs-msg');
    function show(t,bad){m.style.display='block';m.style.color=bad?'var(--err)':'var(--g)';m.textContent=t;}
    const seller=ov.querySelector('#cs-seller').value;
    const title=ov.querySelector('#cs-title').value.trim();
    const dur=ov.querySelector('#cs-dur').value.trim();
    const fileEl=ov.querySelector('#cs-audio');
    const qsLines=ov.querySelector('#cs-qs').value.split('\n').map(x=>x.trim()).filter(Boolean);
    if(!seller){show('Välj en säljare.',true);return;}
    if(!title){show('Skriv en titel.',true);return;}
    const btn=ov.querySelector('#cs-save');btn.disabled=true;btn.textContent='Skapar…';
    let audioPath=null;
    if(fileEl.files&&fileEl.files[0]){
      const f=fileEl.files[0];
      if(f.size>50*1024*1024){show('Ljudfilen är för stor (max 50 MB).',true);btn.disabled=false;btn.textContent='Skapa session';return;}
      audioPath='coaching/'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      try{const r=await sb.storage.from(AUDIO_BUCKET).upload(audioPath,f);
        if(r.error){show('Uppladdning misslyckades: '+r.error.message,true);btn.disabled=false;btn.textContent='Skapa session';return;}}
      catch(e){show('Uppladdning misslyckades: '+(e.message||e),true);btn.disabled=false;btn.textContent='Skapa session';return;}
    }
    try{
      const{error}=await sb.from(FB_SESSIONS).insert({
        seller_id:seller,title:title,duration:dur||null,audio_path:audioPath,
        specific_qs:qsLines.map(q=>({q:q})),answers:{},status:'open'
      });
      if(error){show('Kunde inte skapa: '+error.message,true);btn.disabled=false;btn.textContent='Skapa session';return;}
    }catch(e){show('Något gick fel: '+(e.message||e),true);btn.disabled=false;btn.textContent='Skapa session';return;}
    close();S.coachLoaded=false;render();
  });
  mc.innerHTML='';mc.appendChild(ov);
}

function renderTeamStats(main){
  if(S.role!=='coach'){renderPlaceholder(main,'teamstats');return;}
  const sellers=S.allSellers||[];
  if(!sellers.length){

            ${cr('Par',SR.s229,ppa,ppa*SR.s229)}

            ${cr('Tilläggstjänster',SR.a49,pa1+pa2+pa3,pAdd)}
            <tr class="tot-row"><td>TOTAL PROVISION</td><td></td><td>${psg+ppa+pfa+pa1+pa2+pa3}</td><td style="color:var(--gold);">€${provTot}</td></tr>
          </tbody>
        </table></div>
      </div>
    </div>`;

  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">Statistik säljare <span class="role-pill">Coach</span></div><div class="ph-s">All provision och statistik per säljare</div></div>
      <div class="ph-a"><button class="btn btn-s" id="ts-import">📤 Importera Excel</button></div>
    </div>
    <div class="ca">
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>👥 Välj säljare</h3></div>
        <div class="sec-body"><div class="fl" style="max-width:280px;"><label>Säljare</label><select id="ts-seller">${sellers.map(s=>`<option value="${s.id}" ${s.id===S.tsSellerId?'selected':''}>${esc(s.name)}</option>`).join('')}</select></div></div>
      </div>
      ${provSec}
      ${renderAllStatsSeller(seller,S.allStats||[])}
    </div>`;

  main.querySelector('#ts-seller').addEventListener('change',e=>{S.tsSellerId=e.target.value;renderTeamStats(main);});
  main.querySelector('#ts-import').addEventListener('click',showImportModal);
  const dayToggle=document.getElementById('as-day-toggle');

    const expand=oldRows.length>0&&oldRows[0].style.display==='none';
    oldRows.forEach(r=>{r.style.display=expand?'':'none';});

/* ============================================================
   MÅL & STREAK — bonusmätare
   ============================================================ */
function malNetSalj(d){
  return (n(d.sold_s189)+n(d.sold_s229)+n(d.sold_s279))
       - (n(d.ang_s189)+n(d.ang_s229)+n(d.ang_s279));
}

function renderMal(main){
  const days=S.dailyStats||[];
  const month=new Date().toISOString().slice(0,7);
  let monthSalj=0,totalSalj=0;
  days.forEach(d=>{
    const v=malNetSalj(d);
    totalSalj+=v;
    if(String(d.date).slice(0,7)===month)monthSalj+=v;
  });
  monthSalj=Math.max(0,monthSalj);
  totalSalj=Math.max(0,totalSalj);

  const meters=[
    {label:'Månadsbonus',sub:'Nollställs vid varje månadsskifte',value:monthSalj,goal:40,ic:'📅'},
    {label:'Bonusmål',sub:'Räknas från start – nollställs aldrig',value:totalSalj,goal:100,ic:'🎯'},
    {label:'Storbonus',sub:'Räknas från start – nollställs aldrig',value:totalSalj,goal:200,ic:'🏆'}
  ];

  function meterCard(m){
    const pct=Math.min(100,(m.value/m.goal)*100);
    const done=m.value>=m.goal;
    const left=Math.max(0,m.goal-m.value);
    return `<div class="bmeter${done?' bmeter-done':''}">
      <div class="bmeter-top">
        <div class="bmeter-ic">${m.ic}</div>
        <div class="bmeter-head">
          <div class="bmeter-label">${m.label}</div>
          <div class="bmeter-sub">${m.sub}</div>
        </div>
        <div class="bmeter-reward${done?' br-on':''}">${done?'🎉 Upplåst!':'🎁 Hemlig bonus'}</div>
      </div>
      <div class="bmeter-track"><div class="bmeter-fill${done?' bf-done':''}" style="width:${pct}%;"></div></div>
      <div class="bmeter-foot">
        <span class="bmeter-count">${m.value} / ${m.goal} sälj</span>
        <span class="bmeter-status">${done?'🎉 Bonus upplåst!':left+' sälj kvar'}</span>
      </div>
      ${done?`<div class="bmeter-msg">🎉 Grattis! Du har nått ${m.goal} sälj – en överraskning väntar på dig!</div>`:''}
    </div>`;
  }

  const anyDone=meters.some(m=>m.value>=m.goal);

  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">Mål & Streak</div><div class="ph-s">Sälj dig mot bonusarna</div></div>
    </div>
    <div class="ca">
      <div class="bmeter-grid">
        ${meters.map(meterCard).join('')}
      </div>
      <div class="surprise-box">
        <div class="surprise-gifts">
          ${meters.map(m=>`<span class="sgift${m.value>=m.goal?' sgift-open':''}">${m.value>=m.goal?'🎉':'🎁'}</span>`).join('')}
        </div>
        <div class="surprise-text">Nå mätarna för att öppna överraskningarna</div>
      </div>
    </div>`;

  if(anyDone&&!S.celebrated){S.celebrated=true;if(typeof fireConfetti==='function')fireConfetti();}
  if(!anyDone)S.celebrated=false;
}

/* ============================================================
   KALENDER & PLANERING — coach-veckoschema
   ============================================================ */
const KAL_SLOTS=['11:00–12:30','12:40–14:00','15:00–16:30','16:40–18:00'];
const KAL_BREAKS={0:'12:30–12:40 · Paus',1:'14:00–15:00 · Lunch',2:'16:30–16:40 · Paus'};
const KAL_DAYS=['Måndag','Tisdag','Onsdag','Torsdag','Fredag'];
const KAL_TYPES={feedback:'Feedback',saljpass:'Säljpass',livelyssning:'Livelyssning',planering:'Planering'};
const SV_MONTHS=['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];

function isoLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function kalMonday(d){const x=new Date(d);const dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);x.setHours(0,0,0,0);return x;}
function kalDefaultWeek(){
  const now=new Date();const dow=(now.getDay()+6)%7;const base=new Date(now);
  if(dow===5||dow===6||(dow===4&&now.getHours()>=13))base.setDate(base.getDate()+7);
  return isoLocal(kalMonday(base));
}
function kalDayDate(weekStr,dayIdx){const d=new Date(weekStr+'T00:00:00');d.setDate(d.getDate()+dayIdx);return d;}
function kalWeekLabel(weekStr){
  const mon=kalDayDate(weekStr,0),fri=kalDayDate(weekStr,4);
  const sameM=mon.getMonth()===fri.getMonth();
  return mon.getDate()+(sameM?'':' '+SV_MONTHS[mon.getMonth()])+'–'+fri.getDate()+' '+SV_MONTHS[fri.getMonth()]+' '+fri.getFullYear();
}

function renderKalender(main){
  if(S.role!=='coach'){renderPlaceholder(main,'kalender');return;}
  if(!coachHasCalendar()){
    main.innerHTML=`<div class="ph"><div><div class="ph-t">Kalender</div></div></div><div class="ca"><div class="notice warn">Kalendern är inte aktiv för det här kontot.</div></div>`;
    return;
  }
  if(!S.kalWeek)S.kalWeek=kalDefaultWeek();
  if(S.kalLoadedWeek===S.kalWeek){renderKalenderView(main);return;}
  main.innerHTML='<div class="ph"><div><div class="ph-t">Kalender & planering</div><div class="ph-s">Laddar…</div></div></div><div class="ca"><div class="empty"><p>Laddar veckan…</p></div></div>';
  loadKalender(main);
}

async function loadKalender(main){
  let rows=[];
  try{const r=await sb.from('salj_schedule').select('*').eq('week',S.kalWeek).eq('coach_id',kalCoachId());rows=r.data||[];}catch(e){}
  S.kalRows=rows;S.kalLoadedWeek=S.kalWeek;
  if(S.tab==='kalender')renderKalenderView(main);
}

function renderKalenderView(main){
  const rows=S.kalRows||[];
  const cellOf=(d,s)=>rows.find(r=>r.day_idx===d&&r.slot_idx===s)||null;
  const noteRow=rows.find(r=>r.day_idx===-1)||null;
  const sellerName=id=>{const x=(S.allSellers||[]).find(s=>s.id===id);return x?x.name:'';};

  let head='<tr><th></th>';
  KAL_DAYS.forEach((dn,i)=>{
    const dt=kalDayDate(S.kalWeek,i);
    head+=`<th><span class="kal-dn">${dn}</span><span class="kal-dd">${dt.getDate()}/${dt.getMonth()+1}</span></th>`;
  });
  head+='</tr>';

  let bodyRows='';
  KAL_SLOTS.forEach((slabel,s)=>{
    let tr=`<tr><td class="kal-time">${slabel}</td>`;
    for(let d=0;d<5;d++){
      const c=cellOf(d,s);
      if(c&&c.type){
        const sn=c.seller_id?sellerName(c.seller_id):'';
        tr+=`<td class="kcell t-${c.type}" data-d="${d}" data-s="${s}"><div class="kcell-type">${KAL_TYPES[c.type]||esc(c.type)}</div>${sn?`<div class="kcell-seller">👤 ${esc(sn)}</div>`:''}</td>`;
      }else{
        tr+=`<td class="kcell kcell-empty" data-d="${d}" data-s="${s}">+</td>`;
      }
    }
    tr+='</tr>';
    bodyRows+=tr;
    if(KAL_BREAKS[s]!==undefined)bodyRows+=`<tr><td class="kal-time"></td><td class="kal-break" colspan="5">${KAL_BREAKS[s]}</td></tr>`;
  });

  main.innerHTML=`
    <div class="ph">
      <div><div class="ph-t">Kalender & planering <span class="role-pill">Coach</span></div><div class="ph-s">Boka pass för veckan – klicka i rutorna</div></div>
    </div>
    <div class="ca">
      <div class="kal-toolbar">
        <div class="kal-wknav">
          <button class="btn btn-s" id="kal-prev">←</button>
          <span class="kal-wklabel">${kalWeekLabel(S.kalWeek)}</span>
          <button class="btn btn-s" id="kal-next">→</button>
        </div>
        <button class="btn btn-s" id="kal-today">Nuvarande vecka</button>
        <div style="flex:1;"></div>
        <button class="btn btn-s" id="kal-copy">📋 Kopiera förra veckan</button>
        <button class="btn btn-p" id="kal-report">📧 Skicka veckorapport</button>
      </div>
      <div class="sec fade-in">
        <div class="sec-body" style="overflow-x:auto;">
          <table class="kal-grid"><thead>${head}</thead><tbody>${bodyRows}</tbody></table>
          <div class="kal-legend">
            ${Object.keys(KAL_TYPES).map(k=>`<span class="kal-leg-item"><span class="ktype-dot kd-${k}"></span>${KAL_TYPES[k]}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="sec fade-in">
        <div class="sec-hdr"><h3>📝 Övrigt – anteckningar för veckan</h3></div>
        <div class="sec-body">
          <textarea id="kal-note" rows="4" style="width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:9px;font-size:13px;font-family:inherit;color:var(--tx);outline:none;box-sizing:border-box;resize:vertical;" placeholder="Fri text – påminnelser, mål, händelser…">${esc(noteRow?noteRow.note:'')}</textarea>
          <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:.7rem;">
            <span id="kal-note-msg" style="font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;"></span>
            <button class="btn btn-s" id="kal-note-save">Spara anteckning</button>
          </div>
        </div>
      </div>
      <div id="kal-msg" style="display:none;border-radius:8px;padding:11px 13px;font-size:13px;white-space:pre-line;margin-top:1rem;"></div>
    </div>`;

  function go(week){S.kalWeek=week;renderKalender(main);}
  main.querySelector('#kal-prev').addEventListener('click',()=>go(isoLocal(kalDayDate(S.kalWeek,-7))));
  main.querySelector('#kal-next').addEventListener('click',()=>go(isoLocal(kalDayDate(S.kalWeek,7))));
  main.querySelector('#kal-today').addEventListener('click',()=>go(kalDefaultWeek()));
  main.querySelectorAll('.kcell').forEach(td=>td.addEventListener('click',()=>showKalCellModal(main,+td.dataset.d,+td.dataset.s)));
  main.querySelector('#kal-note-save').addEventListener('click',async()=>{
    const txt=main.querySelector('#kal-note').value;
    const btn=main.querySelector('#kal-note-save');btn.disabled=true;btn.textContent='Sparar…';
    let error=null;
    try{const r=await sb.from('salj_schedule').upsert(
      {week:S.kalWeek,coach_id:kalCoachId(),day_idx:-1,slot_idx:0,type:'ovrigt',note:txt,updated_at:new Date().toISOString()},
      {onConflict:'coach_id,week,day_idx,slot_idx'});error=r.error;}catch(e){error=e;}
    btn.disabled=false;btn.textContent='Spara anteckning';
    const m=main.querySelector('#kal-note-msg');
    if(error){m.style.color='var(--err)';m.textContent='✗ Kunde inte spara';}
    else{m.style.color='var(--g)';m.textContent='✓ Sparat';S.kalLoadedWeek=null;}
    m.style.opacity='1';setTimeout(()=>{const e=main.querySelector('#kal-note-msg');if(e)e.style.opacity='0';},2200);
  });
  main.querySelector('#kal-copy').addEventListener('click',()=>kalCopyLastWeek(main));
  main.querySelector('#kal-report').addEventListener('click',()=>kalSendReport(main));
}

function showKalCellModal(main,day,slot){
  const mc=document.getElementById('mc');
  const ov=document.createElement('div');ov.className='overlay';
  const cur=(S.kalRows||[]).find(r=>r.day_idx===day&&r.slot_idx===slot);
  const dt=kalDayDate(S.kalWeek,day);
  let selType=cur?cur.type:null;
  const sellers=S.allSellers||[];
  ov.innerHTML=`<div class="modal" style="max-width:380px;">
    <h2>${KAL_DAYS[day]} ${dt.getDate()}/${dt.getMonth()+1}</h2>
    <p style="margin-top:-4px;">${KAL_SLOTS[slot]}</p>
    <div id="kal-types">
      ${Object.keys(KAL_TYPES).map(k=>`<div class="ktype-opt${selType===k?' sel':''}" data-k="${k}"><span class="ktype-dot kd-${k}"></span>${KAL_TYPES[k]}</div>`).join('')}
    </div>
    <div style="margin:12px 0 1.1rem;">
      <label style="display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;">Säljare (valfritt)</label>
      <select id="kal-seller" style="width:100%;padding:9px 11px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none;font-family:inherit;box-sizing:border-box;">
        <option value="">— Ingen —</option>
        ${sellers.map(s=>`<option value="${s.id}" ${cur&&cur.seller_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select>
    </div>
    <div id="kal-cell-msg" style="display:none;font-size:12px;font-weight:600;color:var(--err);margin-bottom:.7rem;"></div>
    <div class="modal-actions">
      ${cur?'<button class="btn btn-d" id="kal-cell-del">Ta bort</button>':''}
      <button class="btn btn-s" id="kal-cell-cancel">Avbryt</button>
      <button class="btn btn-p" id="kal-cell-save">Spara</button>
    </div>
  </div>`;
  function close(){mc.innerHTML='';}
  ov.querySelector('#kal-cell-cancel').addEventListener('click',close);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelectorAll('.ktype-opt').forEach(o=>o.addEventListener('click',()=>{
    selType=o.dataset.k;
    ov.querySelectorAll('.ktype-opt').forEach(x=>x.classList.toggle('sel',x===o));
  }));
  function reloadAndClose(){close();S.kalLoadedWeek=null;renderKalender(main);}
  ov.querySelector('#kal-cell-save').addEventListener('click',async()=>{
    const m=ov.querySelector('#kal-cell-msg');
    if(!selType){m.style.display='block';m.textContent='Välj en passtyp.';return;}
    const sid=ov.querySelector('#kal-seller').value||null;
    const btn=ov.querySelector('#kal-cell-save');btn.disabled=true;btn.textContent='Sparar…';
    let error=null;
    try{const r=await sb.from('salj_schedule').upsert(
      {week:S.kalWeek,coach_id:kalCoachId(),day_idx:day,slot_idx:slot,type:selType,seller_id:sid,updated_at:new Date().toISOString()},
      {onConflict:'coach_id,week,day_idx,slot_idx'});error=r.error;}catch(e){error=e;}
    if(error){btn.disabled=false;btn.textContent='Spara';m.style.display='block';m.textContent='Kunde inte spara: '+(error.message||error);return;}
    reloadAndClose();
  });
  const del=ov.querySelector('#kal-cell-del');
  if(del)del.addEventListener('click',async()=>{
    del.disabled=true;
    try{await sb.from('salj_schedule').delete().eq('coach_id',kalCoachId()).eq('week',S.kalWeek).eq('day_idx',day).eq('slot_idx',slot);}catch(e){}
    reloadAndClose();
  });
  mc.innerHTML='';mc.appendChild(ov);
}

function kalShowMsg(main,msg,bad){
  const m=main.querySelector('#kal-msg');if(!m)return;
  m.style.display='block';
  m.style.background=bad?'var(--errl)':'#EAF4EE';
  m.style.color=bad?'var(--err)':'var(--gd)';
  m.style.borderLeft='3px solid '+(bad?'var(--err)':'var(--g)');
  m.textContent=msg;
}

async function kalCopyLastWeek(main){
  if(!confirm('Kopiera alla bokade pass från förra veckan till denna vecka? Befintliga pass skrivs över.'))return;
  const prev=isoLocal(kalDayDate(S.kalWeek,-7));
  let prevRows=[];
  try{const r=await sb.from('salj_schedule').select('*').eq('week',prev).eq('coach_id',kalCoachId());prevRows=r.data||[];}catch(e){}
  const toCopy=prevRows.filter(r=>r.day_idx>=0&&r.type);
  if(!toCopy.length){kalShowMsg(main,'Förra veckan hade inga bokade pass att kopiera.',true);return;}
  const upserts=toCopy.map(r=>({week:S.kalWeek,coach_id:kalCoachId(),day_idx:r.day_idx,slot_idx:r.slot_idx,type:r.type,seller_id:r.seller_id||null,updated_at:new Date().toISOString()}));
  let error=null;
  try{const r=await sb.from('salj_schedule').upsert(upserts,{onConflict:'coach_id,week,day_idx,slot_idx'});error=r.error;}catch(e){error=e;}
  if(error){kalShowMsg(main,'✗ Kunde inte kopiera: '+(error.message||error),true);return;}
  S.kalLoadedWeek=null;renderKalender(main);
}

async function kalSendReport(main){
  const rows=S.kalRows||[];
  const sellerName=id=>{const x=(S.allSellers||[]).find(s=>s.id===id);return x?x.name:'';};
  const days=KAL_DAYS.map((dn,d)=>{
    const dt=kalDayDate(S.kalWeek,d);
    const passes=[];
    KAL_SLOTS.forEach((sl,s)=>{
      const c=rows.find(r=>r.day_idx===d&&r.slot_idx===s);
      if(c&&c.type)passes.push({time:sl,type:KAL_TYPES[c.type]||c.type,seller:c.seller_id?sellerName(c.seller_id):''});
    });
    return {label:dn+' '+dt.getDate()+'/'+(dt.getMonth()+1),passes:passes};
  });
  const noteRow=rows.find(r=>r.day_idx===-1);
  const total=days.reduce((a,d)=>a+d.passes.length,0);
  // Veckans ordervärde — summa av alla säljares orderbelopp mån–fre
  const monday=S.kalWeek,friday=isoLocal(kalDayDate(S.kalWeek,4));
  const orderValue=(S.allStats||[])
    .filter(d=>String(d.date)>=monday&&String(d.date)<=friday)
    .reduce((a,d)=>a+dayOrderbelopp(d),0);
  if(!confirm('Skicka veckorapporten ('+total+' bokade pass) till tl@smartid.se och kt@smartid.se?'))return;
  const btn=main.querySelector('#kal-report');btn.disabled=true;btn.textContent='Skickar…';
  let res;
  try{res=await sb.functions.invoke('send-week-report',{body:{weekLabel:kalWeekLabel(S.kalWeek),days:days,note:noteRow?noteRow.note:'',orderValue:orderValue}});}
  catch(e){res={error:e};}
  btn.disabled=false;btn.textContent='📧 Skicka veckorapport';
  if(res.error){kalShowMsg(main,'✗ Kunde inte nå servern. Är Edge Function-en deployad?\n'+(res.error.message||res.error),true);return;}
  if(!res.data||!res.data.ok){kalShowMsg(main,'✗ '+((res.data&&res.data.error)||'Okänt fel.'),true);return;}
  kalShowMsg(main,'✓ '+(res.data.message||'Veckorapport skickad.'),false);
}

function saFmtMin(s){if(!isFinite(s))return '–';const m=Math.floor(s/60),sec=Math.round(s%60);return m+':'+(sec<10?'0':'')+sec;}
function saFmtDate(t){if(!t)return '–';const d=new Date(t);return d.toLocaleDateString('sv-SE')+' '+d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});}
function saPct(v){if(v==null)return '–';return Math.round(v*100)+'%';}
function saScore(v){if(v==null)return '–';return v.toFixed(2);}
function saBadgeStatus(s){
  if(s==='ja_tack')return '<span class="sa-badge sa-b-ja">Ja tack</span>';
  if(s==='nej_tack')return '<span class="sa-badge sa-b-nej">Nej tack</span>';
  if(s==='callback')return '<span class="sa-badge sa-b-cb">Callback</span>';
  return '<span class="sa-badge">'+esc(s||'–')+'</span>';
}
function saBadgeRegret(r){
  if(r==='low')return '<span class="sa-badge sa-b-low">Låg</span>';
  if(r==='medium')return '<span class="sa-badge sa-b-med">Medel</span>';
  if(r==='high')return '<span class="sa-badge sa-b-high">Hög</span>';
  return '<span class="sa-badge">–</span>';
}
function saBadgeComp(s){
  if(s==='ok')return '<span class="sa-badge sa-b-ok">✓ OK</span>';
  if(s==='warn'||s==='wrong')return '<span class="sa-badge sa-b-warn">⚠ Varning</span>';
  if(s==='missing'||s==='err')return '<span class="sa-badge sa-b-err">✗ Saknas</span>';
  return '<span class="sa-badge">'+esc(s||'–')+'</span>';
}

function wireSa(main){
  main.querySelector('#sa-go').onclick=()=>{
    S.sa.query=main.querySelector('#sa-q').value.trim();
    const sel=main.querySelector('#sa-seller');if(sel)S.sa.filterSeller=sel.value;
    S.sa.filterStatus=main.querySelector('#sa-status').value;
    S.sa.filterFrom=main.querySelector('#sa-from').value;
    S.sa.filterTo=main.querySelector('#sa-to').value;
    loadSaResults(main);
  };
  main.querySelector('#sa-clear').onclick=()=>{
    S.sa={loaded:false,samtal:[],query:'',filterSeller:'',filterStatus:'',filterFrom:'',filterTo:'',openId:null,detail:null};
    renderSamtalsanalys(main);
  };
  main.querySelector('#sa-q').addEventListener('keydown',e=>{if(e.key==='Enter')main.querySelector('#sa-go').click();});
  // Analysera idag
  const adGo=main.querySelector('#ad-go');
  if(adGo)adGo.onclick=async()=>{
    const scope=main.querySelector('#ad-scope').value||null;
    const date=main.querySelector('#ad-date').value;
    const out=main.querySelector('#ad-result');
    out.innerHTML='<div class="empty"><p>AI analyserar dagens samtal…</p></div>';
    try{
      const resp=await fetch('https://hfbhoufqvozbxkqlldzl.supabase.co/functions/v1/analyze-day',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({date,seller_id:scope})
      });
      const d=await resp.json();
      if(!d.ok){out.innerHTML=`<div class="notice warn">Fel: ${esc(d.error||'okänd')}</div>`;return;}
      if(d.calls_analyzed===0){out.innerHTML=`<div class="empty"><p>Inga analyserade samtal för datumet</p></div>`;return;}
      out.innerHTML=`
        <div class="notice" style="background:var(--bg2);border:1px solid var(--br);border-left:3px solid var(--g);">
          <strong>${esc(d.scope||'')}</strong> · ${d.calls_analyzed} samtal · ${esc(d.date||'')}<br>
          ${esc(d.summary||'')}
          ${d.key_metrics?'<br><small style="color:var(--mu);">Ja: '+d.key_metrics.sj+' · Nej: '+d.key_metrics.nej+' · Callback: '+d.key_metrics.callback+' · Q-snitt: '+(d.key_metrics.quality_avg||0).toFixed(2)+'</small>':''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem;">
          <div class="sec"><div class="sec-hdr"><h3>✅ Påverkade positivt</h3></div><div class="sec-body">
            ${(d.positives||[]).map(p=>`<div class="sa-highlight"><strong>${esc(p.title||'')}</strong><div style="font-size:12.5px;margin-top:4px;">${esc(p.detail||'')}</div>${p.evidence_cdr?'<div class="sa-tip-q">cdr '+esc(p.evidence_cdr)+'</div>':''}</div>`).join('')||'<p style="color:var(--mu);">(inget)</p>'}
          </div></div>
          <div class="sec"><div class="sec-hdr"><h3>⚠ Påverkade negativt</h3></div><div class="sec-body">
            ${(d.negatives||[]).map(p=>`<div class="sa-tip"><strong>${esc(p.title||'')}</strong><div style="font-size:12.5px;margin-top:4px;">${esc(p.detail||'')}</div>${p.evidence_cdr?'<div class="sa-tip-q">cdr '+esc(p.evidence_cdr)+'</div>':''}</div>`).join('')||'<p style="color:var(--mu);">(inget)</p>'}
          </div></div>
        </div>
        <div class="sec" style="margin-top:1rem;"><div class="sec-hdr"><h3>💡 Förslag för imorgon</h3></div><div class="sec-body">
          ${(d.suggestions||[]).map(s=>`<div class="sa-tip"><div class="sa-tip-n">Prio ${s.priority||'-'}</div><div class="sa-tip-b">${esc(s.tip||'')}</div></div>`).join('')||'<p style="color:var(--mu);">(inget)</p>'}
        </div></div>`;
    }catch(e){out.innerHTML=`<div class="notice warn">Nätverksfel: ${esc(e.message)}</div>`;}
  };
}

async function loadSaResults(main){
  const sa=S.sa;
  let rows=[];
  try{
    if(sa.query){
      const {data}=await sb.rpc('search_calls',{
        q:sa.query,
        filter_seller_id:sa.filterSeller||null,
        filter_status:sa.filterStatus||null,
        filter_from:sa.filterFrom||null,
        filter_to:sa.filterTo||null,
        filter_min_quality:null,
        page_limit:100,page_offset:0
      });
      rows=data||[];
    }else{
      // Hämta bara fält som listvyn behöver — text_full (4-30 KB/rad) hämtas vid detaljvy
      let q=sb.from('v_call_overview')
        .select('recording_id,cdr_id,adversus_lead_id,recorded_at,duration_s,status_at_close,seller_id,seller_name,customer_id,talk_ratio_interactive,compliance_score,call_quality_score,regret_risk,summary,sentiment_seller,sentiment_customer')
        .order('recorded_at',{ascending:false}).limit(100);
      if(S.role!=='coach'&&S.seller)q=q.eq('seller_id',S.seller.id);
      if(sa.filterSeller)q=q.eq('seller_id',sa.filterSeller);
      if(sa.filterStatus)q=q.eq('status_at_close',sa.filterStatus);
      if(sa.filterFrom)q=q.gte('recorded_at',sa.filterFrom);
      if(sa.filterTo)q=q.lte('recorded_at',sa.filterTo+'T23:59:59');
      const {data}=await q;rows=data||[];
    }
  }catch(e){console.error('search err',e);}
  S.sa.samtal=rows;
  renderSaList(main);
  renderSaStats(main);
}

function renderSaStats(main){
  const wrap=main.querySelector('#sa-stats');if(!wrap)return;
  const rows=S.sa.samtal;
  const tot=rows.length;
  const ja=rows.filter(r=>r.status_at_close==='ja_tack').length;
  const nej=rows.filter(r=>r.status_at_close==='nej_tack').length;
  const cb=rows.filter(r=>r.status_at_close==='callback').length;
  const avgTalk=rows.filter(r=>r.talk_ratio_interactive!=null).reduce((a,r)=>a+Number(r.talk_ratio_interactive),0)/Math.max(1,rows.filter(r=>r.talk_ratio_interactive!=null).length);
  const regret=rows.filter(r=>r.regret_risk==='medium'||r.regret_risk==='high').length;
  wrap.innerHTML=`
    <div class="sa-stat"><div class="sa-stat-l">Träffar</div><div class="sa-stat-v">${tot}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">Ja tack</div><div class="sa-stat-v">${ja}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">Nej tack</div><div class="sa-stat-v">${nej}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">Callback</div><div class="sa-stat-v">${cb}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">Snitt talk-ratio</div><div class="sa-stat-v">${tot?saPct(avgTalk):'–'}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">Ångerrisk medel/hög</div><div class="sa-stat-v">${regret}</div></div>`;
}

function renderSaList(main){
  const wrap=main.querySelector('#sa-results');if(!wrap)return;
  const rows=S.sa.samtal;
  if(!rows.length){
    wrap.innerHTML=`<div class="empty"><p>Inga samtal hittade</p><small>Pipelinen är inte igång ännu — så snart edge functions deployats och första körningen klart börjar samtal dyka upp här.</small></div>`;
    return;
  }
  const showSnippet=!!S.sa.query;
  wrap.innerHTML=`
    <table class="sa-table">
      <thead><tr>
        <th>Datum</th><th>Längd</th><th>Säljare</th><th>Utfall</th><th>Talk-ratio</th><th>Quality</th><th>Ångerrisk</th>${showSnippet?'<th>Träff</th>':''}
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr class="sa-row" data-id="${esc(r.recording_id)}">
          <td>${saFmtDate(r.recorded_at)}</td>
          <td>${saFmtMin(r.duration_s)}</td>
          <td title="seller_id: ${esc(r.seller_id||'')}">säljare</td>
          <td>${saBadgeStatus(r.status_at_close)}</td>
          <td>${saPct(r.talk_ratio_interactive)}</td>
          <td>${saScore(r.call_quality_score)}</td>
          <td>${saBadgeRegret(r.regret_risk)}</td>
          ${showSnippet?'<td class="sa-snippet">'+(r.match_snippet||'').replace(/<b>/g,'<b>').replace(/<\/b>/g,'</b>')+'</td>':''}
        </tr>`).join('')}
      </tbody>
    </table>`;
  wrap.querySelectorAll('.sa-row').forEach(row=>{
    row.onclick=()=>{S.sa.openId=row.dataset.id;S.sa.detail=null;render();};
  });
}

function saRenderCompliance(flags){
  if(!flags||typeof flags!=='object')return '<p style="color:var(--mu);">(ingen compliance-data än)</p>';
  const labels={bindningstid:'Bindningstid nämnd',angerratt:'Ångerrätt nämnd',totalpris:'Totalpris nämnt',pii_in_transcript:'PII i transkript',trustpilot:'Trustpilot-belöning'};
  let html='';
  Object.entries(flags).forEach(([k,v])=>{
    const label=labels[k]||k;
    const status=typeof v==='object'?(v.status||'–'):v;
    const detail=typeof v==='object'?(v.detail||v.kommentar||''):'';
    html+=`<div class="sa-comp-row"><div class="sa-comp-row-l"><div>${esc(label)}</div>${detail?'<div class="sa-comp-row-d">'+esc(detail)+'</div>':''}</div>${saBadgeComp(status)}</div>`;
  });
  return html||'<p style="color:var(--mu);">(inga flaggor)</p>';
}

function saRenderPhases(phases){
  if(!phases||!Array.isArray(phases)||!phases.length)return '<p style="color:var(--mu);">(faser ej segmenterade)</p>';
  return '<div class="sa-phase-list">'+phases.map(p=>{
    const t=`${saFmtMin(p.start||0)}–${saFmtMin(p.end||0)}`;
    const mono=p.type==='monologue';
    return `<div class="sa-phase${mono?' mono':''}"><span class="sa-phase-t">${t}</span><span class="sa-phase-n">${esc(p.phase||p.name||'–')}</span>${mono?'<span class="sa-badge sa-b-warn">manus</span>':''}<span style="font-size:11px;color:var(--mu);">${p.length_s?Math.round(p.length_s)+'s':''}</span></div>`;
  }).join('')+'</div>';
}

function saRenderHighlights(hl){
  if(!hl||!Array.isArray(hl)||!hl.length)return '<p style="color:var(--mu);">(inga highlights identifierade)</p>';
  return hl.map(h=>`<div class="sa-highlight"><div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">${esc(h.time_mmss||'')} · ${esc(h.category||'')}</div><div style="font-size:13px;line-height:1.55;">${esc(h.why_good||h.why||'')}</div>${h.text?'<div class="sa-tip-q">"'+esc(h.text)+'"</div>':''}</div>`).join('');
}

function saRenderTips(tips,recordingId){
  if(!tips||!Array.isArray(tips)||!tips.length)return '<p style="color:var(--mu);">(inga tips identifierade)</p>';
  return tips.map((t,i)=>`<div class="sa-tip">
    <div class="sa-tip-n">Tips ${i+1}${t.priority?' · prio '+t.priority:''}</div>
    <div class="sa-tip-b">${esc(t.tip||'')}</div>
    ${t.evidence_quote?'<div class="sa-tip-q">'+esc(t.evidence_time||'')+' "'+esc(t.evidence_quote)+'"</div>':''}
    ${saFbWidget(recordingId,'coach_tip',i)}
  </div>`).join('');
}

function saRenderHighlightsWithFb(hl,recordingId){
  if(!hl||!Array.isArray(hl)||!hl.length)return '<p style="color:var(--mu);">(inga highlights identifierade)</p>';
  return hl.map((h,i)=>`<div class="sa-highlight">
    <div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">${esc(h.time_mmss||'')} · ${esc(h.category||'')}</div>
    <div style="font-size:13px;line-height:1.55;">${esc(h.why_good||h.why||'')}</div>
    ${h.text?'<div class="sa-tip-q">"'+esc(h.text)+'"</div>':''}
    ${saFbWidget(recordingId,'highlight',i)}
  </div>`).join('');
}

async function loadBibliotek(main){
  const sellerSel=main.querySelector('#bib-seller');
  const outcomeSel=main.querySelector('#bib-outcome');
  if(sellerSel)S.bib.filterSeller=sellerSel.value;
  if(outcomeSel)S.bib.filterOutcome=outcomeSel.value;

  const wrap=main.querySelector('#bib-results');
  wrap.innerHTML='<div class="empty"><p>Laddar…</p></div>';
  try{
    if(S.bib.tab==='inv'){
      const {data}=await sb.rpc('objection_library',{
        filter_outcome:S.bib.filterOutcome||null,
        filter_seller_id:S.bib.filterSeller||null,
        filter_from:null,filter_to:null,page_limit:200
      });
      renderBibObjections(main,data||[]);
    }else{
      const {data}=await sb.rpc('highlight_library',{
        filter_category:null,filter_seller_id:S.bib.filterSeller||null,
        min_quality:0.4,page_limit:100
      });
      renderBibHighlights(main,data||[]);
    }
  }catch(e){wrap.innerHTML=`<div class="notice warn">Fel: ${esc(e.message)}</div>`;}
}

function renderBibObjections(main,rows){
  const stats=main.querySelector('#bib-stats');
  const out={overcame:0,partially:0,failed:0,other:0};
  rows.forEach(r=>{const o=(r.outcome||'').toLowerCase();if(out[o]!==undefined)out[o]++;else out.other++;});
  stats.innerHTML=`
    <div class="sa-stat"><div class="sa-stat-l">Totalt</div><div class="sa-stat-v">${rows.length}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">✅ Övervunna</div><div class="sa-stat-v">${out.overcame}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">~ Delvis</div><div class="sa-stat-v">${out.partially}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">❌ Misslyckade</div><div class="sa-stat-v">${out.failed}</div></div>
    <div class="sa-stat"><div class="sa-stat-l">Hit-rate</div><div class="sa-stat-v">${rows.length?Math.round(out.overcame/rows.length*100)+'%':'–'}</div></div>`;
  const wrap=main.querySelector('#bib-results');
  if(!rows.length){wrap.innerHTML='<div class="empty"><p>Inga invändningar hittade</p></div>';return;}
  wrap.innerHTML=`<table class="sa-table"><thead><tr>
    <th>Datum</th><th>Säljare</th><th>Tid</th><th>Kunden sa</th><th>Säljarens hantering</th><th>Utfall</th><th></th>
  </tr></thead><tbody>${rows.map(r=>{
    const oc=r.outcome||'';
    const ocClass=oc==='overcame'?'sa-b-ja':oc==='failed'?'sa-b-nej':'sa-b-cb';
    return `<tr>
      <td style="white-space:nowrap;">${esc((r.recorded_at||'').slice(0,10))}</td>
      <td>${esc(r.seller_name||'?')}</td>
      <td style="font-family:monospace;font-size:11px;">${esc(r.time_mmss||'')}</td>
      <td style="max-width:280px;">${esc(r.obj_text||'')}</td>
      <td style="max-width:340px;">${esc(r.handling||'')}</td>
      <td><span class="sa-badge ${ocClass}">${esc(oc||'–')}</span></td>
      <td><a href="#" class="bib-open" data-rid="${esc(r.recording_id)}" style="font-size:11px;color:var(--g);font-weight:600;">→</a></td>
    </tr>`;
  }).join('')}</tbody></table>`;

function renderBibHighlights(main,rows){
  const stats=main.querySelector('#bib-stats');
  const cats={};rows.forEach(r=>{cats[r.category||'other']=(cats[r.category||'other']||0)+1;});
  stats.innerHTML=`<div class="sa-stat"><div class="sa-stat-l">Totalt</div><div class="sa-stat-v">${rows.length}</div></div>`+
    Object.entries(cats).map(([k,v])=>`<div class="sa-stat"><div class="sa-stat-l">${esc(k)}</div><div class="sa-stat-v">${v}</div></div>`).join('');
  const wrap=main.querySelector('#bib-results');

  wrap.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1rem;">${rows.map(r=>`
    <div class="sa-highlight" style="margin-bottom:0;">

function wireBibOpen(main){
  main.querySelectorAll('.bib-open').forEach(a=>{
    a.onclick=(e)=>{e.preventDefault();

      S.sa.openId=a.dataset.rid;S.sa.detail=null;

      document.querySelector('.sbi[data-tab="samtalsanalys"]')?.classList.add('active');
      render();
    };
  });
}

/* ============================================================
   MÅL & STREAK V2 — personliga månadsmål + AI-nedbrytning
   ============================================================ */
function workdaysInMonth(y,m){
  const last=new Date(y,m+1,0).getDate();
  let n=0;for(let d=1;d<=last;d++){const wd=new Date(y,m,d).getDay();if(wd!==0&&wd!==6)n++;}return n;
}
function workdaysSoFar(y,m){
  const today=new Date();const limit=today.getFullYear()===y&&today.getMonth()===m?today.getDate():new Date(y,m+1,0).getDate();
  let n=0;for(let d=1;d<=limit;d++){const wd=new Date(y,m,d).getDay();if(wd!==0&&wd!==6)n++;}return n;
}

  const days=(S.dailyStats||[]).filter(d=>d.seller_id===sellerId);

  const ym=today.toISOString().slice(0,7);

        <div class="kpi"><div class="kpi-ic blue">➕</div><div class="kpi-l">Tilläggstjänster</div><div class="kpi-v">${totAddon}</div><div class="kpi-sub">${totAdS}/${totAdP}/${totAdF}</div></div>

async function loadAndRenderTrend(main, sellerId){
  const since=new Date();since.setDate(since.getDate()-30);
  const sinceStr=since.toISOString().slice(0,10);
  let trends=[];
  try{
    const {data}=await sb.from('v_seller_quality_trend')
      .select('dag,antal,ja,nej,avg_quality,avg_compliance')
      .eq('seller_id',sellerId).gte('dag',sinceStr).order('dag',{ascending:true});
    trends=data||[];
  }catch(e){console.error('trend',e);}
  if(!trends.length){
    main.querySelector('.ca').insertAdjacentHTML('beforeend',
      '<div class="sec" style="margin-top:1rem;"><div class="sec-hdr"><h3>📈 30-dagars trend</h3></div><div class="sec-body"><div class="empty"><p>Ingen analyserad data senaste 30 dgr</p></div></div></div>');
    return;
  }
  // Bygg SVG line chart
  const w=860,h=240,pad={l:40,r:20,t:20,b:40};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const days=trends.length;
  const xStep=days>1?cw/(days-1):0;
  const yScale=v=>ch-(Math.max(0,Math.min(1,v||0)))*ch;
  const qPoints=trends.map((t,i)=>`${pad.l+i*xStep},${pad.t+yScale(t.avg_quality)}`).join(' ');
  const cPoints=trends.map((t,i)=>`${pad.l+i*xStep},${pad.t+yScale(t.avg_compliance)}`).join(' ');
  const maxAnt=Math.max(1,...trends.map(t=>t.antal));
  const bars=trends.map((t,i)=>{
    const x=pad.l+i*xStep-(xStep*0.4)/2;
    const bw=Math.max(2,xStep*0.4);
    const bh=(t.ja/maxAnt)*ch;
    return `<rect x="${x}" y="${pad.t+ch-bh}" width="${bw}" height="${bh}" fill="rgba(200,168,75,.35)"/>`;
  }).join('');
  const xLabels=trends.filter((_,i)=>i%Math.max(1,Math.floor(days/8))===0||i===days-1)
    .map((t,j,arr)=>{
      const origIdx=trends.indexOf(t);
      const x=pad.l+origIdx*xStep;
      return `<text x="${x}" y="${h-15}" font-size="10" fill="#557A6A" text-anchor="middle">${t.dag.slice(5)}</text>`;
    }).join('');
  const yLabels=[0,0.25,0.5,0.75,1].map(v=>
    `<text x="${pad.l-6}" y="${pad.t+yScale(v)+3}" font-size="10" fill="#557A6A" text-anchor="end">${v}</text>
     <line x1="${pad.l}" y1="${pad.t+yScale(v)}" x2="${pad.l+cw}" y2="${pad.t+yScale(v)}" stroke="#EBF2EF" stroke-width="1"/>`
  ).join('');
  // Sammanställning sista veckan vs föregående
  const last7=trends.slice(-7),prev7=trends.slice(-14,-7);
  const avg=(arr,f)=>arr.length?arr.reduce((a,r)=>a+Number(r[f]||0),0)/arr.length:0;
  const qLast=avg(last7,'avg_quality'),qPrev=avg(prev7,'avg_quality');
  const cLast=avg(last7,'avg_compliance'),cPrev=avg(prev7,'avg_compliance');
  const jaSumLast=last7.reduce((a,r)=>a+(r.ja||0),0),jaSumPrev=prev7.reduce((a,r)=>a+(r.ja||0),0);
  const arrow=(now,prev)=>{const d=now-prev;if(Math.abs(d)<0.01)return '<span style="color:var(--mu);">−</span>';return d>0?'<span style="color:var(--g);">▲ +'+d.toFixed(2)+'</span>':'<span style="color:var(--err);">▼ '+d.toFixed(2)+'</span>';};
  const arrowN=(now,prev)=>{const d=now-prev;if(d===0)return '<span style="color:var(--mu);">−</span>';return d>0?'<span style="color:var(--g);">▲ +'+d+'</span>':'<span style="color:var(--err);">▼ '+d+'</span>';};

  const html=`
    <div class="sec" style="margin-top:1rem;">
      <div class="sec-hdr"><h3>📈 30-dagars trend</h3><span style="font-size:11px;color:var(--mu);">Quality (grön) · Compliance (blå) · Ja-sälj per dag (gula staplar)</span></div>
      <div class="sec-body">
        <div class="kpi-grid" style="margin-bottom:1rem;">
          <div class="kpi"><div class="kpi-l">Snitt-quality (senaste 7d)</div><div class="kpi-v">${qLast.toFixed(2)}</div><div class="kpi-sub">${arrow(qLast,qPrev)} vs föreg. vecka</div></div>
          <div class="kpi"><div class="kpi-l">Snitt-compliance</div><div class="kpi-v">${cLast.toFixed(2)}</div><div class="kpi-sub">${arrow(cLast,cPrev)} vs föreg.</div></div>
          <div class="kpi"><div class="kpi-l">Ja-sälj (senaste 7d)</div><div class="kpi-v">${jaSumLast}</div><div class="kpi-sub">${arrowN(jaSumLast,jaSumPrev)} vs föreg.</div></div>
        </div>
        <svg width="100%" viewBox="0 0 ${w} ${h}" style="max-width:100%;background:var(--w);">
          ${yLabels}
          ${bars}
          <polyline points="${cPoints}" fill="none" stroke="#3B7DD8" stroke-width="2" stroke-dasharray="4,3"/>
          <polyline points="${qPoints}" fill="none" stroke="#1E5C4E" stroke-width="2.5"/>
          ${trends.map((t,i)=>`<circle cx="${pad.l+i*xStep}" cy="${pad.t+yScale(t.avg_quality)}" r="3" fill="#1E5C4E"><title>${t.dag}: q=${t.avg_quality} c=${t.avg_compliance} ja=${t.ja} nej=${t.nej}</title></circle>`).join('')}
          ${xLabels}
        </svg>
      </div>
    </div>`;
  main.querySelector('.ca').insertAdjacentHTML('beforeend',html);
}

function saFbWidget(recId, targetType, targetIndex, targetKey){

    <button class="sa-fb-btn sa-fb-bad" type="button" title="Fel — AI lär sig">👎</button>
    <input class="sa-fb-input" type="text" placeholder="Kommentar (frivilligt) — AI använder detta för att lära sig dina preferenser">

  </div>`;

function wireFeedback(main){
  main.querySelectorAll('.sa-fb-row').forEach(row=>{
    const rec=row.dataset.rec, type=row.dataset.type;
    const idx=row.dataset.idx?parseInt(row.dataset.idx):null;
    const key=row.dataset.key||null;
    const good=row.querySelector('.sa-fb-good');
    const bad=row.querySelector('.sa-fb-bad');
    const input=row.querySelector('.sa-fb-input');
    const saved=row.querySelector('.sa-fb-saved');

    const save=async(rating)=>{
      const comment=input.value.trim();
      try{
        await sb.from('call_feedback').insert({
          recording_id:rec, target_type:type, target_index:idx, target_key:key,
          rating, comment:comment||null,
          coach_user_id:(await sb.auth.getUser()).data.user?.id
        });
        saved.style.display='inline';
        setTimeout(()=>{saved.style.display='none';},2500);
        good.classList.toggle('act-good',rating==='good');
        bad.classList.toggle('act-bad',rating==='bad');
      }catch(e){console.error('feedback save',e);}
    };

    good.onclick=()=>save('good');
    bad.onclick=()=>save('bad');
    input.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        const r=good.classList.contains('act-good')?'good':bad.classList.contains('act-bad')?'bad':'neutral';
        save(r);
      }
    });
  });
}

function chatToggle(){
  const panel=document.getElementById('ai-panel');
  if(!panel)return;
  chatState.open=!chatState.open;
  panel.classList.toggle('show',chatState.open);
}

function chatFormatReply(text){
  return esc(text).replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[LYSSNA cdr=(\d+)\]/g,'<span style="background:var(--bluel);color:var(--blue);padding:1px 6px;border-radius:4px;font-size:11.5px;font-weight:600;">🎧 cdr $1</span>');
}

function chatRenderAudioRefs(msgs,audioRefs){
  if(!audioRefs||!audioRefs.length)return;
  audioRefs.forEach(ref=>{
    const ap=document.createElement('div');
    ap.className='ai-msg ai-msg-a';
    ap.style.cssText='max-width:95%;background:var(--bg2);';
    const mm=Math.floor((ref.duration_s||0)/60);
    const ss=Math.floor((ref.duration_s||0)%60);
    const dt=(ref.recorded_at||'').slice(0,16).replace('T',' ');
    ap.innerHTML=`
      <div style="font-size:11.5px;color:var(--mu);margin-bottom:6px;display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap;">
        <span><strong style="color:var(--gd);">cdr ${esc(ref.cdr_id)}</strong> · ${dt} · ${mm}:${ss<10?'0'+ss:ss}</span>
        <span>${esc(ref.seller_name||'')} · ${esc(ref.status||'')}</span>
      </div>
      <audio controls preload="none" style="width:100%;height:34px;"><source src="${esc(ref.signed_url)}" type="audio/mpeg"></audio>
      <div style="margin-top:6px;"><a href="#" data-rid="${esc(ref.recording_id)}" class="ai-open-report" style="font-size:11px;color:var(--g);text-decoration:none;font-weight:600;">📊 Öppna full rapport →</a></div>`;
    msgs.appendChild(ap);
  });
  msgs.querySelectorAll('.ai-open-report').forEach(el=>{
    el.onclick=(e)=>{e.preventDefault();
      if(!S.sa)S.sa={};
      S.sa.openId=el.dataset.rid;S.sa.detail=null;
      S.tab='samtalsanalys';
      document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
      document.querySelector('.sbi[data-tab="samtalsanalys"]')?.classList.add('active');
      chatToggle();render();
    };
  });
}

async function chatSend(msg){
  msg=(msg||'').trim();if(!msg)return;
  const input=document.getElementById('ai-input');
  const send=document.getElementById('ai-send');
  const msgs=document.getElementById('ai-msgs');
  if(!msgs)return;
  const u=document.createElement('div');u.className='ai-msg ai-msg-u';u.textContent=msg;msgs.appendChild(u);
  input.value='';send.disabled=true;
  const typing=document.createElement('div');typing.className='ai-typing';typing.textContent='AI tänker...';msgs.appendChild(typing);
  msgs.scrollTop=msgs.scrollHeight;

  const role=S.role||'saljare';
  const userResult=await sb.auth.getUser();
  const userId=userResult.data.user?.id;
  const sellerId=S.seller?.id||null;

  // STREAMING-läge
  try{
    const resp=await fetch('https://hfbhoufqvozbxkqlldzl.supabase.co/functions/v1/assistant',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,session_id:chatState.sessionId,user_role:role,seller_id:sellerId,user_id:userId,stream:true})
    });
    if(!resp.ok){
      typing.remove();
      const a=document.createElement('div');a.className='ai-msg ai-msg-a';a.textContent='Fel: HTTP '+resp.status;msgs.appendChild(a);
      send.disabled=false;return;
    }
    typing.remove();
    const aDiv=document.createElement('div');aDiv.className='ai-msg ai-msg-a';msgs.appendChild(aDiv);
    let fullText='',audioRefs=[],buf='';
    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const o=JSON.parse(line.slice(6));
          if(o.type==='text'){
            fullText+=o.delta;
            aDiv.innerHTML=chatFormatReply(fullText);
            msgs.scrollTop=msgs.scrollHeight;
          }else if(o.type==='done'){
            audioRefs=o.audio_refs||[];
            if(o.session_id)chatState.sessionId=o.session_id;
          }else if(o.type==='error'){
            aDiv.innerHTML+='<br><em style="color:var(--err);">Fel: '+esc(o.error)+'</em>';
          }
        }catch{}
      }
    }
    chatRenderAudioRefs(msgs,audioRefs);
    send.disabled=false;input.focus();
    msgs.scrollTop=msgs.scrollHeight;
    return;
  }catch(e){
    typing.remove();
    const a=document.createElement('div');a.className='ai-msg ai-msg-a';a.textContent='Stream-fel: '+e.message+' — försök igen';msgs.appendChild(a);
    send.disabled=false;return;
  }

  // (Fallback sync — kvarstår om streaming inte funkar i framtiden)
  try{
    const resp=await fetch('https://hfbhoufqvozbxkqlldzl.supabase.co/functions/v1/assistant',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,session_id:chatState.sessionId,user_role:role,seller_id:sellerId,user_id:userId})
    });
    const data=await resp.json();
    typing.remove();
    if(data.ok){
      chatState.sessionId=data.session_id;
      const a=document.createElement('div');a.className='ai-msg ai-msg-a';
      // Replace [LYSSNA cdr=X] tags med fina länkar i texten
      let textHtml=esc(data.reply).replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\[LYSSNA cdr=(\d+)\]/g,'<span style="background:var(--bluel);color:var(--blue);padding:1px 6px;border-radius:4px;font-size:11.5px;font-weight:600;">🎧 cdr $1</span>');
      a.innerHTML=textHtml;
      msgs.appendChild(a);
      // Rendera audio-spelare för varje audio_ref
      if(data.audio_refs&&data.audio_refs.length){
        data.audio_refs.forEach(ref=>{
          const ap=document.createElement('div');
          ap.className='ai-msg ai-msg-a';
          ap.style.cssText='max-width:95%;background:var(--bg2);';
          const mm=Math.floor((ref.duration_s||0)/60);
          const ss=Math.floor((ref.duration_s||0)%60);
          const dt=(ref.recorded_at||'').slice(0,16).replace('T',' ');
          ap.innerHTML=`
            <div style="font-size:11.5px;color:var(--mu);margin-bottom:6px;display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap;">
              <span><strong style="color:var(--gd);">cdr ${esc(ref.cdr_id)}</strong> · ${dt} · ${mm}:${ss<10?'0'+ss:ss}</span>
              <span>${esc(ref.seller_name||'')} · ${esc(ref.status||'')}</span>
            </div>
            <audio controls preload="none" style="width:100%;height:34px;"><source src="${esc(ref.signed_url)}" type="audio/mpeg"></audio>
            <div style="margin-top:6px;"><a href="#" data-rid="${esc(ref.recording_id)}" class="ai-open-report" style="font-size:11px;color:var(--g);text-decoration:none;font-weight:600;">📊 Öppna full rapport →</a></div>`;
          msgs.appendChild(ap);
        });
        // Wire öppna-rapport-länkar
        msgs.querySelectorAll('.ai-open-report').forEach(el=>{
          el.onclick=(e)=>{e.preventDefault();
            if(!S.sa)S.sa={};
            S.sa.openId=el.dataset.rid;S.sa.detail=null;
            S.tab='samtalsanalys';
            document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
            document.querySelector('.sbi[data-tab="samtalsanalys"]')?.classList.add('active');
            chatToggle();render();
          };
        });
      }
    }else{
      const a=document.createElement('div');a.className='ai-msg ai-msg-a';a.textContent='Fel: '+(data.error||'okänt');msgs.appendChild(a);
    }
  }catch(e){
    typing.remove();
    const a=document.createElement('div');a.className='ai-msg ai-msg-a';a.textContent='Nätverksfel: '+e.message;msgs.appendChild(a);
  }
  send.disabled=false;input.focus();
  msgs.scrollTop=msgs.scrollHeight;
}

        S.im.msg='Fel: Ogiltig e-postadress.';renderInfomail(main);return;
      }
      S.im.sending=true;S.im.msg='';renderInfomail(main);
      try{
        const {data,error} = await sb.functions.invoke('send-info-mail',{
          body:{
            seller_id: S.seller?.id,
            seller_alias: S.im.seller_alias,
            seller_email: S.user?.email,
            customer_name: S.im.customer_name,
            customer_email: S.im.customer_email,
            package_code: S.im.package_code,
            include_private_id: S.im.include_private_id,
            include_business: S.im.include_business,
            custom_message: S.im.custom_message || undefined
          }
        });
        if(error){S.im.msg='Fel: '+error.message;}
        else if(data && data.error){S.im.msg='Fel: '+data.error;}
        else{
          S.im.msg='✓ Mail skickat till '+S.im.customer_email+'!';
          S.im.customer_name='';S.im.customer_email='';S.im.custom_message='';
          S.im.sendsLoaded=false;
        }
      }catch(e){S.im.msg='Fel: '+e.message;}
      S.im.sending=false;
      renderInfomail(main);
    };

    function imUpdatePreview(){
      const p=document.getElementById('im-preview');
      if(p) p.innerHTML = renderInfomailPreview();
    }
    function imUpdateSendLabel(){
      const b=document.getElementById('im-send');
      if(b && !S.im.sending) b.innerHTML = '📧 Skicka mail till '+esc(S.im.customer_name||'kund');
    }
  }

  function renderInfomailPreview(){
    const pkg = IM_PKG[S.im.package_code];
    const total = pkg.price + (S.im.include_private_id?pkg.private_id:0);
    const cname = S.im.customer_name||'[Kundens namn]';
    const alias = S.im.seller_alias||'[Ditt alias]';

    return `
<div style="max-width:560px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#1a1a1a;">
  <div style="background:#16855A;color:#fff;padding:20px 22px;">
    <div style="font-size:17px;font-weight:700;">SmartID</div>
    <div style="font-size:11px;opacity:.85;margin-top:3px;">Försäkring mot identitetsbedrägeri</div>
  </div>
  <div style="padding:22px;">
    <h2 style="margin:0 0 10px 0;font-size:17px;font-weight:700;">Hej ${esc(cname)},</h2>
    <p style="margin:0 0 10px 0;font-size:12px;line-height:1.5;color:#333;">Förra året anmäldes <strong>nästan 300 000 fall</strong> av identitetsbedrägeri i Sverige. Konsekvenserna stannar inte vid pengarna — det kan ta månader att reda ut lån, abonnemang och konton som någon annan tecknat i ditt namn.</p>
    <p style="margin:0 0 14px 0;font-size:12px;line-height:1.5;color:#333;">Som vi pratade om — här är informationen om ditt paket.</p>
    ${S.im.custom_message?`<div style="background:#fffbf0;border-left:3px solid #d4a017;border-radius:4px;padding:10px 12px;font-size:12px;color:#444;line-height:1.4;margin-bottom:14px;white-space:pre-line;">${esc(S.im.custom_message)}</div>`:''}
    <div style="background:#16855A;color:#fff;border-radius:8px;padding:16px;margin-bottom:14px;">
      <div style="font-size:9px;letter-spacing:1.2px;text-transform:uppercase;opacity:.85;margin-bottom:4px;font-weight:600;">Ditt paket</div>
      <div style="font-size:17px;font-weight:700;">${pkg.label}</div>
      <div style="font-size:11px;opacity:.85;margin-bottom:8px;">För upp till ${pkg.persons} person${pkg.persons>1?'er':''} · 24 mån</div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-0.3px;">${pkg.price} kr<span style="font-size:11px;font-weight:500;opacity:.85;">/mån</span></div>
    </div>
    <div style="font-size:12px;color:#333;line-height:1.7;margin-bottom:12px;">
      <div>✓ Försäkring upp till <strong>1 miljon kr</strong> vid ID-bedrägeri</div>
      <div>✓ <strong>Juridisk hjälp</strong> upp till 1,3 mkr</div>
      <div>✓ Bevakning av personnummer, e-post, konton</div>
      <div>✓ <strong>Ångerrätt 14 dagar</strong></div>
      ${pkg.persons>1?`<div>✓ <strong>${pkg.persons} personer</strong> i samma hushåll</div>`:''}
    </div>
    ${S.im.include_private_id?`
    <div style="background:#f0f9f4;border-left:3px solid #16855A;border-radius:4px;padding:10px 12px;margin-bottom:12px;">
      <div style="font-weight:700;color:#16855A;font-size:12px;">+ Private ID-tillägg (${pkg.private_id} kr/mån)</div>
      <div style="font-size:11px;color:#444;margin-top:3px;line-height:1.5;">Dölj folkbokföringsadress + uppgifter från offentliga register och spårtjänster.</div>
    </div>`:''}
    <div style="background:#f9faf8;border:1px solid #e8ebe5;border-radius:6px;padding:12px 14px;margin-bottom:14px;">
      <div style="font-size:11px;color:#666;">Total månadskostnad</div>
      <div style="font-size:18px;font-weight:800;color:#16855A;letter-spacing:-0.2px;">${total} kr<span style="font-size:11px;color:#666;font-weight:500;">/mån</span></div>
      ${S.im.include_private_id?`<div style="font-size:10px;color:#888;margin-top:2px;">${pkg.price} kr försäkring + ${pkg.private_id} kr Private ID · 24 mån</div>`:''}
    </div>
    ${S.im.include_business?`
    <div style="border:1px solid #e8ebe5;border-radius:8px;padding:14px 15px;margin-bottom:14px;background:#fafbf9;">
      <div style="font-size:9px;letter-spacing:1.2px;color:#888;text-transform:uppercase;font-weight:600;margin-bottom:5px;">Företagsoffert</div>
      <div style="font-weight:700;margin-bottom:6px;font-size:13px;">SmartID för företag</div>
      <div style="font-size:11px;color:#444;line-height:1.55;margin-bottom:10px;">Skydda hela teamet — upp till 5 anställda. Avdragsgill personalförmån.</div>
      <div style="font-size:13px;border-top:1px solid #e8ebe5;padding-top:8px;"><strong>399 kr/mån</strong> <span style="color:#888;font-size:11px;">exkl. moms · 499 kr inkl.</span></div>
    </div>`:''}
    <div style="text-align:center;margin:20px 0 8px 0;">
      <span style="display:inline-block;background:#16855A;color:#fff;padding:12px 28px;border-radius:6px;font-weight:700;font-size:13px;">Prata med ${esc(alias)}</span>
    </div>
    <div style="text-align:center;font-size:11px;color:#888;">Tryck — ${esc(alias)} ringer upp samma dag.</div>
  </div>
  <div style="background:#f9faf8;padding:12px 16px;border-top:1px solid #e8ebe5;text-align:center;font-size:10px;color:#777;line-height:1.5;">
    Försäkringsgivare: <strong>Trygg-Hansa Försäkring filial</strong>. BankID-signering.
  </div>
</div>`;
  }

  async function renderNotiser(main){
    if(!S.notif) S.notif = {items:[],filter:'all',loaded:false};

    if(!S.notif.loaded){
      main.innerHTML = '<div class="ph"><div><div class="ph-t">🔔 Notiser</div><div class="ph-s">Laddar…</div></div></div>';
      const {data} = await sb.from('v_notifications').select('*').limit(200);
      S.notif.items = data||[];
      S.notif.loaded = true;
    }

    const items = S.notif.filter==='unread' ? S.notif.items.filter(n=>!n.read_at)
                 : S.notif.filter==='mail'   ? S.notif.items.filter(n=>n.type==='mail_click')
                 : S.notif.filter==='flag'   ? S.notif.items.filter(n=>n.type==='flagged_call')
                 : S.notif.items;
    const unreadCount = S.notif.items.filter(n=>!n.read_at).length;

    const filterBtn = (key,label,count)=>{
      const active = S.notif.filter===key;
      return `<button class="notif-filter" data-f="${key}" style="padding:7px 14px;border:1px solid ${active?'#16855A':'#ddd'};background:${active?'#16855A':'#fff'};color:${active?'#fff':'#333'};border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;">${label}${count!=null?' ('+count+')':''}</button>`;
    };

    main.innerHTML = `
      <div class="ph">
        <div><div class="ph-t">🔔 Notiser</div><div class="ph-s">${unreadCount} olästa · ${S.notif.items.length} totalt</div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${filterBtn('all','Alla',S.notif.items.length)}
          ${filterBtn('unread','Olästa',unreadCount)}
          ${filterBtn('mail','Mail-klick',S.notif.items.filter(n=>n.type==='mail_click').length)}
          ${filterBtn('flag','Flaggade samtal',S.notif.items.filter(n=>n.type==='flagged_call').length)}
          ${unreadCount>0?`<button id="notif-markall" style="padding:7px 14px;border:1px solid #16855A;background:#fff;color:#16855A;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;">Markera alla lästa</button>`:''}
        </div>
      </div>
      <div class="ca">
        ${items.length===0
          ? `<div class="empty" style="padding:3rem 2rem;text-align:center;color:#888;"><div style="font-size:42px;margin-bottom:0.5rem;">🎉</div><p>Inga ${S.notif.filter==='unread'?'olästa ':''}notiser just nu.</p><small>Notiser kommer in när en kund klickar "Prata med [säljaren]" i ett info-mail, eller när AI-coach hittar ett flaggat samtal (≥3 regelbrott).</small></div>`
          : items.map(n=>{
              const icon = n.type==='mail_click'?'📬':(n.type==='flagged_call'?'⚠️':'🔔');
              const sev = n.severity==='critical'?'#dc2626':(n.severity==='warning'?'#d4a017':'#16855A');
              const isUnread = !n.read_at;
              return `
              <div class="notif-row" data-id="${n.id}" data-link="${esc(n.link_url||'')}" data-type="${n.type}" style="display:flex;gap:14px;padding:14px 16px;background:${isUnread?'#fffbf0':'#fff'};border:1px solid #e8ebe5;border-left:3px solid ${sev};border-radius:6px;margin-bottom:8px;cursor:pointer;transition:background .15s;">
                <div style="font-size:24px;flex-shrink:0;">${icon}</div>
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;justify-content:space-between;align-items:start;gap:10px;">
                    <div style="font-weight:${isUnread?'700':'500'};font-size:14px;color:#1a1a1a;">${esc(n.title)}</div>
                    <div style="font-size:11px;color:#888;white-space:nowrap;">${timeAgo(n.created_at)}</div>
                  </div>
                  <div style="font-size:13px;color:#555;margin-top:4px;line-height:1.45;">${esc(n.body||'')}</div>
                  ${n.seller_alias?`<div style="font-size:11px;color:#888;margin-top:4px;">Säljare: <strong>${esc(n.seller_alias)}</strong></div>`:''}
                </div>
                ${isUnread?`<button class="notif-mark-read" data-id="${n.id}" title="Markera läst" style="background:none;border:none;color:#888;cursor:pointer;font-size:11px;align-self:start;flex-shrink:0;padding:4px 8px;">Markera läst</button>`:''}
              </div>`;
            }).join('')
        }
      </div>`;

    document.querySelectorAll('.notif-filter').forEach(b=>{
      b.onclick = ()=>{S.notif.filter=b.dataset.f;renderNotiser(main);};
    });
    document.querySelectorAll('.notif-row').forEach(r=>{
      r.onclick = async (e)=>{
        if(e.target && e.target.classList && e.target.classList.contains('notif-mark-read')) return;
        const id = r.dataset.id;
        await sb.from('coach_notifications').update({read_at:new Date().toISOString()}).eq('id',id);
        updateNotifBadge();
        const link = r.dataset.link;
        if(link){
          if(link.startsWith('mailto:')){window.location.href=link;return;}
          if(link.startsWith('/?tab=')){
            const u = new URL(link, window.location.origin);
            S.tab = u.searchParams.get('tab')||'samtalsanalys';
            const refId = u.searchParams.get('id');
            if(refId){
              if(!S.sa) S.sa = {loaded:false,samtal:[],query:'',filterSeller:'',filterStatus:'',filterFrom:'',filterTo:'',openId:null,detail:null};
              S.sa.openId = refId;
            }
            render();
            return;
          }
        }
        S.notif.loaded = false;
        renderNotiser(main);
      };
    });
    document.querySelectorAll('.notif-mark-read').forEach(b=>{
      b.onclick = async (e)=>{
        e.stopPropagation();
        await sb.from('coach_notifications').update({read_at:new Date().toISOString()}).eq('id',b.dataset.id);
        S.notif.loaded = false;
        renderNotiser(main);
        updateNotifBadge();
      };
    });
    const markAll = document.getElementById('notif-markall');
    if(markAll){
      markAll.onclick = async ()=>{
        const ids = S.notif.items.filter(n=>!n.read_at).map(n=>n.id);
        if(ids.length===0) return;
        await sb.from('coach_notifications').update({read_at:new Date().toISOString()}).in('id',ids);
        S.notif.loaded = false;
        renderNotiser(main);
        updateNotifBadge();
      };
    }

    updateNotifBadge();
  }

  function timeAgo(ts){
    if(!ts) return '';
    const d = new Date(ts), now = new Date();
    const diff = Math.floor((now-d)/1000);
    if(diff < 60) return 'just nu';
    if(diff < 3600) return Math.floor(diff/60)+' min sedan';
    if(diff < 86400) return Math.floor(diff/3600)+' h sedan';
    if(diff < 604800) return Math.floor(diff/86400)+' d sedan';
    return d.toLocaleDateString('sv-SE');
  }

  async function updateNotifBadge(){
    const badge = document.getElementById('notif-badge');
    if(!badge) return;
    try{
      const {count} = await sb.from('coach_notifications').select('id',{count:'exact',head:true}).is('read_at',null);
      if(count && count>0){
        badge.textContent = count>99?'99+':String(count);
        badge.style.display = '';
      }else{
        badge.style.display = 'none';
      }
    }catch(e){/* RLS kan blocka, ignorera */}
  }

  // Poll badge varje minut + initial efter 3s
  setInterval(updateNotifBadge, 60000);
  setTimeout(updateNotifBadge, 3000);

})();
</script>
<div id="mc"></div>
</body>
</html>
