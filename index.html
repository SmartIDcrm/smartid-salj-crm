<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartID Sälj-CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
h1 { color: #333; margin-bottom: 8px; font-size: 28px; }
.subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
.form-group { margin-bottom: 20px; }
label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
input { width: 100%; padding: 12px 16px; border: 2px solid #e1e5eb; border-radius: 8px; font-size: 15px; transition: border 0.2s; }
input:focus { outline: none; border-color: #667eea; }
button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
button:hover { transform: translateY(-1px); }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.message { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
.message.error { background: #fee; color: #c33; display: block; }
.message.success { background: #efe; color: #383; display: block; }
.dashboard { display: none; }
.dashboard.active { display: block; }
.login-container.hidden { display: none; }
</style>
</head>
<body>
<div class="login-container" id="loginBox">
<h1>SmartID Sälj-CRM</h1>
<p class="subtitle">Logga in med din e-post och lösenord</p>
<form id="loginForm">
<div class="form-group">
<label for="email">E-post</label>
<input type="email" id="email" required autocomplete="email">
</div>
<div class="form-group">
<label for="password">Lösenord</label>
<input type="password" id="password" required autocomplete="current-password">
</div>
<button type="submit" id="loginBtn">Logga in</button>
</form>
<div class="message" id="message"></div>
</div>
<div class="dashboard" id="dashboard">
<div class="login-container">
<h1>Välkommen!</h1>
<p class="subtitle" id="userEmail"></p>
<p style="margin: 20px 0; color: #666;">Sälj-CRM laddas snart...</p>
<button id="logoutBtn">Logga ut</button>
</div>
</div>
<script>
const SUPABASE_URL = 'https://hfbhoufqvozbxkqlldzl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmYmhvdWZxdm96YnhrcmxsemwifQ.placeholder';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const loginForm = document.getElementById('loginForm');
const messageEl = document.getElementById('message');
const loginBox = document.getElementById('loginBox');
const dashboard = document.getElementById('dashboard');
const userEmail = document.getElementById('userEmail');
function showMessage(text, type) { messageEl.textContent = text; messageEl.className = 'message ' + type; }
function showDashboard(user) { loginBox.classList.add('hidden'); dashboard.classList.add('active'); userEmail.textContent = user.email; }
async function checkSession() { const { data } = await sb.auth.getSession(); if (data.session) showDashboard(data.session.user); }
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Loggar in...';
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false;
  btn.textContent = 'Logga in';
  if (error) showMessage(error.message, 'error');
  else { showMessage('Inloggad!', 'success'); showDashboard(data.user); }
});
document.getElementById('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });
checkSession();
</script>
</body>
</html>
